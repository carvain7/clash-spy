<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .tab-bar { display: flex; background: #161f32; border-bottom: 1px solid #2d3748; min-height: 50px; flex-shrink: 0; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; cursor: pointer; opacity: 0.5; color: white; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        .screen { display: none; flex: 1; width: 100%; flex-direction: column; padding: 15px; overflow-y: auto; }
        .active-screen { display: flex; }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin: 5px 0; font-size: 14px; color: white; text-transform: uppercase; box-shadow: 0 4px 0 rgba(0,0,0,0.3); flex-shrink: 0; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        
        input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 16px; text-align: center; outline: none; margin-bottom: 10px; flex-shrink: 0; }

        .card-display { background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 2px solid var(--accent); margin-bottom: 10px; flex-shrink: 0; }
        
        #chat-window { flex: 1; min-height: 100px; background: #05070a; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #1a2236; font-size: 13px; }
        .msg { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }

        .vote-item { display: flex; justify-content: space-between; align-items: center; background: #252f44; padding: 10px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
        .vote-count { background: var(--accent); color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 12px; }

        .rank-item { display: flex; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 4px; }
        .rank-item.me { border: 1px solid var(--accent); background: rgba(245, 158, 11, 0.1); }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
        <div class="tab" onclick="switchTab('profile', this)">ПРОФІЛЬ</div>
        <div class="tab" onclick="switchTab('leaderboard', this)">ТОП-100</div>
    </div>

    <div id="scr-game" class="screen active-screen">
        <div id="menu-area">
            <h2 style="text-align:center; color:var(--accent);">CLASH SPY</h2>
            <button class="btn btn-green" onclick="createLobby()">Створити кімнату</button>
            <div style="margin-top:20px;">
                <input type="number" id="lobby-input" placeholder="Введіть код лобі">
                <button class="btn btn-blue" onclick="joinLobby()">Приєднатися</button>
            </div>
        </div>

        <div id="lobby-area" style="display:none; flex-direction:column; height:100%;">
            <div style="text-align:center;">
                <span style="opacity:0.6; font-size:12px;">КОД ЛОБІ</span>
                <h1 id="room-code-label" style="color:var(--accent); font-size: 40px; margin:0;">----</h1>
            </div>
            <div id="player-list" style="flex:1; margin:15px 0;"></div>
            <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">Почати битву</button>
            <button class="btn btn-red" onclick="location.reload()" style="background:none; box-shadow:none;">Вийти</button>
        </div>

        <div id="play-area" style="display:none; flex-direction:column; height:100%;">
            <div class="card-display" id="role-card"></div>
            
            <div id="voting-section" style="display:none; margin-bottom:10px;">
                <div id="vote-list"></div>
            </div>

            <div id="chat-window"></div>
            
            <div style="display: flex; gap: 5px; flex-shrink:0;">
                <input type="text" id="chat-input" placeholder="Питання..." style="flex: 1; margin: 0;">
                <button class="btn btn-blue" onclick="sendMsg()" style="width: 50px; margin: 0; padding: 0;">➜</button>
            </div>
            
            <div style="display: flex; gap: 5px; margin-top: 10px; flex-shrink:0;">
                <button class="btn btn-green" style="flex:1; font-size:11px;" onclick="toggleVoting()">ГОЛОСУВАТИ</button>
                <button id="finish-btn" class="btn btn-red" style="display:none; flex:1; font-size:11px;" onclick="finishGameAction()">ЗАВЕРШИТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <h2 style="color:var(--accent)">Профіль</h2>
        <div class="card-display" id="prof-card">Завантаження...</div>
    </div>

    <div id="scr-leaderboard" class="screen">
        <h2 style="color:var(--accent)">ТОП-100</h2>
        <div id="rank-list"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ВИПРАВЛЕНО: Правильний URL для регіону Бельгія
    const firebaseConfig = { 
        databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" 
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const user = tg.initDataUnsafe?.user;
    const uID = (user?.id || "dev_" + Math.floor(Math.random()*999)).toString();
    const uName = user?.first_name || user?.username || "Гравець";
    
    let roomID = null;
    let isHost = false;
    let hasVoted = false;

    const cards = ["П.Е.К.К.А", "Мегалицар", "Вершник на кабані", "Магічний лучник", "Спаркі", "Відьма"];

    db.ref('users/' + uID).update({ name: uName });
    db.ref('users/' + uID).on('value', snap => {
        const d = snap.val() || { wins: 0 };
        document.getElementById('prof-card').innerHTML = `<h3>${uName}</h3><div style="font-size:30px;">🏆 ${d.wins || 0}</div>`;
    });

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + tabId).classList.add('active-screen');
        el.classList.add('active');
        if(tabId === 'leaderboard') loadLeaderboard();
    }

    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
        setupRoom();
    }

    async function joinLobby() {
        const input = document.getElementById('lobby-input');
        const val = input.value.trim();
        
        // ВИПРАВЛЕНО: Перевірка на порожній код
        if (!val) {
            alert("Будь ласка, введіть код лобі!");
            return;
        }

        const snap = await db.ref('rooms/' + val).once('value');
        if(!snap.exists()) {
            alert("Лобі не знайдено!");
            return;
        }
        
        roomID = val; isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('menu-area').style.display = 'none';
        document.getElementById('lobby-area').style.display = 'flex';
        document.getElementById('room-code-label').innerText = roomID;
        db.ref('rooms/' + roomID + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + roomID + '/players').on('value', snap => {
            const l = document.getElementById('player-list');
            l.innerHTML = ""; let c = 0;
            snap.forEach(p => { c++; l.innerHTML += `<div class="rank-item">👤 ${p.val().name}</div>`; });
            if(isHost) {
                let b = document.getElementById('start-btn');
                b.style.display = 'block'; b.disabled = c < 2;
            }
        });

        db.ref('rooms/' + roomID).on('value', snap => {
            const d = snap.val();
            if(d && d.status === 'started') renderGame(d);
        });
    }

    function startGame() {
        const card = cards[Math.floor(Math.random()*cards.length)];
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let ids = []; snap.forEach(p => ids.push(p.key));
            const spy = ids[Math.floor(Math.random()*ids.length)];
            db.ref('rooms/' + roomID).update({ status: 'started', spyID: spy, cardName: card });
        });
    }

    function renderGame(data) {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'flex';
        const isSpy = data.spyID === uID;
        document.getElementById('role-card').innerHTML = isSpy ? 
            `<h2 style="color:var(--red); margin:0;">ТИ ШПИГУН 🕵️</h2>` : 
            `<p style="font-size:11px;opacity:0.6;margin:0;">КАРТА:</p><h2 style="color:var(--green);margin:5px 0;">${data.cardName}</h2>`;
        
        if(isHost) document.getElementById('finish-btn').style.display = 'block';

        db.ref('rooms/' + roomID + '/chat').off();
        db.ref('rooms/' + roomID + '/chat').on('child_added', snap => {
            const m = snap.val();
            const w = document.getElementById('chat-window');
            w.innerHTML += `<div class="msg"><b>${m.u}:</b> ${m.msg}</div>`;
            w.scrollTop = w.scrollHeight;
        });

        updateVoteList(data.players, data.votes || {});
    }

    function toggleVoting() {
        const sect = document.getElementById('voting-section');
        sect.style.display = sect.style.display === 'none' ? 'block' : 'none';
    }

    function updateVoteList(players, votes) {
        const list = document.getElementById('vote-list');
        list.innerHTML = "";
        let counts = {};
        Object.values(votes).forEach(vID => counts[vID] = (counts[vID] || 0) + 1);
        Object.keys(players).forEach(pID => {
            if(pID === uID) return;
            const btn = document.createElement('div');
            btn.className = 'vote-item';
            btn.innerHTML = `<span>${players[pID].name}</span> <span class="vote-count">${counts[pID] || 0}</span>`;
            btn.onclick = () => castVote(pID);
            list.appendChild(btn);
        });
    }

    async function castVote(targetID) {
        if(hasVoted) return;
        await db.ref('rooms/' + roomID + '/votes/' + uID).set(targetID);
        hasVoted = true;
    }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + roomID + '/chat').push({ u: uName, msg: i.value });
        i.value = "";
    }

    function finishGameAction() {
        const winner = prompt("Ім'я переможця:");
        if(!winner) return;
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            snap.forEach(p => {
                if(p.val().name.toLowerCase() === winner.toLowerCase()) {
                    db.ref('users/' + p.key + '/wins').transaction(c => (c||0)+1);
                }
            });
            db.ref('rooms/' + roomID).remove().then(() => location.reload());
        });
    }

    function loadLeaderboard() {
        db.ref('users').once('value', snap => {
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            let arr = [];
            snap.forEach(c => arr.push({ id: c.key, ...c.val() }));
            arr.sort((a,b) => (b.wins||0) - (a.wins||0));
            arr.slice(0, 100).forEach((p, i) => {
                list.innerHTML += `<div class="rank-item ${p.id === uID ? 'me' : ''}"><span>${i+1}. ${p.name}</span><span>🏆 ${p.wins||0}</span></div>`;
            });
        });
    }
</script>
</body>
</html>
