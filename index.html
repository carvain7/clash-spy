<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a2236; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { color: #64748b; font-size: 18px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 90px; }
        .screen.active { display: flex; }

        .container { padding: 20px; text-align: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin: 10px 0; cursor: pointer; }
        
        /* Notification Toast */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 1000; transition: 0.5s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #toast.show { top: 20px; }

        /* Game UI */
        .status-panel { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-bottom: 2px solid var(--blue); }
        #chat-window { background: #020617; flex: 1; min-height: 200px; border-radius: 10px; overflow-y: auto; padding: 10px; margin-bottom: 10px; text-align: left; }
        .msg { margin-bottom: 10px; font-size: 15px; }
        
        /* Spy Guess Screen */
        .guess-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .guess-item { background: white; color: black; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 14px; }

        .card-view { background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid var(--accent); border-radius: 20px; padding: 20px; text-align: left; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="toast">Повідомлення</div>

    <div id="scr-main" class="screen active">
        <div class="container">
            <h1 style="color:var(--accent); font-size:35px; margin-top:50px;">CLASH SPY</h1>
            <p style="color:#64748b">Стратегічна гра для друзів</p>
            <button class="btn" onclick="openLobby(true)" style="background:#10b981">✨ НОВА КІМНАТА</button>
            <input type="text" id="join-code" placeholder="Код..." style="width:80%; padding:15px; border-radius:10px; border:none; margin:10px 0; text-align:center; font-size:20px;">
            <button class="btn" onclick="openLobby(false)" style="background:var(--accent)">🔑 ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="container">
            <h2>КІМНАТА: <span id="room-id" style="color:var(--accent)">-----</span></h2>
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:left; margin:20px 0;">
                <div style="margin-bottom:10px">👤 Ви (Host) ✅</div>
                <div style="color:#64748b">👤 Очікування гравців...</div>
            </div>
            <button class="btn" onclick="startBattle()">⚔️ ПОЧАТИ ГРУ (5 ХВ)</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="container" style="display:flex; flex-direction:column; height:85vh;">
            <div class="status-panel">
                <span style="color:var(--red); font-size:20px; font-weight:bold" id="timer">05:00</span> | 
                🎤 <span id="turn-info" style="color:#4ade80">Ваша черга</span>
            </div>
            
            <div id="chat-window"></div>
            
            <div id="spy-action-area" style="display:none">
                <button class="btn" onclick="nav('scr-guess')" style="background:var(--accent); color:black;">🎯 ВГАДАТИ КАРТУ</button>
            </div>

            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-msg" placeholder="Запитання..." style="flex:1; padding:15px; border-radius:10px; border:none;">
                <button class="btn" id="send-btn" onclick="sendMsg()" style="width:70px; margin:0;">➜</button>
            </div>
        </div>
    </div>

    <div id="scr-guess" class="screen">
        <div class="container">
            <h1>ЯКА КАРТА У ГРАВЦІВ?</h1>
            <input type="text" placeholder="Швидкий пошук..." onkeyup="searchCards(this.value)" style="width:90%; padding:12px; border-radius:10px; border:none; margin-bottom:15px;">
            <div class="guess-grid" id="guess-grid"></div>
            <button class="btn" onclick="nav('scr-game')" style="background:none; border:1px solid #64748b; margin-top:20px;">Назад до чату</button>
        </div>
    </div>

    <div id="scr-card" class="screen">
        <div class="container">
            <h1 id="card-title">Ваша Карта</h1>
            <div id="card-display" class="card-view"></div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="container">
            <h1>ПРОФІЛЬ</h1>
            <div class="card-view">
                <p>👤 Ім'я: Гравчина/Гравець</p>
                <p>🏆 Перемог: 0</p>
                <p>🏅 Ранг: Новачок</p>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('scr-main', this)">🏠</div>
        <div class="nav-item" id="nav-game" style="display:none" onclick="nav('scr-game', this)">💬</div>
        <div class="nav-item" id="nav-card" style="display:none" onclick="nav('scr-card', this)">🃏</div>
        <div class="nav-item" onclick="nav('scr-profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const cards = [
            {n: "П.Е.К.К.А", hp: 3450, dmg: 678, spd: "Повільна", rar: "Епічна"},
            {n: "Мегалицар", hp: 3300, dmg: 222, spd: "Середня", rar: "Легендарна"},
            {n: "Спаркі", hp: 1200, dmg: 1100, spd: "Повільна", rar: "Легендарна"},
            {n: "Всадник на кабані", hp: 1400, dmg: 318, spd: "Дуже швидка", rar: "Рідкісна"},
            {n: "Принцеса", hp: 216, dmg: 140, spd: "Середня", rar: "Легендарна"}
        ];

        let isSpy = false;
        let myCard = null;
        let timeLeft = 300;

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 5000);
        }

        function nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function openLobby(isNew) {
            const code = isNew ? Math.random().toString(36).substring(2, 7).toUpperCase() : document.getElementById('join-code').value;
            if(!isNew && code.length < 3) return;
            document.getElementById('room-id').innerText = code;
            nav('scr-lobby');
        }

        function startBattle() {
            isSpy = Math.random() < 0.3;
            myCard = cards[Math.floor(Math.random()*cards.length)];
            
            document.getElementById('nav-game').style.display = 'block';
            document.getElementById('nav-card').style.display = 'block';
            
            if(isSpy) {
                document.getElementById('spy-action-area').style.display = 'block';
                document.getElementById('card-title').innerText = "Ти — ШПИГУН 🕵️";
                document.getElementById('card-display').innerHTML = "Твоє завдання: дізнатися карту за 5 хвилин!";
                renderGuessGrid(cards);
            } else {
                document.getElementById('card-display').innerHTML = `
                    <h2 style="color:var(--accent)">${myCard.n}</h2>
                    <p>❤️ HP: ${myCard.hp}</p>
                    <p>⚔️ DMG: ${myCard.dmg}</p>
                    <p>⚡ Speed: ${myCard.spd}</p>
                    <p>💎 Рідкість: ${myCard.rar}</p>
                `;
            }
            nav('scr-game', document.getElementById('nav-game'));
            startTimer();
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const itv = setInterval(() => {
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                timerEl.innerText = `${m}:${s<10?'0'+s:s}`;
                if(timeLeft <= 0) { clearInterval(itv); showToast("ЧАС ВИЙШОВ!"); }
                timeLeft--;
            }, 1000);
        }

        function sendMsg() {
            const inp = document.getElementById('chat-msg'), win = document.getElementById('chat-window');
            if(!inp.value) return;
            win.innerHTML += `<div class="msg"><b>Ви:</b> ${inp.value}</div>`;
            win.scrollTop = win.scrollHeight;
            inp.value = "";
            
            document.getElementById('turn-info').innerText = "Пише Player_99...";
            document.getElementById('turn-info').style.color = "#64748b";
            document.getElementById('send-btn').disabled = true;
            setTimeout(() => {
                document.getElementById('turn-info').innerText = "Ваша черга";
                document.getElementById('turn-info').style.color = "#4ade80";
                document.getElementById('send-btn').disabled = false;
            }, 4000);
        }

        function renderGuessGrid(list) {
            const grid = document.getElementById('guess-grid');
            grid.innerHTML = list.map(c => `<div class="guess-item" onclick="makeGuess('${c.n}')">${c.n}</div>`).join('');
        }

        function makeGuess(name) {
            tg.showConfirm(`Впевнений, що це ${name}?`, (ok) => {
                if(ok) {
                    if(name === myCard.n) {
                        showToast("🎉 ПЕРЕМОГА! Ти вгадав карту.");
                    } else {
                        showToast("❌ ПРОГРАШ! Ти помилився.");
                    }
                    nav('scr-game');
                }
            });
        }
    </script>
</body>
</html>
