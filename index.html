<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v4.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Динамічне сповіщення зверху */
        #status-toast { position: fixed; top: -100px; left: 10px; right: 10px; padding: 15px; border-radius: 12px; color: white; text-align: center; font-weight: bold; z-index: 11000; transition: top 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #status-toast.show { top: 15px; }

        .tab-bar { display: flex; background: #161f32; border-bottom: 1px solid #2d3748; height: 60px; flex-shrink: 0; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: white; opacity: 0.5; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; flex-direction: column; }
        .active-screen { display: flex; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 8px 0; color: white; text-transform: uppercase; font-size: 13px; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 16px; text-align: center; margin-bottom: 10px; outline: none; }
        
        /* Адмін панель */
        #admin-panel { position: fixed; top: 70px; right: 10px; width: 220px; background: #1e293b; z-index: 5000; padding: 10px; border: 2px solid var(--accent); border-radius: 12px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .admin-min { height: 40px; overflow: hidden; }
        .admin-row { font-size: 10px; padding: 4px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }

        #chat-window { flex: 1; background: #05070a; overflow-y: auto; padding: 10px; border-radius: 12px; border: 1px solid #1a2236; margin: 10px 0; font-size: 14px; }
        .card-box { background: var(--card); padding: 15px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; margin-bottom: 10px; }
        #guess-menu { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #161f32; padding: 10px; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="status-toast"></div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <b style="color:var(--accent); font-size:11px;">ADMIN MONITOR</b>
            <button onclick="document.getElementById('admin-panel').classList.toggle('admin-min')" style="color:white; background:#334155; border:none; padding: 2px 8px; border-radius: 5px;">[_]</button>
        </div>
        <div id="admin-live-view" style="margin-bottom: 10px; background: #0f172a; border-radius: 8px; padding: 5px; max-height: 150px; overflow-y: auto;">
            <p style="font-size: 9px; color: #94a3b8; text-align: center;">Очікування гри...</p>
        </div>
        <div id="admin-player-select" style="max-height: 80px; overflow-y: auto; margin-bottom: 10px;"></div>
        <button class="btn btn-blue" style="padding:8px; font-size:10px; height:auto;" onclick="addTestBot()">+ ДОДАТИ БОТА</button>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
        <div class="tab" onclick="switchTab('cards', this)">КАРТИ</div>
        <div class="tab" onclick="switchTab('profile', this)">ПРОФІЛЬ</div>
    </div>

    <div id="scr-game" class="screen active-screen">
        <div id="menu-area">
            <h2 style="text-align:center; color:var(--accent); margin-bottom: 20px;">CLASH SPY</h2>
            <button class="btn btn-green" id="btn-create" onclick="createLobby()">Створити кімнату</button>
            <div style="margin-top: 20px;">
                <input type="number" id="lobby-input" placeholder="Код кімнати">
                <button class="btn btn-blue" onclick="joinLobby()">Приєднатися</button>
            </div>
            <p onclick="secretClick()" style="text-align:center; opacity:0.1; font-size:10px; margin-top:40px;">V.4.2.0</p>
        </div>

        <div id="lobby-area" style="display:none; flex-direction:column; height:100%;">
            <h2 id="room-code-label" style="text-align:center; color:var(--accent); margin-bottom: 15px;">----</h2>
            <div id="player-list" style="flex:1;"></div>
            <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">ПОЧАТИ ГРУ</button>
        </div>

        <div id="play-area" style="display:none; flex-direction:column; height:100%;">
            <div id="role-card" class="card-box"></div>
            <div id="guess-menu"></div>
            <div id="chat-window"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chat-input" placeholder="Напишіть щось..." style="flex:1; margin:0; text-align: left;">
                <button class="btn btn-blue" onclick="sendMsg()" style="width:60px; margin:0;">➜</button>
            </div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button id="vote-btn-toggle" class="btn btn-red" style="flex:1;" onclick="toggleVoting()">ГОЛОСУВАТИ</button>
                <button id="spy-guess-toggle" class="btn btn-green" style="flex:1; display:none;" onclick="toggleGuessMenu()">ВГАДАТИ</button>
            </div>
            <div id="vote-ui" style="display:none; margin-top:10px; background:rgba(0,0,0,0.4); padding:10px; border-radius:12px;">
                <div id="vote-players-list"></div>
            </div>
        </div>
    </div>

    <div id="scr-cards" class="screen">
        <h2 style="color:var(--accent); margin-bottom: 15px;">Локації</h2>
        <div id="cards-list"></div>
    </div>

    <div id="scr-profile" class="screen">
        <div id="prof-card" class="card-box" style="margin-top: 20px;"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const db = firebase.database();
    const uID = (tg.initDataUnsafe?.user?.id || "dev_" + Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";
    
    let roomID = null;
    let isHost = false;
    let selectedSpyByAdmin = null;
    let hasVoted = false;
    const cards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма"];

    document.getElementById('cards-list').innerHTML = cards.map(c => `<div style="padding:15px; background:var(--card); margin-bottom:8px; border-radius:10px;">${c}</div>`).join('');

    function secretClick() {
        window.sc = (window.sc || 0) + 1;
        if(window.sc >= 5) { document.getElementById('admin-panel').style.display = 'block'; window.sc = 0; }
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + tabId).classList.add('active-screen');
        el.classList.add('active');
    }

    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
        setupRoom();
    }

    async function joinLobby() {
        const val = document.getElementById('lobby-input').value;
        if(!val) return;
        roomID = val; isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('menu-area').style.display = 'none';
        document.getElementById('lobby-area').style.display = 'flex';
        document.getElementById('room-code-label').innerText = "КІМНАТА: " + roomID;
        db.ref('rooms/' + roomID + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + roomID).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            
            // Список гравців у лобі
            const list = document.getElementById('player-list');
            const admList = document.getElementById('admin-player-select');
            const liveView = document.getElementById('admin-live-view');
            
            list.innerHTML = ""; admList.innerHTML = "";
            let pCount = 0;
            let liveHTML = `<div style="color:var(--accent); font-size:9px; margin-bottom:4px;">КАРТА: ${data.cardName || '???'}</div>`;

            Object.keys(data.players).forEach(id => {
                pCount++;
                const p = data.players[id];
                list.innerHTML += `<div style="padding:12px; background:var(--card); margin-bottom:5px; border-radius:10px;">👤 ${p.name}</div>`;
                admList.innerHTML += `<button onclick="selectedSpyByAdmin='${id}';alert('Шпигун: ${p.name}')" style="display:block; width:100%; font-size:9px; margin-bottom:2px; padding:4px;">${p.name}</button>`;
                
                // Live View для адміна
                let roleLabel = (id === data.spyID) ? "<b style='color:var(--red)'>ШПИГУН</b>" : "<b style='color:var(--green)'>МИРНИЙ</b>";
                liveHTML += `<div class="admin-row"><span>${p.name}</span><span>${roleLabel}</span></div>`;
            });
            
            liveView.innerHTML = liveHTML;

            if(isHost) {
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('start-btn').disabled = pCount < 2;
            }

            if(data.status === 'started') renderGame(data);
            if(data.winner) handleGameEnd(data.winner, data.endReason);
        });
    }

    function startGame() {
        const card = cards[Math.floor(Math.random()*cards.length)];
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let ids = []; snap.forEach(p => ids.push(p.key));
            const spy = selectedSpyByAdmin || ids[Math.floor(Math.random()*ids.length)];
            db.ref('rooms/' + roomID).update({ status: 'started', spyID: spy, cardName: card });
        });
    }

    function renderGame(data) {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'flex';
        const isSpy = data.spyID === uID;
        
        document.getElementById('role-card').innerHTML = isSpy ? 
            `<h2 style="color:var(--red);">ТИ ШПИГУН 🕵️</h2>` : 
            `<p style="font-size:12px; opacity:0.6;">ВАША КАРТА:</p><h2 style="color:var(--green);">${data.cardName}</h2>`;
        
        if(isSpy) {
            document.getElementById('spy-guess-toggle').style.display = 'block';
            const gMenu = document.getElementById('guess-menu');
            gMenu.innerHTML = cards.map(c => `<button class="btn btn-blue" style="padding:10px; font-size:10px; margin:0;" onclick="makeGuess('${c}')">${c}</button>`).join('');
        }

        const vList = document.getElementById('vote-players-list');
        vList.innerHTML = "";
        Object.keys(data.players).forEach(id => {
            if(id !== uID) vList.innerHTML += `<button class="btn btn-blue" style="padding:10px;" onclick="castVote('${id}')">${data.players[id].name}</button>`;
        });

        db.ref('rooms/' + roomID + '/chat').off();
        db.ref('rooms/' + roomID + '/chat').on('child_added', snap => {
            const m = snap.val();
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div><b>${m.u}:</b> ${m.msg}</div>`;
            win.scrollTop = 9999;
        });
    }

    function showToast(text, type) {
        const t = document.getElementById('status-toast');
        t.innerText = text;
        t.style.background = (type === 'win') ? 'var(--green)' : 'var(--red)';
        t.classList.add('show');
    }

    function handleGameEnd(winner, reason) {
        const isSpy = document.getElementById('role-card').innerText.includes("ШПИГУН");
        let resultType = "";
        let finalMsg = "";

        if(winner === 'spy') {
            resultType = isSpy ? 'win' : 'lose';
            finalMsg = isSpy ? `ПЕРЕМОГА: ${reason}` : `ПОРАЗКА: ${reason}`;
        } else {
            resultType = isSpy ? 'lose' : 'win';
            finalMsg = isSpy ? `ПОРАЗКА: ${reason}` : `ПЕРЕМОГА: ${reason}`;
        }

        showToast(finalMsg, resultType);
        
        if(resultType === 'win') db.ref('users/' + uID + '/wins').transaction(c => (c||0)+1);

        setTimeout(() => {
            db.ref('rooms/' + roomID).off();
            db.ref('rooms/' + roomID).remove();
            location.reload();
        }, 4000);
    }

    function castVote(targetID) {
        if(hasVoted) return;
        hasVoted = true;
        db.ref('rooms/' + roomID + '/votes/' + targetID).transaction(c => (c || 0) + 1);
        document.getElementById('vote-ui').style.display = 'none';
        
        // Авто-голосування ботів
        db.ref('rooms/' + roomID + '/players').once('value', s => {
            s.forEach(p => {
                if(p.key.startsWith('bot_')) {
                    let targets = Object.keys(s.val()).filter(id => id !== p.key);
                    let rand = targets[Math.floor(Math.random()*targets.length)];
                    db.ref('rooms/' + roomID + '/votes/' + rand).transaction(c => (c||0)+1);
                }
            });
            checkFinalVotes();
        });
    }

    function checkFinalVotes() {
        db.ref('rooms/' + roomID).once('value', snap => {
            const d = snap.val();
            let total = 0; Object.values(d.votes || {}).forEach(v => total += v);
            if(total >= Object.keys(d.players).length) {
                let max = 0, kicked = "";
                Object.keys(d.votes).forEach(id => { if(d.votes[id] > max) { max = d.votes[id]; kicked = id; } });
                if(kicked === d.spyID) {
                    db.ref('rooms/' + roomID).update({ winner: 'citizens', endReason: 'Шпигуна вигнано!' });
                } else {
                    db.ref('rooms/' + roomID).update({ winner: 'spy', endReason: 'Вигнали мирного!' });
                }
            }
        });
    }

    function makeGuess(card) {
        db.ref('rooms/' + roomID).once('value', snap => {
            if(card === snap.val().cardName) {
                db.ref('rooms/' + roomID).update({ winner: 'spy', endReason: 'Шпигун вгадав карту!' });
            } else {
                db.ref('rooms/' + roomID).update({ winner: 'citizens', endReason: 'Шпигун не вгадав карту!' });
            }
        });
    }

    function toggleGuessMenu() {
        const m = document.getElementById('guess-menu');
        m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
    }

    function toggleVoting() {
        const m = document.getElementById('vote-ui');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + roomID + '/chat').push({ u: uName, msg: i.value });
        i.value = "";
    }

    function addTestBot() {
        if(!roomID) return;
        const bID = "bot_" + Math.floor(Math.random()*999);
        db.ref('rooms/' + roomID + '/players/' + bID).set({ name: "🤖 Бот " + bID });
    }

    // Профіль
    db.ref('users/' + uID).update({ name: uName });
    db.ref('users/' + uID).on('value', snap => {
        const d = snap.val() || { wins: 0 };
        document.getElementById('prof-card').innerHTML = `<h2>${uName}</h2><br><h1 style="font-size:45px;">🏆 ${d.wins || 0}</h1><p>ПЕРЕМОГ</p>`;
    });
</script>
</body>
</html>
