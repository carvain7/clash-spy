<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v6.1.0 - Store & Coins</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --gold: #ffd700; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { display: none; flex: 1; padding: 15px; overflow-y: auto; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .tab-bar { display: flex; background: #161f32; height: 60px; border-bottom: 2px solid #2d3748; flex-shrink: 0; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; opacity: 0.5; cursor: pointer; transition: 0.3s; text-align: center; }
        .tab.active { opacity: 1; color: var(--accent); border-bottom: 3px solid var(--accent); }
        
        .active-screen { display: flex; flex-direction: column; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; margin-bottom: 8px; transition: 0.2s; position: relative; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        .btn-gold { background: var(--gold); color: #000; }
        
        .vote-count { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: white; color: var(--red); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; font-weight: 900; border: 2px solid var(--red); }
        
        .card-item { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #2d3748; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #2d3748; background: #111827; color: white; text-align: center; margin-bottom: 10px; }
        
        #adm-btn { position: fixed; bottom: 80px; right: 20px; width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 20px; }
        #adm-panel { position: fixed; bottom: 135px; right: 20px; width: 280px; background: #1e293b; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; display: none; z-index: 1001; }
        .adm-tabs { display: flex; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid #475569; }
        .adm-tab { font-size: 10px; padding: 5px 10px; cursor: pointer; opacity: 0.5; }
        .adm-tab.active { opacity: 1; color: var(--accent); }
        
        #chat-stream { flex: 1; background: #05070a; border-radius: 12px; padding: 10px; margin: 10px 0; overflow-y: auto; border: 1px solid #2d3748; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; background: #1e293b; font-size: 14px; }
        .msg-bubble.mine { align-self: flex-end; border-right: 3px solid var(--blue); background: #26334d; }
        
        #toast { position: fixed; top: -100px; left: 15px; right: 15px; padding: 15px; border-radius: 12px; text-align: center; z-index: 10000; transition: 0.5s; font-weight: bold; }
        #toast.active { top: 20px; }

        .coin-balance { color: var(--gold); font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div class="adm-tabs">
        <div class="adm-tab active" id="at-btn" onclick="setAdmTab('btns')">КНОПКИ</div>
        <div class="adm-tab" id="at-info" onclick="setAdmTab('info')">ІНФО</div>
        <div style="margin-left:auto;" onclick="toggleAdm()">✕</div>
    </div>
    <div id="adm-content-btns">
        <button class="btn btn-blue" style="font-size:10px;" onclick="addBot()">+ БОТ</button>
        <button class="btn btn-green" style="font-size:10px;" onclick="forceBotVotes()">ПЕРЕДАТИ ГОЛОСИ</button>
        <button class="btn btn-red" style="font-size:10px;" onclick="stopGame()">ЛОБІ</button>
    </div>
    <div id="adm-content-info" style="display:none; font-size:11px;" id="adm-data-display"></div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
    <div class="tab" onclick="switchTab('cards', this)">КАРТИ</div>
    <div class="tab" onclick="switchTab('store', this)">МАГАЗИН</div>
    <div class="tab" onclick="switchTab('prof', this)">ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu">
        <h1 onclick="devMode()" style="text-align:center; color:var(--accent); margin: 30px 0;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ</button>
        <input type="number" id="room-input" placeholder="Код">
        <button class="btn btn-blue" onclick="joinRoom()">УВІЙТИ</button>
    </div>
    <div id="view-lobby" style="display:none;">
        <div class="card-item" style="text-align:center; display:block;">Код: <b id="room-id-txt" style="color:var(--accent); font-size:24px;"></b></div>
        <div id="lobby-players"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none;" onclick="startGame()">ПОЧАТИ</button>
    </div>
    <div id="view-play" style="display:none; flex-direction:column; height:100%;">
        <div id="role-info" class="card-item"></div>
        <div id="chat-stream"></div>
        <div style="display:flex; gap:5px;"><input type="text" id="chat-input" placeholder="Хід..."><button onclick="sendMsg()" class="btn btn-blue" style="width:50px;">➜</button></div>
        <button class="btn btn-red" onclick="toggleV()">ГОЛОСУВАТИ</button>
        <div id="v-list" style="display:none;"></div>
    </div>
</div>

<div id="scr-cards" class="screen"><div id="cards-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div></div>

<div id="scr-store" class="screen">
    <h2 style="text-align:center; color:var(--gold);">МАГАЗИН</h2>
    <div style="margin-top:20px; text-align:center; opacity:0.5;">
        <p>Наразі товарів немає.</p>
        <p>Заходьте пізніше!</p>
    </div>
</div>

<div id="scr-prof" class="screen">
    <div id="prof-data"></div>
    <button class="btn btn-blue" onclick="toggleTop()">🏆 ТОП ГРАВЦІВ</button>
    <div id="top-container" style="display:none; background:#111827; padding:10px; border-radius:12px; margin-top:10px;"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "u"+Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Плазмовий дракон", "Рицар", "Гігант", "Скелети", "Кулька", "Мушкетер", "Кат", "Торнадо"];

    let room = null, isHost = false, myVoted = false, myWins = 0, myCoins = 0;

    function devMode() { dClicks++; if(dClicks>=5) { document.getElementById('adm-btn').style.display='flex'; dClicks=0; } }
    let dClicks = 0;
    function toggleAdm() { const p=document.getElementById('adm-panel'); p.style.display=p.style.display==='block'?'none':'block'; }
    function setAdmTab(t) {
        document.getElementById('adm-content-btns').style.display = t==='btns'?'block':'none';
        document.getElementById('adm-content-info').style.display = t==='info'?'block':'none';
    }

    function switchTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active-screen');
        el.classList.add('active');
    }

    async function createRoom() {
        room = Math.floor(1000 + Math.random()*8999).toString(); isHost = true;
        await db.ref('rooms/' + room).set({ host: uID, status: 'lobby' }); initRoom();
    }
    function joinRoom() { room = document.getElementById('room-input').value; if(room.length < 4) return; initRoom(); }

    function initRoom() {
        document.getElementById('view-menu').style.display = 'none';
        document.getElementById('view-lobby').style.display = 'block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/' + room + '/players/' + uID).set({ name: uName, rank: getRank(myWins) });

        db.ref('rooms/' + room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const ids = Object.keys(d.players || {});
            document.getElementById('lobby-players').innerHTML = ids.map(id => `<div class="card-item">${d.players[id].name}</div>`).join('');
            if(isHost) { document.getElementById('start-btn').style.display='block'; document.getElementById('start-btn').disabled=ids.length<3; }
            if(d.status==='started') { document.getElementById('view-lobby').style.display='none'; document.getElementById('view-play').style.display='flex'; renderGame(d); }
            else { document.getElementById('view-lobby').style.display='block'; document.getElementById('view-play').style.display='none'; }
            if(d.winner) showEnd(d.winner, d.reason);
        });

        db.ref('rooms/' + room + '/chat').on('value', s => {
            const stream = document.getElementById('chat-stream'); stream.innerHTML = "";
            s.forEach(m => { stream.innerHTML += `<div class="msg-bubble ${m.val().uid===uID?'mine':''}"><b>${m.val().u}:</b><br>${m.val().m}</div>`; });
            stream.scrollTop = stream.scrollHeight;
        });
    }

    function startGame() {
        db.ref('rooms/' + room + '/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/' + room).update({ status: 'started', spyID: ids[Math.floor(Math.random()*ids.length)], cardName: allCards[Math.floor(Math.random()*allCards.length)], turnIdx: 0, order: ids, votes: null, winner: null });
        });
    }

    function renderGame(d) {
        const isSpy = d.spyID === uID;
        document.getElementById('role-info').innerHTML = isSpy ? `<h2 style="color:var(--red)">🕵️ ТИ ШПИГУН</h2>` : `<div><small>КАРТА:</small><h2>${d.cardName}</h2></div>`;
        const vts = d.votes || {};
        document.getElementById('v-list').innerHTML = d.order.filter(id=>id!==uID).map(id => {
            const count = vts[id] || 0;
            return `<button class="btn btn-blue" onclick="vote('${id}')" ${myVoted?'disabled':''}>${d.players[id].name} ${count>0?`<div class="vote-count">${count}</div>`:''}</button>`;
        }).join('');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        db.ref('rooms/' + room).once('value', s => {
            db.ref('rooms/' + room + '/chat').push({ u: uName, uid: uID, m: inp.value });
            db.ref('rooms/' + room).update({ turnIdx: (s.val().turnIdx + 1) % s.val().order.length });
            inp.value = "";
        });
    }

    function toggleV() { const x=document.getElementById('v-list'); x.style.display=x.style.display==='block'?'none':'block'; }

    function vote(tid) {
        if(myVoted) return; myVoted = true;
        db.ref('rooms/' + room + '/votes/' + tid).transaction(v => (v||0)+1);
        db.ref('rooms/' + room + '/votes/voted_by_' + uID).set(true);
        checkVotes();
    }

    function checkVotes() {
        db.ref('rooms/' + room).once('value', s => {
            const d = s.val(); if(!d || d.winner) return;
            const votesCount = d.votes ? Object.keys(d.votes).filter(k=>k.startsWith('voted_by_')).length : 0;
            if(votesCount >= d.order.length) {
                let max = -1, target = "";
                d.order.forEach(id => { if((d.votes[id]||0) > max) { max = d.votes[id]||0; target = id; } });
                if(target === d.spyID) db.ref('rooms/'+room).update({winner:'civ', reason:'Шпигуна викрито!'});
                else db.ref('rooms/'+room).update({winner:'spy', reason:'Вигнали мирного!'});
            }
        });
    }

    function showEnd(w, r) {
        const t = document.getElementById('toast');
        t.innerText = r; t.style.background = w==='spy'?'var(--red)':'var(--green)'; t.classList.add('active');
        
        // Нагорода за перемогу
        if(w === 'civ' && dSpyID() !== uID) { giveReward(); }
        if(w === 'spy' && dSpyID() === uID) { giveReward(); }

        setTimeout(() => { t.classList.remove('active'); myVoted=false; if(isHost) stopGame(); }, 4000);
    }

    function giveReward() {
        db.ref('users_v2/' + uID).transaction(u => {
            if(u) {
                u.wins = (u.wins || 0) + 1;
                u.coins = (u.coins || 0) + 50;
            }
            return u;
        });
    }

    function dSpyID() { let id=""; db.ref('rooms/'+room+'/spyID').once('value', s=>id=s.val()); return id; }

    // АДМІНКА: ПЕРЕДАТИ ГОЛОС (ПРАЦЮЄ!)
    function forceBotVotes() {
        db.ref('rooms/' + room).once('value', s => {
            const d = s.val(); if(!d || d.status !== 'started') return;
            const players = d.order;
            const bots = Object.keys(d.players).filter(id => d.players[id].isBot);
            
            bots.forEach(bid => {
                if(!d.votes || !d.votes['voted_by_'+bid]) {
                    const possibleTargets = players.filter(p => p !== bid);
                    const randomTarget = possibleTargets[Math.floor(Math.random()*possibleTargets.length)];
                    db.ref('rooms/'+room+'/votes/'+randomTarget).transaction(v=>(v||0)+1);
                    db.ref('rooms/'+room+'/votes/voted_by_'+bid).set(true);
                }
            });
            checkVotes();
            tg.HapticFeedback.notificationOccurred('success');
        });
    }

    function addBot() { 
        if(!room) return; 
        const id="bot_"+Math.floor(Math.random()*9999); 
        db.ref('rooms/'+room+'/players/'+id).set({name: "Bot_"+id.substr(4), rank: "🤖 БОТ", isBot: true}); 
    }
    
    function stopGame() { db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null}); }

    function getRank(w) { return w>=15?"👑 Король":w>=10?"⚔️ Майстер":w>=5?"🛡️ Лицар":"🌱 Новачок"; }

    window.onload = () => {
        db.ref('users_v2/' + uID).on('value', s => {
            const data = s.val() || { wins: 0, coins: 0 };
            myWins = data.wins || 0; myCoins = data.coins || 0;
            document.getElementById('prof-data').innerHTML = `
                <div class="card-item" style="flex-direction:column; padding:30px; text-align:center;">
                    <h2>${uName}</h2>
                    <div class="coin-balance">🪙 ${myCoins}</div>
                    <p style="margin:10px 0;">${getRank(myWins)}</p>
                    <h1 style="color:var(--accent); font-size:48px;">${myWins}</h1><p>Перемог</p>
                </div>`;
        });
        const grid = document.getElementById('cards-grid');
        allCards.forEach(c => grid.innerHTML += `<div class="card-item">${c}</div>`);
    };

    function toggleTop() {
        const c = document.getElementById('top-container');
        if(c.style.display==='block'){c.style.display='none';return;}
        c.style.display='block'; c.innerHTML="Завантаження...";
        db.ref('users_v2').orderByChild('wins').limitToLast(10).once('value', s => {
            let u = []; s.forEach(x=>{u.push({n:x.val().name||'Анонім', w:x.val().wins||0})});
            u.reverse(); c.innerHTML = u.map((x,i)=>`<div>#${i+1} ${x.n} - ${x.w} 🏆</div>`).join('');
        });
    }
</script>
</body>
</html>
