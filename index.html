<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #161f32; border-bottom: 1px solid #2d3748; min-height: 50px; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: white; opacity: 0.5; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        .screen { display: none; flex: 1; padding: 15px; overflow-y: auto; flex-direction: column; }
        .active-screen { display: flex; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; color: white; text-transform: uppercase; font-size: 14px; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        .btn:active { transform: scale(0.98); }

        input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 16px; text-align: center; margin-bottom: 10px; outline: none; }
        
        #admin-panel { position: fixed; top: 60px; right: 10px; width: 180px; background: #1e293b; z-index: 1000; padding: 10px; border: 2px solid var(--accent); border-radius: 10px; display: none; pointer-events: all; }
        #chat-window { flex: 1; background: #05070a; overflow-y: auto; padding: 10px; border-radius: 10px; border: 1px solid #1a2236; margin: 10px 0; height: 200px; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--accent); margin-bottom:5px;">
            <b>ADMIN PANEL</b>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="color:white; background:none; border:none;">✖</button>
        </div>
        <div id="admin-info" style="font-size:10px; color:#00ffcc; margin-bottom:5px;"></div>
        <button class="btn btn-blue" style="padding:5px; height:30px; font-size:10px;" onclick="addTestBot()">+ БОТ</button>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
        <div class="tab" onclick="switchTab('cards', this)">КАРТИ</div>
        <div class="tab" onclick="switchTab('profile', this)">ПРОФІЛЬ</div>
    </div>

    <div id="scr-game" class="screen active-screen">
        <div id="menu-area">
            <h2 style="text-align:center; color:var(--accent);">CLASH SPY 🕵️</h2>
            <button class="btn btn-green" onclick="createLobby()">Створити кімнату</button>
            <div style="margin-top:20px;">
                <input type="number" id="lobby-input" placeholder="Код лобі">
                <button class="btn btn-blue" onclick="joinLobby()">Приєднатися</button>
            </div>
            <p onclick="secretClick()" style="text-align:center; opacity:0.1; font-size:10px; margin-top:50px;">V.3.1.2 (FIXED)</p>
        </div>

        <div id="lobby-area" style="display:none; flex-direction:column; height:100%;">
            <h1 id="room-code-label" style="text-align:center; color:var(--accent); margin:0;">----</h1>
            <div id="player-list" style="flex:1; margin:15px 0;"></div>
            <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">ПОЧАТИ ГРУ</button>
        </div>

        <div id="play-area" style="display:none; flex-direction:column; height:100%;">
            <div id="role-card" style="background:var(--card); padding:20px; border-radius:15px; border:2px solid var(--accent); text-align:center;"></div>
            <button id="spy-guess-btn" class="btn btn-red" style="display:none; margin-top:10px;" onclick="spyGuess()">ВГАДАТИ КАРТУ</button>
            <div id="chat-window"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="Питання..." style="flex:1; margin:0; text-align:left;">
                <button class="btn btn-blue" onclick="sendMsg()" style="width:60px; margin:0;">➜</button>
            </div>
        </div>
    </div>

    <div id="scr-cards" class="screen">
        <h2 style="color:var(--accent)">Локації</h2>
        <div id="cards-list"></div>
    </div>

    <div id="scr-profile" class="screen">
        <div id="prof-card" style="background:var(--card); padding:20px; border-radius:15px; text-align:center; border:2px solid var(--accent);"></div>
    </div>

<script>
    // Ініціалізація
    const tg = window.Telegram.WebApp;
    tg.expand();

    const firebaseConfig = { databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const uID = (tg.initDataUnsafe?.user?.id || "dev_" + Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";
    
    let roomID = null;
    let isHost = false;
    let clickCount = 0;
    const cards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма"];

    document.getElementById('cards-list').innerHTML = cards.map(c => `<div style="padding:12px; background:#1c2538; margin-bottom:5px; border-radius:8px;">${c}</div>`).join('');

    function secretClick() {
        clickCount++;
        if(clickCount >= 5) {
            document.getElementById('admin-panel').style.display = 'block';
            clickCount = 0;
        }
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + tabId).classList.add('active-screen');
        el.classList.add('active');
    }

    // ОСНОВНА ФУНКЦІЯ: СТВОРЕННЯ КІМНАТИ
    async function createLobby() {
        try {
            roomID = Math.floor(1000 + Math.random() * 8999).toString();
            isHost = true;
            await db.ref('rooms/' + roomID).set({
                host: uID,
                status: 'lobby',
                createdAt: Date.now()
            });
            setupRoom();
        } catch (e) {
            alert("Помилка бази: " + e.message);
        }
    }

    async function joinLobby() {
        const val = document.getElementById('lobby-input').value;
        if(!val) return alert("Введіть код!");
        const snap = await db.ref('rooms/' + val).once('value');
        if(!snap.exists()) return alert("Кімнати не існує!");
        roomID = val; isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('menu-area').style.display = 'none';
        document.getElementById('lobby-area').style.display = 'flex';
        document.getElementById('room-code-label').innerText = roomID;
        
        db.ref('rooms/' + roomID + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + roomID + '/players').on('value', snap => {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            let pCount = 0;
            snap.forEach(p => {
                pCount++;
                list.innerHTML += `<div style="padding:10px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:5px;">👤 ${p.val().name}</div>`;
            });
            if(isHost) {
                const sBtn = document.getElementById('start-btn');
                sBtn.style.display = 'block';
                sBtn.disabled = pCount < 2;
            }
        });

        db.ref('rooms/' + roomID + '/status').on('value', snap => {
            if(snap.val() === 'started') {
                db.ref('rooms/' + roomID).once('value', s => renderGame(s.val()));
            }
        });
    }

    function startGame() {
        const card = cards[Math.floor(Math.random()*cards.length)];
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let ids = [];
            snap.forEach(p => ids.push(p.key));
            const spy = ids[Math.floor(Math.random()*ids.length)];
            db.ref('rooms/' + roomID).update({ status: 'started', spyID: spy, cardName: card });
        });
    }

    function renderGame(data) {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'flex';
        
        const isSpy = data.spyID === uID;
        document.getElementById('role-card').innerHTML = isSpy ? 
            `<h2 style="color:var(--red); margin:0;">ТИ ШПИГУН 🕵️</h2>` : 
            `<p style="margin:0; opacity:0.6;">КАРТА:</p><h2 style="margin:0; color:var(--green);">${data.cardName}</h2>`;
        
        if(isSpy) document.getElementById('spy-guess-btn').style.display = 'block';

        let infoTxt = `КАРТА: ${data.cardName}<br>---<br>`;
        Object.keys(data.players).forEach(id => {
            infoTxt += `${data.players[id].name}: ${id === data.spyID ? '🕵️' : '👤'}<br>`;
        });
        document.getElementById('admin-info').innerHTML = infoTxt;

        db.ref('rooms/' + roomID + '/chat').off();
        db.ref('rooms/' + roomID + '/chat').on('child_added', snap => {
            const m = snap.val();
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div><b>${m.u}:</b> ${m.msg}</div>`;
            win.scrollTop = win.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + roomID + '/chat').push({ u: uName, msg: i.value });
        i.value = "";
    }

    function addTestBot() {
        if(!roomID) return;
        const bID = "bot_" + Math.floor(Math.random()*999);
        db.ref('rooms/' + roomID + '/players/' + bID).set({ name: "🤖 Бот_" + bID });
    }

    function spyGuess() {
        const g = prompt("Назва карти:");
        if(!g) return;
        db.ref('rooms/' + roomID).once('value', snap => {
            if(g.trim().toLowerCase() === snap.val().cardName.toLowerCase()) {
                alert("ПЕРЕМОГА!");
                db.ref('users/' + uID + '/wins').transaction(c => (c||0)+1);
            } else {
                alert("ПРОГРАШ!");
            }
            db.ref('rooms/' + roomID).remove().then(() => location.reload());
        });
    }

    // Профіль
    db.ref('users/' + uID).update({ name: uName });
    db.ref('users/' + uID).on('value', snap => {
        const d = snap.val() || { wins: 0 };
        document.getElementById('prof-card').innerHTML = `<h2>${uName}</h2><div style="font-size:35px;">🏆 ${d.wins || 0}</div>`;
    });

</script>
</body>
</html>
