<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v5.3.2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #161f32; height: 60px; border-bottom: 2px solid #2d3748; flex-shrink: 0; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; opacity: 0.4; cursor: pointer; }
        .tab.active { opacity: 1; color: var(--accent); border-bottom: 3px solid var(--accent); }

        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 14px; margin-bottom: 12px; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        
        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #2d3748; background: #111827; color: white; text-align: center; font-size: 16px; margin-bottom: 15px; }

        .card-item { background: var(--card); padding: 18px; border-radius: 14px; border: 1px solid #2d3748; margin-bottom: 10px; position: relative; }
        .v-badge { position: absolute; right: 15px; top: 18px; background: var(--red); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }

        #adm-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 24px; }
        #adm-panel { position: fixed; bottom: 80px; right: 20px; width: 260px; background: #1e293b; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; display: none; z-index: 1001; }

        #chat-display { flex: 1; background:#05070a; border-radius:12px; padding:10px; margin: 10px 0; overflow-y:auto; border:1px solid #2d3748; font-size: 14px; }
        #guess-grid { display: none; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #161f32; border-radius: 14px; margin-bottom: 10px; }
        
        #toast { position: fixed; top: -100px; left: 10px; right: 10px; padding: 15px; border-radius: 12px; text-align: center; z-index: 10000; transition: 0.5s; font-weight: bold; }
        #toast.show { top: 20px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>ADMIN</b> <span onclick="toggleAdm()">✕</span></div>
    <div id="adm-live" style="font-size:11px; margin-bottom:10px; background:#0f172a; padding:8px; border-radius:8px;"></div>
    <button class="btn btn-blue" style="padding:10px;" onclick="addBot()">+ ДОДАТИ БОТА</button>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
    <div class="tab" onclick="switchTab('cards', this)">КАРТИ</div>
    <div class="tab" onclick="switchTab('prof', this)">ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="ui-menu">
        <h1 id="title" style="text-align:center; color:var(--accent); margin: 20px 0; cursor:pointer;" onclick="clickVer()">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
        <input type="number" id="room-input" placeholder="Код кімнати">
        <button class="btn btn-blue" onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
    </div>

    <div id="ui-lobby" style="display:none; flex-direction:column; height:100%;">
        <div class="card-item" style="text-align:center;">
            <p style="opacity:0.6; font-size:12px;">КОД КІМНАТИ:</p>
            <h2 id="room-code" style="color:var(--accent); font-size:32px;">0000</h2>
        </div>
        <div id="p-list" style="flex:1; margin-top:10px;"></div>
        <div style="height: 30px;"></div>
        <button id="btn-start" class="btn btn-blue" style="display:none;" onclick="startGame()">ПОЧАТИ ГРУ</button>
    </div>

    <div id="ui-play" style="display:none; flex-direction:column; height:100%;">
        <div id="role-card" class="card-item" style="border: 2px solid var(--accent); text-align:center;"></div>
        <div id="guess-grid"></div>
        <div id="chat-display"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Ваше питання..." style="flex:1; margin:0; text-align:left;">
            <button class="btn btn-blue" style="width:60px; margin:0;" onclick="sendChat()">➜</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-red" style="flex:1;" onclick="toggleVote()">ГОЛОСУВАТИ</button>
            <button id="btn-guess-spy" class="btn btn-green" style="flex:1; display:none;" onclick="toggleGuess()">ВГАДАТИ</button>
        </div>
        <div id="vote-options" style="display:none; padding:10px; background:rgba(0,0,0,0.5); border-radius:12px; margin-top:5px;"></div>
    </div>
</div>

<div id="scr-cards" class="screen">
    <h2 style="color:var(--accent); margin-bottom:15px;">Локації</h2>
    <div id="cards-content"></div>
</div>

<div id="scr-prof" class="screen">
    <h2 style="color:var(--accent); margin-bottom:15px;">Профіль</h2>
    <div id="prof-content"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();

    const uID = (tg.initDataUnsafe?.user?.id || "u" + Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";
    const locs = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма"];

    let room = null, isHost = false, hasVoted = false, vClicks = 0;

    function init() {
        document.getElementById('cards-content').innerHTML = locs.map(l => `<div class="card-item">${l}</div>`).join('');
        document.getElementById('guess-grid').innerHTML = locs.map(l => `<button class="btn btn-blue" style="padding:10px; font-size:10px;" onclick="makeGuess('${l}')">${l}</button>`).join('');
        db.ref('users/' + uID + '/wins').on('value', s => renderProf(s.val() || 0));
    }

    function renderProf(w) {
        document.getElementById('prof-content').innerHTML = `<div class="card-item" style="text-align:center; border-color:var(--accent)"><h1>🏆</h1><h2>${uName}</h2><h1 style="color:var(--accent); font-size:40px;">${w}</h1><p>Перемог у Clash Spy</p></div>`;
    }

    function clickVer() {
        vClicks++;
        if(vClicks >= 5) { document.getElementById('adm-btn').style.display = 'flex'; vClicks = 0; alert("Адмінка активована!"); }
    }

    function toggleAdm() { const p = document.getElementById('adm-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

    function switchTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active-screen');
        el.classList.add('active');
    }

    async function createRoom() {
        room = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + room).set({ host: uID, status: 'lobby' });
        listen();
    }

    async function joinRoom() {
        const i = document.getElementById('room-input').value;
        if(!i) return;
        room = i; isHost = false;
        listen();
    }

    function listen() {
        document.getElementById('ui-menu').style.display = 'none';
        document.getElementById('ui-lobby').style.display = 'flex';
        document.getElementById('room-code').innerText = room;
        db.ref('rooms/' + room + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + room).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            const list = document.getElementById('p-list');
            list.innerHTML = "";
            let count = 0;
            let admMsg = `Карта: ${data.cardName || '?'}<br>`;

            Object.keys(data.players).forEach(id => {
                count++;
                const vts = (data.votes && data.votes[id]) ? data.votes[id] : 0;
                list.innerHTML += `<div class="card-item">👤 ${data.players[id].name} ${vts > 0 ? `<span class="v-badge">${vts}</span>` : ''}</div>`;
                if(id === data.spyID) admMsg += `Шпигун: ${data.players[id].name}`;
            });

            document.getElementById('adm-live').innerHTML = admMsg;
            if(isHost) {
                const b = document.getElementById('btn-start');
                b.style.display = 'block';
                b.disabled = count < 3;
            }

            if(data.status === 'started') renderPlay(data);
            if(data.winner) end(data.winner, data.reason);
        });
    }

    function startGame() {
        const c = locs[Math.floor(Math.random() * locs.length)];
        db.ref('rooms/' + room + '/players').once('value', s => {
            const ids = Object.keys(s.val());
            const spy = ids[Math.floor(Math.random() * ids.length)];
            db.ref('rooms/' + room).update({ status: 'started', spyID: spy, cardName: c, votes: {} });
        });
    }

    function renderPlay(data) {
        document.getElementById('ui-lobby').style.display = 'none';
        document.getElementById('ui-play').style.display = 'flex';
        const isSpy = data.spyID === uID;
        document.getElementById('role-card').innerHTML = isSpy ? `<h2 style="color:var(--red)">ТИ ШПИГУН 🕵️</h2>` : `<small>КАРТА:</small><h2 style="color:var(--green)">${data.cardName}</h2>`;
        if(isSpy) document.getElementById('btn-guess-spy').style.display = 'block';

        const vOpts = document.getElementById('vote-options');
        vOpts.innerHTML = "";
        Object.keys(data.players).forEach(id => {
            if(id !== uID) {
                const v = (data.votes && data.votes[id]) ? data.votes[id] : 0;
                vOpts.innerHTML += `<button class="btn btn-blue" onclick="castVote('${id}')" ${hasVoted?'disabled':''}>${data.players[id].name} (${v})</button>`;
            }
        });

        db.ref('rooms/' + room + '/chat').off();
        db.ref('rooms/' + room + '/chat').on('child_added', s => {
            const box = document.getElementById('chat-display');
            box.innerHTML += `<div><b>${s.val().u}:</b> ${s.val().msg}</div>`;
            box.scrollTop = 9999;
        });
    }

    function castVote(tid) {
        if(hasVoted) return;
        hasVoted = true;
        
        // Голос гравця
        db.ref('rooms/' + room + '/votes/' + tid).transaction(c => (c||0)+1);
        
        // АВТОМАТИЧНЕ ГОЛОСУВАННЯ БОТІВ
        db.ref('rooms/' + room + '/players').once('value', s => {
            const players = s.val();
            const pIDs = Object.keys(players);
            
            pIDs.forEach(botId => {
                if(botId.startsWith('bot_')) {
                    const target = pIDs.filter(id => id !== botId)[Math.floor(Math.random()*(pIDs.length-1))];
                    db.ref('rooms/' + room + '/votes/' + target).transaction(c => (c||0)+1);
                }
            });
            
            setTimeout(checkGameStatus, 500);
        });
        
        document.getElementById('vote-options').style.display = 'none';
    }

    function checkGameStatus() {
        db.ref('rooms/' + room).once('value', s => {
            const d = s.val();
            let total = 0;
            if(d.votes) Object.values(d.votes).forEach(v => total += v);
            
            if(total >= Object.keys(d.players).length) {
                let max = 0, targetId = "";
                Object.keys(d.votes).forEach(id => {
                    if(d.votes[id] > max) { max = d.votes[id]; targetId = id; }
                });
                
                if(targetId === d.spyID) db.ref('rooms/' + room).update({ winner: 'civ', reason: 'Шпигуна вигнано голосуванням!' });
                else db.ref('rooms/' + room).update({ winner: 'spy', reason: 'Вигнали не того гравця!' });
            }
        });
    }

    function makeGuess(c) {
        db.ref('rooms/' + room).once('value', s => {
            if(c === s.val().cardName) db.ref('rooms/' + room).update({ winner: 'spy', reason: 'Шпигун вгадав карту!' });
            else db.ref('rooms/' + room).update({ winner: 'civ', reason: 'Шпигун помилився з назвою карти!' });
        });
    }

    function end(w, r) {
        const isSpy = document.getElementById('role-card').innerText.includes("ШПИГУН");
        const win = (w === 'spy' && isSpy) || (w === 'civ' && !isSpy);
        const t = document.getElementById('toast');
        t.innerText = (win ? "ПЕРЕМОГА: " : "ПОРАЗКА: ") + r;
        t.style.background = win ? 'var(--green)' : 'var(--red)';
        t.classList.add('show');
        if(win) db.ref('users/' + uID + '/wins').transaction(c => (c||0)+1);
        setTimeout(() => location.reload(), 4500);
    }

    function toggleVote() { const v = document.getElementById('vote-options'); v.style.display = v.style.display === 'block' ? 'none' : 'block'; }
    function toggleGuess() { const g = document.getElementById('guess-grid'); g.style.display = g.style.display === 'grid' ? 'none' : 'grid'; }
    
    function sendChat() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(text !== "") {
            db.ref('rooms/' + room + '/chat').push({ u: uName, msg: text });
            input.value = "";
        }
    }

    function addBot() {
        const id = "bot_" + Math.floor(Math.random()*999);
        db.ref('rooms/' + room + '/players/' + id).set({ name: "🤖 Бот " + id });
    }

    window.onload = init;
</script>
</body>
</html>
