<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Master v9.5</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0b101b; --panel: #1c2538; --accent: #fbbf24; 
            --blue-grad: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
            --green-grad: linear-gradient(180deg, #34d399 0%, #059669 100%);
            --red-grad: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        .tab-bar { display: flex; background: #161f32; height: 65px; border-top: 2px solid #2d3748; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #94a3b8; font-weight: bold; }
        .tab.active { color: var(--accent); }

        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        .btn { 
            width: 100%; padding: 14px; border-radius: 14px; border: none; 
            font-weight: 900; color: white; cursor: pointer; margin-bottom: 10px;
            text-transform: uppercase; font-size: 13px; box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .btn-blue { background: var(--blue-grad); border-bottom: 4px solid #1e40af; }
        .btn-green { background: var(--green-grad); border-bottom: 4px solid #065f46; }
        .btn-red { background: var(--red-grad); border-bottom: 4px solid #991b1b; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

        .widget { background: var(--panel); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; margin-bottom: 10px; }

        #chat-stream { flex: 1; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 12px; margin-bottom: 10px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .msg.mine { align-self: flex-end; background: #2563eb; }
        .msg.other { align-self: flex-start; background: #334155; }

        /* ПАНЕЛЬ АДМІНА */
        #adm-btn { position: fixed; bottom: 80px; right: 20px; width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1000; color: #000; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #adm-panel { position: fixed; bottom: 135px; right: 20px; width: 260px; background: #1e293b; border: 2px solid var(--accent); border-radius: 20px; padding: 15px; display: none; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }

        #toast { position: fixed; top: -200px; left: 15px; right: 15px; padding: 25px; border-radius: 20px; text-align: center; z-index: 10000; transition: 0.5s; font-weight: 900; color: white; }
        #toast.active { top: 30px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>ADMIN PANEL</b><span onclick="toggleAdm()" style="cursor:pointer">✕</span></div>
    <div id="adm-info" style="font-size:11px; color:#94a3b8; margin-bottom:10px; background:#0f172a; padding:8px; border-radius:10px;"></div>
    <button class="btn btn-blue" style="padding:8px; font-size:10px;" onclick="addBot()">+ ДОДАТИ БОТА 🤖</button>
    <button class="btn btn-red" style="padding:8px; font-size:10px;" onclick="resetToLobby()">СКИНУТИ В ЛОБІ</button>
</div>

<div class="tab-bar" id="nav-bar">
    <div class="tab active" onclick="switchTab('game', this)"><span>⚔️</span>ГРА</div>
    <div class="tab" id="t-cards" onclick="switchTab('cards', this)"><span>🃏</span>КАРТИ</div>
    <div class="tab" id="t-store" onclick="switchTab('store', this)"><span>💎</span>МАГАЗИН</div>
    <div class="tab" id="t-prof" onclick="switchTab('prof', this)"><span>👤</span>ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu">
        <h1 onclick="devMode()" style="text-align:center; color:var(--accent); font-size:42px; margin: 40px 0;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
        <input type="number" id="room-input" placeholder="Код">
        <button class="btn btn-blue" onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
    </div>

    <div id="view-lobby" style="display:none;">
        <div class="widget" style="text-align:center;">
            <small>ID КІМНАТИ</small>
            <div id="room-id-txt" style="font-size:28px; font-weight:900; color:var(--accent);">0000</div>
        </div>
        <div id="lobby-players"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none;" onclick="startGame()">ПОЧАТИ</button>
        <button class="btn btn-red" onclick="exitRoom()">ВИЙТИ З КІМНАТИ</button>
    </div>

    <div id="view-play" style="display:none; flex-direction:column; height:100%;">
        <div id="role-box" class="widget" style="text-align:center;"></div>
        <div id="chat-stream"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Ваш хід..." style="margin:0; text-align:left;">
            <button id="send-btn" class="btn btn-blue" style="width:60px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-red" style="flex:1;" onclick="toggleV()">ВИГНАТИ</button>
            <button id="guess-btn" class="btn btn-green" style="flex:1; display:none;" onclick="toggleG()">ВГАДАТИ</button>
        </div>
        <button class="btn btn-red" style="padding:8px; font-size:10px; margin-top:10px; opacity:0.6;" onclick="exitRoom()">ПОКИНУТИ ГРУ</button>
        <div id="v-list" style="display:none; margin-top:10px;"></div>
        <div id="g-list" style="display:none; flex-direction:column; margin-top:10px;">
            <div id="g-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<div id="scr-cards" class="screen"><div id="cards-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div></div>
<div id="scr-store" class="screen"><div id="store-data"></div></div>
<div id="scr-prof" class="screen"><div id="prof-data"></div></div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "u"+Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Плазмовий дракон", "Рицар", "Гігант", "Скелети", "Кулька", "Мушкетер", "Кат", "Торнадо", "Всадниця на барані", "Елітний варвар", "Королівський гігант", "Арбалет", "Мортира", "Гоблінська бочка", "Громовержець", "Нічна відьма", "Крижаний маг", "Бандитка", "Привид", "Рибалка", "Мати-відьма", "Золотий лицар", "Король скелетів", "Королева лучниць", "Монах", "Маленький дракон", "Армія скелетів", "Голем", "Електрогігант", "Фенікс", "Маленький принц"];

    let room = null, isHost = false, myVoted = false, dClicks = 0, myWins = 0, myCoins = 0;

    function devMode() { dClicks++; if(dClicks>=5) { document.getElementById('adm-btn').style.display='flex'; dClicks=0; } }
    function toggleAdm() { const p = document.getElementById('adm-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function switchTab(id, el) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('scr-' + id).classList.add('active-screen'); el.classList.add('active'); }

    async function createRoom() { room = Math.floor(1000+Math.random()*8999).toString(); isHost=true; await db.ref('rooms/'+room).set({host:uID, status:'lobby'}); initRoom(); }
    function joinRoom() { room = document.getElementById('room-input').value; if(room.length<4) return; initRoom(); }
    function exitRoom() { if(room) db.ref('rooms/'+room+'/players/'+uID).remove(); location.reload(); }

    function initRoom() {
        document.getElementById('view-menu').style.display='none';
        document.getElementById('view-lobby').style.display='block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/'+room+'/players/'+uID).set({name:uName, wins:myWins});

        db.ref('rooms/'+room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const players = d.players || {};
            const ids = Object.keys(players);
            
            document.getElementById('lobby-players').innerHTML = ids.map(id => `<div class="widget"><span>${players[id].name}</span></div>`).join('');
            
            if(isHost) { document.getElementById('adm-info').innerHTML = `Шпигун: ${players[d.spyID]?.name || '?'}<br>Карта: ${d.cardName || '?'}`; }

            if(d.status==='started') {
                ['t-cards','t-store','t-prof'].forEach(id => document.getElementById(id).classList.add('hidden'));
                document.getElementById('view-lobby').style.display='none';
                document.getElementById('view-play').style.display='flex';
                renderGame(d);
            } else {
                ['t-cards','t-store','t-prof'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            }
            if(isHost) { const b=document.getElementById('start-btn'); b.style.display='block'; b.disabled=ids.length<3; }
            if(d.winner) handleEnd(d);
        });

        db.ref('rooms/'+room+'/chat').on('value', s => {
            const st = document.getElementById('chat-stream'); st.innerHTML = "";
            s.forEach(m => { st.innerHTML += `<div class="msg ${m.val().uid===uID?'mine':'other'}"><b>${m.val().u}</b><br>${m.val().m}</div>`; });
            st.scrollTop = st.scrollHeight;
        });
    }

    function startGame() {
        db.ref('rooms/'+room+'/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/'+room).update({status:'started', spyID:ids[Math.floor(Math.random()*ids.length)], cardName:allCards[Math.floor(Math.random()*allCards.length)], turnIdx:0, order:ids, votes:null, winner:null});
        });
    }

    function renderGame(d) {
        const isSpy = d.spyID === uID;
        document.getElementById('role-box').innerHTML = isSpy ? `<h2 style="color:#ef4444; margin:0;">🕵️ ТИ ШПИГУН</h2>` : `<h2 style="color:var(--accent); margin:0;">${d.cardName}</h2>`;
        document.getElementById('guess-btn').style.display = isSpy ? 'block' : 'none';
        const isTurn = d.order[d.turnIdx] === uID;
        document.getElementById('chat-input').disabled = !isTurn;
        document.getElementById('send-btn').disabled = !isTurn;
        const vts = d.votes || {};
        document.getElementById('v-list').innerHTML = d.order.filter(id => id !== uID).map(id => `<button class="btn btn-blue" onclick="vote('${id}')" ${myVoted?'disabled':''}>${d.players[id].name} (${vts[id]||0})</button>`).join('');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(d.order[d.turnIdx] !== uID) return;
            db.ref('rooms/'+room+'/chat').push({u:uName, uid:uID, m:inp.value});
            db.ref('rooms/'+room).update({turnIdx: (d.turnIdx + 1) % d.order.length});
            inp.value = "";
        });
    }

    function toggleV() { document.getElementById('g-list').style.display='none'; const x=document.getElementById('v-list'); x.style.display=x.style.display==='block'?'none':'block'; }
    function toggleG() { 
        document.getElementById('v-list').style.display='none'; 
        const x=document.getElementById('g-list'); x.style.display=x.style.display==='flex'?'none':'flex'; 
        document.getElementById('g-grid').innerHTML = allCards.map(c => `<button class="btn btn-blue" style="font-size:10px; padding:10px;" onclick="guess('${c}')">${c}</button>`).join('');
    }

    function guess(c) {
        db.ref('rooms/'+room).once('value', s => {
            const win = (c === s.val().cardName);
            db.ref('rooms/'+room).update(win ? {winner:'spy', reason:'Шпигун вгадав!'} : {winner:'civ', reason:'Шпигун помилився!'});
        });
    }

    function vote(tid) {
        if(myVoted) return; myVoted=true;
        db.ref('rooms/'+room+'/votes/'+tid).transaction(v=>(v||0)+1);
        db.ref('rooms/'+room+'/votes/v_by_'+uID).set(true);
        checkVotes();
    }

    function checkVotes() {
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(!d || d.winner) return;
            const vDone = d.votes ? Object.keys(d.votes).filter(k=>k.startsWith('v_by_')).length : 0;
            if(vDone >= d.order.length) {
                let max=-1, target=""; d.order.forEach(id => { if((d.votes[id]||0)>max) { max=d.votes[id]||0; target=id; } });
                db.ref('rooms/'+room).update(target===d.spyID ? {winner:'civ', reason:'Шпигуна викрито!'} : {winner:'spy', reason:'Вигнали мирного!'});
            }
        });
    }

    function handleEnd(d) {
        const isSpy = d.spyID === uID;
        const toast = document.getElementById('toast');
        toast.innerText = d.reason;
        toast.style.background = d.winner === 'spy' ? 'var(--red-grad)' : 'var(--green-grad)';
        toast.classList.add('active');
        
        const iWin = (d.winner==='spy' && isSpy) || (d.winner==='civ' && !isSpy);
        if(iWin) db.ref('users_v3/'+uID).transaction(u => { if(u){u.wins=(u.wins||0)+1; u.coins=(u.coins||0)+100;} return u; });

        setTimeout(() => {
            toast.classList.remove('active');
            myVoted = false;
            if(isHost) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null});
        }, 5000);
    }

    function addBot() { if(room) db.ref('rooms/'+room+'/players/bot_'+Math.random()).set({name:"БОТ 🤖", wins:0}); }
    function resetToLobby() { if(room) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null}); }

    window.onload = () => {
        db.ref('users_v3/'+uID).on('value', s => {
            const d = s.val() || {wins:0, coins:0};
            myWins = d.wins || 0; myCoins = d.coins || 0;
            document.getElementById('prof-data').innerHTML = `<div class="widget" style="text-align:center;"><h2>${uName}</h2><h1 style="color:var(--accent); font-size:50px;">${myWins}</h1><p>ПЕРЕМОГ</p><p style="color:var(--accent)">💰 ${myCoins}</p></div>`;
            document.getElementById('store-data').innerHTML = `<div class="widget" style="text-align:center;"><h2>КРАМНИЦЯ</h2><p>Баланс: 💰 ${myCoins}</p><div class="widget">Золотий нік - 500💰</div></div>`;
        });
        allCards.forEach(c => { document.getElementById('cards-grid').innerHTML += `<div class="widget" style="padding:10px; text-align:center;">${c}</div>`; });
    };
</script>
</body>
</html>
