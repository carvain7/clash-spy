<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Elite v8.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --panel: #1e293b; --accent: #fbbf24; 
            --blue-grad: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
            --green-grad: linear-gradient(180deg, #34d399 0%, #059669 100%);
            --red-grad: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        /* КРАСИВА ТАБ-БАР */
        .tab-bar { display: flex; background: #1e293b; height: 70px; border-top: 1px solid #334155; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; transition: 0.3s; }
        .tab.active { color: var(--accent); }
        .tab span { font-size: 20px; margin-bottom: 4px; }

        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        /* КНОПКИ CLASH STYLE */
        .btn { 
            width: 100%; padding: 16px; border-radius: 16px; border: none; 
            font-weight: 800; color: white; cursor: pointer; margin-bottom: 12px;
            text-transform: uppercase; font-size: 14px; letter-spacing: 1px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3); transition: 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
        .btn-blue { background: var(--blue-grad); border-bottom: 4px solid #1e40af; }
        .btn-green { background: var(--green-grad); border-bottom: 4px solid #065f46; }
        .btn-red { background: var(--red-grad); border-bottom: 4px solid #991b1b; }

        /* ЧЕРГА ГРАВЦІВ */
        #queue-container { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .player-turn { 
            min-width: 80px; padding: 10px; border-radius: 12px; background: var(--glass);
            border: 1px solid #334155; text-align: center; font-size: 11px; transition: 0.4s;
        }
        .player-turn.active { 
            background: rgba(251, 191, 36, 0.2); border-color: var(--accent); 
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); transform: scale(1.05);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* ЧАТ */
        #chat-stream { flex: 1; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; margin-bottom: 15px; overflow-y: auto; border: 1px solid #1e293b; }
        .msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: #2563eb; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }

        /* ВІДЖЕТИ */
        .widget { background: var(--panel); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        input { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 16px; margin-bottom: 10px; }

        /* АДМІНКА */
        #adm-btn { position: fixed; bottom: 90px; right: 20px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.4); font-size: 24px; }
        #adm-panel { position: fixed; bottom: 150px; right: 20px; width: 280px; background: #1e293b; border-radius: 24px; padding: 20px; display: none; z-index: 101; border: 2px solid var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        /* ТОСТИ ПЕРЕМОГИ */
        #toast { 
            position: fixed; top: -150px; left: 20px; right: 20px; padding: 30px; 
            border-radius: 25px; text-align: center; z-index: 10000; transition: 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            font-size: 22px; font-weight: 900; text-transform: uppercase; border-bottom: 8px solid rgba(0,0,0,0.2);
        }
        #toast.active { top: 30px; }
    </style>
</head>
<body>

<div id="toast">🔔 ТЕСТ</div>

<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b>ADMIN CORE</b><span onclick="toggleAdm()" style="cursor:pointer">✕</span></div>
    <div id="adm-live" style="font-size:12px; margin-bottom:15px; opacity:0.8;"></div>
    <button class="btn btn-blue" style="padding:10px;" onclick="addBot()">+ БОТ 🤖</button>
    <button class="btn btn-red" style="padding:10px;" onclick="resetToLobby()">СКИНУТИ ГРУ</button>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('game', this)"><span>⚔️</span>ГРА</div>
    <div class="tab" onclick="switchTab('cards', this)"><span>🗺️</span>КАРТИ</div>
    <div class="tab" onclick="switchTab('store', this)"><span>💎</span>КРАМНИЦЯ</div>
    <div class="tab" onclick="switchTab('prof', this)"><span>🛡️</span>ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu" style="margin-top:20px;">
        <h1 onclick="devMode()" style="text-align:center; color:var(--accent); font-size:46px; font-style:italic; margin-bottom:40px; text-shadow: 0 4px #92400e;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ БІЙ</button>
        <input type="number" id="room-input" placeholder="Код доступу">
        <button class="btn btn-blue" onclick="joinRoom()">УВІЙТИ</button>
    </div>

    <div id="view-lobby" style="display:none;">
        <div class="widget" style="text-align:center;">
            <small>КОД КІМНАТИ</small>
            <div id="room-id-txt" style="font-size:32px; font-weight:900; color:var(--accent);">----</div>
        </div>
        <div id="lobby-players" style="margin-bottom:20px;"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none;" onclick="startGame()">ПОЧАТИ БІЙ</button>
        <button class="btn btn-red" onclick="location.reload()">ВИЙТИ</button>
    </div>

    <div id="view-play" style="display:none; flex-direction:column; height:100%;">
        <div id="role-box" class="widget" style="padding:15px; text-align:center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);"></div>
        <div id="queue-container"></div>
        <div id="chat-stream"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Твій хід..." style="margin:0; text-align:left; border-radius:20px;">
            <button id="send-btn" class="btn btn-blue" style="width:70px; margin:0; border-radius:20px;" onclick="sendMsg()">➜</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-red" style="flex:1;" onclick="toggleV()">ВИГНАТИ</button>
            <button id="guess-btn" class="btn btn-green" style="flex:1; display:none;" onclick="toggleG()">ВГАДАТИ</button>
        </div>
        <div id="v-list" style="display:none; margin-top:10px;"></div>
        <div id="g-list" style="display:none; flex-direction:column; margin-top:10px;">
            <div id="g-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:200px; overflow-y:auto; padding-right:5px;"></div>
        </div>
    </div>
</div>

<div id="scr-cards" class="screen"><div id="cards-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div></div>
<div id="scr-store" class="screen"><h2 style="text-align:center; margin-top:100px; opacity:0.3;">МАГАЗИН ПОРОЖНІЙ</h2></div>
<div id="scr-prof" class="screen"><div id="prof-data"></div></div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "u"+Math.floor(Math.random()*9999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Рицар", "Гігант", "Кулька", "Мушкетер", "Кат", "Торнадо", "Елітний варвар", "Арбалет", "Гоблінська бочка", "Нічна відьма", "Крижаний маг", "Бандитка", "Привид", "Рибалка", "Мати-відьма", "Золотий лицар", "Король скелетів", "Королева лучниць", "Монах", "Маленький принц", "Фенікс", "Голем", "Електрогігант"];

    let room = null, isHost = false, myVoted = false, dClicks = 0, myWins = 0;

    function getRank(w) { return w>=15?"👑 КОРОЛЬ":w>=10?"⚔️ МАЙСТЕР":w>=5?"🛡️ ЛИЦАР":"🌱 НОВАЧОК"; }
    function devMode() { dClicks++; if(dClicks>=5){ document.getElementById('adm-btn').style.display='flex'; dClicks=0; } }
    function toggleAdm() { const p = document.getElementById('adm-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function switchTab(id, el) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('scr-' + id).classList.add('active-screen'); el.classList.add('active'); }

    async function createRoom() { room = Math.floor(1000+Math.random()*8999).toString(); isHost=true; await db.ref('rooms/'+room).set({host:uID, status:'lobby'}); initRoom(); }
    function joinRoom() { room = document.getElementById('room-input').value; if(room.length<4) return; initRoom(); }

    function initRoom() {
        document.getElementById('view-menu').style.display='none'; document.getElementById('view-lobby').style.display='block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/'+room+'/players/'+uID).set({name:uName, rank:getRank(myWins)});

        db.ref('rooms/'+room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const players = d.players || {};
            const ids = Object.keys(players);
            
            document.getElementById('lobby-players').innerHTML = ids.map(id => `
                <div class="widget" style="display:flex; justify-content:space-between; padding:12px; margin-bottom:8px;">
                    <span>${players[id].isBot?'🤖 ':''}${players[id].name}</span>
                    <span style="color:var(--accent); font-size:10px; font-weight:bold;">${players[id].rank}</span>
                </div>
            `).join('');

            if(isHost) { document.getElementById('adm-live').innerHTML = `Шпигун: ${players[d.spyID]?.name}<br>Карта: ${d.cardName}`; }

            if(d.status==='started') {
                document.getElementById('view-lobby').style.display='none';
                document.getElementById('view-play').style.display='flex';
                renderGame(d);
            }
            if(isHost) { const b=document.getElementById('start-btn'); b.style.display='block'; b.disabled=ids.length<3; }
            if(d.winner) handleEnd(d);
        });

        db.ref('rooms/'+room+'/chat').on('value', s => {
            const st = document.getElementById('chat-stream'); st.innerHTML = "";
            s.forEach(m => { st.innerHTML += `<div class="msg ${m.val().uid===uID?'mine':'other'}"><b>${m.val().u}</b><br>${m.val().m}</div>`; });
            st.scrollTop = st.scrollHeight;
        });
    }

    function startGame() {
        db.ref('rooms/'+room+'/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/'+room).update({status:'started', spyID:ids[Math.floor(Math.random()*ids.length)], cardName:allCards[Math.floor(Math.random()*allCards.length)], turnIdx:0, order:ids, votes:null, winner:null});
        });
    }

    function renderGame(d) {
        const isSpy = d.spyID === uID;
        document.getElementById('role-box').innerHTML = isSpy ? `<h2 style="color:#ef4444; margin:0;">🕵️ ТИ ШПИГУН</h2>` : `<small style="opacity:0.6">ВАША КАРТА</small><h2 style="color:var(--accent); margin:0;">${d.cardName}</h2>`;
        document.getElementById('guess-btn').style.display = isSpy ? 'block' : 'none';
        
        document.getElementById('queue-container').innerHTML = d.order.map((id, i) => `
            <div class="player-turn ${i===d.turnIdx?'active':''}">
                <div style="font-size:16px;">👤</div>
                <div>${d.players[id]?.name.split(' ')[0]}</div>
            </div>
        `).join('');

        const isTurn = d.order[d.turnIdx] === uID;
        document.getElementById('chat-input').disabled = !isTurn;
        document.getElementById('send-btn').disabled = !isTurn;

        const vts = d.votes || {};
        document.getElementById('v-list').innerHTML = d.order.filter(id => id !== uID).map(id => `
            <button class="btn btn-blue" style="font-size:11px; padding:10px;" onclick="vote('${id}')" ${myVoted?'disabled':''}>
                ${d.players[id].name} (${vts[id]||0})
            </button>
        `).join('');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(d.order[d.turnIdx] !== uID) return;
            db.ref('rooms/'+room+'/chat').push({u:uName, uid:uID, m:inp.value});
            db.ref('rooms/'+room).update({turnIdx: (d.turnIdx + 1) % d.order.length});
            inp.value = "";
        });
    }

    function toggleV() { document.getElementById('g-list').style.display='none'; const x=document.getElementById('v-list'); x.style.display=x.style.display==='block'?'none':'block'; }
    function toggleG() { 
        document.getElementById('v-list').style.display='none'; 
        const x=document.getElementById('g-list'); x.style.display=x.style.display==='flex'?'none':'flex'; 
        document.getElementById('g-grid').innerHTML = allCards.map(c => `<button class="btn btn-blue" style="font-size:10px; padding:10px;" onclick="guess('${c}')">${c}</button>`).join('');
    }

    function guess(c) {
        db.ref('rooms/'+room).once('value', s => {
            const win = (c === s.val().cardName);
            db.ref('rooms/'+room).update(win ? {winner:'spy', reason:'Шпигун вгадав карту!'} : {winner:'civ', reason:'Шпигун помилився!'});
        });
    }

    function vote(tid) {
        if(myVoted) return; myVoted=true;
        db.ref('rooms/'+room+'/votes/'+tid).transaction(v=>(v||0)+1);
        db.ref('rooms/'+room+'/votes/v_by_'+uID).set(true);
        checkVotes();
    }

    function checkVotes() {
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(!d || d.winner) return;
            const vDone = d.votes ? Object.keys(d.votes).filter(k=>k.startsWith('v_by_')).length : 0;
            if(vDone >= d.order.length) {
                let max=-1, target=""; d.order.forEach(id => { if((d.votes[id]||0)>max) { max=d.votes[id]||0; target=id; } });
                db.ref('rooms/'+room).update(target===d.spyID ? {winner:'civ', reason:'Шпигуна знайдено!'} : {winner:'spy', reason:'Вигнали мирного!'});
            }
        });
    }

    function handleEnd(d) {
        const isSpy = d.spyID === uID;
        const toast = document.getElementById('toast');
        toast.innerText = d.reason;
        
        // Колір залежить від ролі: якщо шпигун виграв — червоний, якщо програв — зелений
        if (d.winner === 'spy') {
            toast.style.background = 'var(--red-grad)';
            if(isSpy) myWins++; 
        } else {
            toast.style.background = 'var(--green-grad)';
            if(!isSpy) myWins++;
        }

        toast.classList.add('active');
        db.ref('users_v2/'+uID).update({wins: myWins, name: uName});

        setTimeout(() => {
            toast.classList.remove('active');
            myVoted = false;
            if(isHost) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null});
        }, 5000);
    }

    function addBot() { if(!room) return; const bID = "bot_"+Math.floor(Math.random()*999); db.ref('rooms/'+room+'/players/'+bID).set({name: "Бот #"+bID.split('_')[1], rank: "🤖 БОТ", isBot: true}); }
    function resetToLobby() { if(room) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null}); }

    window.onload = () => {
        db.ref('users_v2/'+uID).on('value', s => {
            const d = s.val() || {wins:0}; myWins = d.wins;
            document.getElementById('prof-data').innerHTML = `
                <div class="widget" style="text-align:center; padding:40px 0;">
                    <div style="font-size:14px; opacity:0.6;">ТВІЙ ТИТУЛ</div>
                    <div style="font-size:20px; font-weight:bold; color:var(--accent);">${getRank(myWins)}</div>
                    <div style="font-size:80px; font-weight:900; margin:10px 0;">${myWins}</div>
                    <div style="opacity:0.5;">ПЕРЕМОГ</div>
                </div>`;
        });
        allCards.forEach(c => { document.getElementById('cards-grid').innerHTML += `<div class="widget" style="padding:15px; text-align:center;">${c}</div>`; });
    };
</script>
</body>
</html>
