<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v5.4.3 Stable</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #161f32; height: 60px; border-bottom: 2px solid #2d3748; flex-shrink: 0; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; opacity: 0.4; }
        .tab.active { opacity: 1; color: var(--accent); border-bottom: 3px solid var(--accent); }

        .screen { display: none; flex: 1; padding: 15px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        
        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #2d3748; background: #111827; color: white; text-align: center; margin-bottom: 10px; font-size: 16px; }
        #chat-input { text-align: left; margin: 0; flex: 1; }

        .card-item { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #2d3748; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .v-count { background: var(--red); color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        #chat-box { flex: 1; background: #05070a; border-radius: 12px; padding: 10px; margin: 10px 0; overflow-y: auto; border: 1px solid #2d3748; min-height: 180px; }
        .msg { margin-bottom: 6px; font-size: 14px; color: #cbd5e1; }
        .msg b { color: var(--accent); }

        #adm-btn { position: fixed; bottom: 85px; right: 20px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 999; font-size: 24px; }
        #adm-panel { position: fixed; bottom: 145px; right: 20px; width: 260px; background: #1e293b; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; display: none; z-index: 1000; }
        
        #toast { position: fixed; top: -100px; left: 10px; right: 10px; padding: 15px; border-radius: 12px; text-align: center; z-index: 10000; transition: 0.5s; font-weight: bold; }
        #toast.show { top: 20px; }
    </style>
</head>
<body>

<div id="toast"></div>
<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>ADMIN</b><span onclick="toggleAdm()">✕</span></div>
    <div id="adm-data" style="font-size:11px; margin-bottom:10px; color:#94a3b8;"></div>
    <button class="btn btn-blue" style="padding:8px;" onclick="addBot()">+ ДОДАТИ БОТА</button>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
    <div class="tab" onclick="switchTab('cards', this)">КАРТИ</div>
    <div class="tab" onclick="switchTab('prof', this)">ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="ui-menu">
        <h1 onclick="clickVer()" style="text-align:center; color:var(--accent); margin: 30px 0;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
        <div style="height:20px;"></div>
        <input type="number" id="room-code-input" placeholder="Код кімнати">
        <button class="btn btn-blue" onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
    </div>

    <div id="ui-lobby" style="display:none;">
        <div class="card-item" style="flex-direction:column; border: 2px solid var(--blue);">
            <small>КОД ВХОДУ:</small>
            <h2 id="display-room-code" style="color:var(--accent); font-size:32px;">0000</h2>
        </div>
        <h4 style="margin: 15px 0 5px;">ГРАВЦІ:</h4>
        <div id="lobby-list"></div>
        <button id="start-game-btn" class="btn btn-blue" style="display:none; margin-top:20px;" onclick="startGame()">ПОЧАТИ ГРУ</button>
    </div>

    <div id="ui-play" style="display:none; flex-direction:column; height: 100%;">
        <div id="role-display" class="card-item" style="justify-content:center; border:2px solid var(--accent);"></div>
        
        <div id="chat-box"></div>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Ваше питання..." onkeydown="if(event.key==='Enter') sendChatMessage()">
            <button class="btn btn-blue" style="width:60px; margin:0;" onclick="sendChatMessage()">➜</button>
        </div>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-red" style="flex:1;" onclick="toggleVoteMenu()">ГОЛОСУВАТИ</button>
            <button id="spy-guess-btn" class="btn btn-green" style="flex:1; display:none;" onclick="toggleGuessMenu()">ВГАДАТИ</button>
        </div>

        <div id="vote-menu" style="display:none; margin-top:10px;"></div>
        <div id="guess-menu" style="display:none; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px; max-height:150px; overflow-y:auto;"></div>
    </div>
</div>

<div id="scr-cards" class="screen"><div id="all-cards-list"></div></div>
<div id="scr-prof" class="screen"><div id="user-stats"></div></div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "u"+Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const cards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Гігант", "Голем", "Мушкетер", "Кат", "Принцеса", "Рицар", "Скелети"];
    let currentRoom = null, amIHost = false, vClicks = 0, voted = false;

    function init() {
        document.getElementById('all-cards-list').innerHTML = cards.map(c => `<div class="card-item">${c}</div>`).join('');
        document.getElementById('guess-menu').innerHTML = cards.map(c => `<button class="btn btn-blue" style="padding:8px; font-size:10px;" onclick="submitGuess('${c}')">${c}</button>`).join('');
        db.ref('users/' + uID + '/wins').on('value', s => {
            document.getElementById('user-stats').innerHTML = `<div class="card-item" style="flex-direction:column;"><h1>🏆</h1><h2>${uName}</h2><h1 style="color:var(--accent)">${s.val()||0}</h1><p>Перемог</p></div>`;
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active-screen');
        el.classList.add('active');
    }

    function clickVer() { vClicks++; if(vClicks >= 5) { document.getElementById('adm-btn').style.display = 'flex'; } }
    function toggleAdm() { const p = document.getElementById('adm-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

    async function createRoom() {
        currentRoom = Math.floor(1000 + Math.random() * 8999).toString();
        amIHost = true;
        await db.ref('rooms/' + currentRoom).set({ host: uID, status: 'lobby' });
        connect();
    }

    async function joinRoom() {
        const code = document.getElementById('room-code-input').value;
        if(code.length < 4) return;
        currentRoom = code; amIHost = false;
        connect();
    }

    function connect() {
        document.getElementById('ui-menu').style.display = 'none';
        document.getElementById('ui-lobby').style.display = 'block';
        document.getElementById('display-room-code').innerText = currentRoom;
        db.ref('rooms/' + currentRoom + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + currentRoom).on('value', snap => {
            const data = snap.val(); if(!data) return;

            const lobby = document.getElementById('lobby-list');
            const votes = document.getElementById('vote-menu');
            lobby.innerHTML = ""; votes.innerHTML = "";
            
            let pCount = 0;
            Object.keys(data.players).forEach(id => {
                pCount++;
                const v = (data.votes && data.votes[id]) ? data.votes[id] : 0;
                lobby.innerHTML += `<div class="card-item"><span>👤 ${data.players[id].name}</span> ${v > 0 ? `<span class="v-count">${v}</span>` : ''}</div>`;
                if(id !== uID) votes.innerHTML += `<button class="btn btn-blue" onclick="submitVote('${id}')" ${voted?'disabled':''}>${data.players[id].name} (${v})</button>`;
            });

            document.getElementById('adm-data').innerHTML = `Карта: ${data.cardName||'?'}<br>Шпигун: ${data.spyID||'?'}`;
            if(amIHost) { 
                const btn = document.getElementById('start-game-btn');
                btn.style.display = 'block'; 
                btn.disabled = pCount < 2; 
            }
            if(data.status === 'started') showPlayScreen(data);
            if(data.winner) finishGame(data.winner, data.reason);
        });

        // ЧАТ
        db.ref('rooms/' + currentRoom + '/chat').on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(msg => {
                box.innerHTML += `<div class="msg"><b>${msg.val().u}:</b> ${msg.val().m}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function startGame() {
        const c = cards[Math.floor(Math.random() * cards.length)];
        db.ref('rooms/' + currentRoom + '/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/' + currentRoom).update({ status: 'started', spyID: ids[Math.floor(Math.random()*ids.length)], cardName: c });
        });
    }

    function showPlayScreen(data) {
        document.getElementById('ui-lobby').style.display = 'none';
        document.getElementById('ui-play').style.display = 'flex';
        const isSpy = data.spyID === uID;
        document.getElementById('role-display').innerHTML = isSpy ? `<h2 style="color:var(--red)">ТИ ШПИГУН 🕵️</h2>` : `<div><small>КАРТА:</small><h2>${data.cardName}</h2></div>`;
        if(isSpy) document.getElementById('spy-guess-btn').style.display = 'block';
    }

    function sendChatMessage() {
        const inp = document.getElementById('chat-input');
        const val = inp.value.trim();
        if(!val) return;
        db.ref('rooms/' + currentRoom + '/chat').push({ u: uName, m: val });
        inp.value = "";
    }

    function submitVote(tid) {
        if(voted) return;
        voted = true;
        db.ref('rooms/' + currentRoom + '/votes/' + tid).transaction(c => (c||0)+1);
        document.getElementById('vote-menu').style.display = 'none';
        
        db.ref('rooms/' + currentRoom).once('value', s => {
            const d = s.val(); 
            let total = 0; 
            if(d.votes) Object.values(d.votes).forEach(v => total += v);
            
            if(total >= Object.keys(d.players).length) {
                let max = 0, winnerID = "";
                Object.keys(d.votes).forEach(id => { if(d.votes[id] > max) { max = d.votes[id]; winnerID = id; } });
                db.ref('rooms/' + currentRoom).update(winnerID === d.spyID ? {winner:'civ', reason:'Шпигуна спіймали!'} : {winner:'spy', reason:'Вигнали не того!'});
            }
        });
    }

    function submitGuess(c) {
        db.ref('rooms/' + currentRoom).once('value', s => {
            db.ref('rooms/' + currentRoom).update(c === s.val().cardName ? {winner:'spy', reason:'Шпигун вгадав!'} : {winner:'civ', reason:'Шпигун промахнувся!'});
        });
    }

    function finishGame(w, r) {
        const isSpyRole = document.getElementById('role-display').innerText.includes("ШПИГУН");
        const won = (w === 'spy' && isSpyRole) || (w === 'civ' && !isSpyRole);
        const t = document.getElementById('toast');
        t.innerText = (won ? "ПЕРЕМОГА: " : "ПОРАЗКА: ") + r;
        t.style.background = won ? 'var(--green)' : 'var(--red)';
        t.classList.add('show');
        if(won) db.ref('users/' + uID + '/wins').transaction(c => (c||0)+1);
        setTimeout(() => location.reload(), 4000);
    }

    function toggleVoteMenu() { const m = document.getElementById('vote-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    function toggleGuessMenu() { const m = document.getElementById('guess-menu'); m.style.display = m.style.display === 'grid' ? 'none' : 'grid'; }
    function addBot() { const id = "bot_"+Math.floor(Math.random()*99); db.ref('rooms/' + currentRoom + '/players/' + id).set({ name: "Бот " + id }); }

    window.onload = init;
</script>
</body>
</html>
