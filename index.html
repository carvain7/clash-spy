<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy - Voting System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .tab-bar { display: flex; background: #161f32; border-bottom: 1px solid #2d3748; min-height: 50px; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; cursor: pointer; opacity: 0.5; color: white; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        .screen { display: none; flex: 1; width: 100%; flex-direction: column; padding: 15px; overflow-y: auto; }
        .active-screen { display: flex; }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin: 5px 0; font-size: 15px; color: white; text-transform: uppercase; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }
        
        input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 16px; text-align: center; outline: none; margin-bottom: 10px; }

        .card-display { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 2px solid var(--accent); margin-bottom: 10px; }
        
        #chat-window { flex: 1; min-height: 120px; background: #05070a; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #1a2236; font-size: 13px; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 3px; word-wrap: break-word; }

        .vote-item { display: flex; justify-content: space-between; align-items: center; background: #252f44; padding: 12px; border-radius: 10px; margin-bottom: 6px; cursor: pointer; }
        .vote-count { background: var(--accent); color: black; padding: 2px 10px; border-radius: 12px; font-weight: bold; }

        .rank-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 5px; }
        .rank-item.me { border: 1px solid var(--accent); background: rgba(245, 158, 11, 0.1); }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
        <div class="tab" onclick="switchTab('profile', this)">ПРОФІЛЬ</div>
        <div class="tab" onclick="switchTab('leaderboard', this)">ТОП-100</div>
    </div>

    <div id="scr-game" class="screen active-screen">
        <div id="menu-area">
            <h2 style="text-align:center; color:var(--accent);">CLASH SPY 🕵️</h2>
            <button class="btn btn-green" onclick="createLobby()">СТВОРТИ КІМНАТУ</button>
            <input type="number" id="lobby-input" placeholder="Код кімнати" style="margin-top:15px;">
            <button class="btn btn-blue" onclick="joinLobby()">ПРИЄДНАТИСЯ</button>
        </div>

        <div id="lobby-area" style="display:none; flex-direction:column; height:100%;">
            <div style="text-align:center;">
                <span style="font-size:12px; opacity:0.6;">КОД:</span>
                <h1 id="room-code-label" style="color:var(--accent); font-size: 40px; margin:0;">----</h1>
            </div>
            <div id="player-list" style="flex:1; margin:15px 0;"></div>
            <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">ПОЧАТИ БИТВУ</button>
            <button class="btn btn-red" onclick="location.reload()" style="background:none; box-shadow:none;">ВИЙТИ</button>
        </div>

        <div id="play-area" style="display:none; flex-direction:column; height:100%;">
            <div class="card-display" id="role-card"></div>
            
            <div id="voting-section" style="display:none; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 10px;">
                <p style="text-align:center; font-size:11px; color:var(--accent); margin:0 0 10px 0;">ХТО ШПИГУН?</p>
                <div id="vote-list"></div>
            </div>

            <div id="chat-window"></div>
            
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-input" placeholder="Твоє питання..." style="flex: 1; margin: 0;">
                <button class="btn btn-blue" onclick="sendMsg()" style="width: 50px; margin: 0; padding: 0;">➜</button>
            </div>
            
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <button class="btn btn-green" style="flex:1; font-size:12px;" onclick="toggleVoting()">ГОЛОСУВАННЯ</button>
                <button id="finish-btn" class="btn btn-red" style="display:none; flex:1; font-size:12px;" onclick="finishGameAction()">ЗАВЕРШИТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <h2 style="color:var(--accent)">ПРОФІЛЬ</h2>
        <div class="card-display" id="prof-card">Завантаження...</div>
    </div>

    <div id="scr-leaderboard" class="screen">
        <h2 style="color:var(--accent)">ТОП-100</h2>
        <div id="rank-list"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // КОНФІГ БАЗИ (БЕЛЬГІЯ)
    const firebaseConfig = { 
        databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" 
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const user = tg.initDataUnsafe?.user;
    const uID = (user?.id || "dev_" + Math.floor(Math.random()*999)).toString();
    const uName = user?.first_name || user?.username || "Гравець";
    
    let roomID = null;
    let isHost = false;
    let hasVoted = false;

    const cards = ["П.Е.К.К.А", "Мегалицар", "Вершник на кабані", "Магічний лучник", "Спаркі", "Відьма", "Елітні варвари", "Шахтар", "Принцеса", "Хог"];

    // Реєстрація користувача
    db.ref('users/' + uID).update({ name: uName });
    db.ref('users/' + uID).on('value', snap => {
        const d = snap.val() || { wins: 0 };
        document.getElementById('prof-card').innerHTML = `<h3>${uName}</h3><div style="font-size:32px;">🏆 ${d.wins || 0}</div><p style="opacity:0.6;">Перемог</p>`;
    });

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + tabId).classList.add('active-screen');
        el.classList.add('active');
        if(tabId === 'leaderboard') loadLeaderboard();
    }

    // СТВОРЕННЯ / ВХІД
    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
        setupRoom();
    }

    async function joinLobby() {
        const val = document.getElementById('lobby-input').value;
        const snap = await db.ref('rooms/' + val).once('value');
        if(!snap.exists()) return alert("Кімнату не знайдено!");
        roomID = val; isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('menu-area').style.display = 'none';
        document.getElementById('lobby-area').style.display = 'flex';
        document.getElementById('room-code-label').innerText = roomID;
        
        db.ref('rooms/' + roomID + '/players/' + uID).set({ name: uName });

        // Черга гравців в реальному часі
        db.ref('rooms/' + roomID + '/players').on('value', snap => {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            let count = 0;
            snap.forEach(p => {
                count++;
                list.innerHTML += `<div class="rank-item">👤 ${p.val().name}</div>`;
            });
            if(isHost) {
                const b = document.getElementById('start-btn');
                b.style.display = 'block';
                b.disabled = count < 2;
            }
        });

        // Стан гри
        db.ref('rooms/' + roomID).on('value', snap => {
            const data = snap.val();
            if(data && data.status === 'started') renderGame(data);
        });
    }

    function startGame() {
        const card = cards[Math.floor(Math.random()*cards.length)];
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let ids = []; snap.forEach(p => ids.push(p.key));
            const spy = ids[Math.floor(Math.random()*ids.length)];
            db.ref('rooms/' + roomID).update({ 
                status: 'started', 
                spyID: spy, 
                cardName: card,
                votes: {} 
            });
        });
    }

    function renderGame(data) {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'flex';
        
        const isSpy = data.spyID === uID;
        document.getElementById('role-card').innerHTML = isSpy ? 
            `<h2 style="color:var(--red); margin:0;">ТИ ШПИГУН 🕵️</h2>` : 
            `<p style="font-size:12px; opacity:0.6; margin:0;">КАРТА:</p><h2 style="color:var(--green); margin:5px 0;">${data.cardName}</h2>`;
        
        if(isHost) document.getElementById('finish-btn').style.display = 'block';

        // Синхронізація чату
        db.ref('rooms/' + roomID + '/chat').off();
        db.ref('rooms/' + roomID + '/chat').on('child_added', snap => {
            const m = snap.val();
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg"><b>${m.u}:</b> ${m.msg}</div>`;
            win.scrollTop = win.scrollHeight;
        });

        // Синхронізація голосування
        updateVoteUI(data.players, data.votes || {});
    }

    // ГОЛОСУВАННЯ
    function toggleVoting() {
        const s = document.getElementById('voting-section');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    function updateVoteUI(players, votes) {
        const list = document.getElementById('vote-list');
        list.innerHTML = "";
        
        let counts = {};
        Object.values(votes).forEach(vID => counts[vID] = (counts[vID] || 0) + 1);

        Object.keys(players).forEach(pID => {
            if(pID === uID) return;
            const item = document.createElement('div');
            item.className = 'vote-item';
            item.innerHTML = `<span>👤 ${players[pID].name}</span> <span class="vote-count">${counts[pID] || 0}</span>`;
            item.onclick = () => castVote(pID);
            list.appendChild(item);
        });
    }

    async function castVote(targetID) {
        if(hasVoted) return alert("Голос вже віддано!");
        await db.ref('rooms/' + roomID + '/votes/' + uID).set(targetID);
        hasVoted = true;
        alert("Ви проголосували!");
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input');
        if(!inp.value.trim()) return;
        db.ref('rooms/' + roomID + '/chat').push({ u: uName, msg: inp.value });
        inp.value = "";
    }

    function finishGameAction() {
        const winnerName = prompt("Ім'я переможця:");
        if(!winnerName) return;
        
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            snap.forEach(p => {
                if(p.val().name.toLowerCase() === winnerName.toLowerCase()) {
                    db.ref('users/' + p.key + '/wins').transaction(c => (c||0) + 1);
                }
            });
            db.ref('rooms/' + roomID).remove().then(() => location.reload());
        });
    }

    function loadLeaderboard() {
        db.ref('users').once('value', snap => {
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            let arr = [];
            snap.forEach(c => arr.push({ id: c.key, ...c.val() }));
            arr.sort((a,b) => (b.wins||0) - (a.wins||0));
            arr.slice(0, 100).forEach((p, i) => {
                let isMe = p.id === uID ? "me" : "";
                list.innerHTML += `<div class="rank-item ${isMe}"><span>${i+1}. ${p.name}</span><span>🏆 ${p.wins||0}</span></div>`;
            });
        });
    }
</script>
</body>
</html>
