<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a2236; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { color: #64748b; font-size: 12px; text-align: center; flex: 1; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--accent); }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 90px; }
        .active { display: flex; }

        .container { padding: 25px; text-align: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; margin: 10px 0; cursor: pointer; font-size: 16px; }
        
        /* Role Announcement */
        #role-announcer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 15px 25px; border-radius: 15px; font-weight: bold; z-index: 3000; transition: 0.5s; width: 80%; text-align: center; }
        #toast.show { top: 20px; }

        .status-panel { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--blue); }
        #chat-window { background: #020617; flex: 1; border-radius: 10px; overflow-y: auto; padding: 15px; margin-bottom: 10px; text-align: left; border: 1px solid #1e293b; }
        
        .card-box { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid var(--accent); border-radius: 20px; padding: 25px; text-align: left; margin-top: 10px; }
        .stat-line { margin: 12px 0; font-size: 18px; display: flex; justify-content: space-between; border-bottom: 1px solid #334155; }

        .grid-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .grid-item { background: white; color: black; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="role-announcer">
        <h1 id="role-text" style="font-size: 40px;">ГОТУЙСЯ...</h1>
    </div>

    <div id="toast">Повідомлення</div>

    <div id="scr-main" class="screen active">
        <div class="container">
            <h1 style="color:var(--accent); font-size:42px; margin-top:40px;">CLASH SPY</h1>
            <button class="btn" onclick="openLobby(true)" style="background:var(--green)">✨ СТВОРИТИ КІМНАТУ</button>
            <input type="text" id="join-code" placeholder="ВВЕДІТЬ КОД" style="width:85%; padding:15px; border-radius:12px; border:none; text-align:center; font-size:22px; background:#1e293b; color:white; margin: 10px 0;">
            <button class="btn" onclick="openLobby(false)" style="background:var(--accent); color:black;">🔑 ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="container">
            <h1>МІЙ ПРОФІЛЬ</h1>
            <div class="card-box">
                <p>🏆 Перемог: 24</p>
                <p>🕵️ Викрито шпигунів: 12</p>
                <p>⭐ Ранг: Майстер</p>
            </div>
            <button class="btn" onclick="nav('scr-main', null, 'menu')" style="background:none; border:1px solid #475569;">Назад</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="container">
            <h1 style="font-size: 20px; opacity: 0.6;">КІМНАТА ОЧІКУВАННЯ</h1>
            <div style="font-size: 45px; color:var(--accent); font-weight:bold; margin: 10px 0;" id="room-id">-----</div>
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:left;">
                <p>👤 Ви (Організатор) <span style="color:var(--green)">●</span></p>
                <p style="color:#64748b">👤 Очікування гравців...</p>
            </div>
            <button class="btn" onclick="runGame()" style="background:var(--blue); margin-top:30px; font-size: 20px;">🚀 ПОЧАТИ</button>
            <button class="btn" onclick="location.reload()" style="background:none; color:var(--red);">Вийти</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="container" style="display:flex; flex-direction:column; height:82vh;">
            <div class="status-panel">
                <span id="timer" style="color:var(--red); font-weight:bold; font-size:18px;">05:00</span> | 
                <span id="turn-info" style="color:var(--green)">Ваша черга</span>
            </div>
            <div id="chat-window"></div>
            <div id="game-actions">
                <button id="btn-spy" class="btn" onclick="nav('scr-guess', null, 'game')" style="display:none; background:var(--accent); color:black;">🎯 ВГАДАТИ КАРТУ</button>
                <button id="btn-player" class="btn" onclick="nav('scr-vote', null, 'game')" style="display:none; background:var(--red);">🚫 ВИКРИТИ ШПИГУНА</button>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-msg" placeholder="Текст..." style="flex:1; padding:15px; border-radius:10px; border:none; background:#1e293b; color:white;">
                <button class="btn" id="send-btn" onclick="sendMsg()" style="width:60px; margin:0;">➜</button>
            </div>
        </div>
    </div>

    <div id="scr-card" class="screen">
        <div class="container">
            <h1 id="card-header">КАРТА</h1>
            <div id="card-content"></div>
        </div>
    </div>

    <div id="scr-guess" class="screen">
        <div class="container"><h1>ЯКА ЦЕ КАРТА?</h1><div class="grid-box" id="guess-grid"></div><button class="btn" onclick="nav('scr-game', null, 'game')">Назад</button></div>
    </div>
    <div id="scr-vote" class="screen">
        <div class="container"><h1>ХТО ШПИГУН?</h1><div class="grid-box"><div class="grid-item" onclick="endGame('Викриття успішне!')">👤 Player_2</div><div class="grid-item" onclick="endGame('Помилка!')">👤 Bot_1</div></div><button class="btn" onclick="nav('scr-game', null, 'game')">Назад</button></div>
    </div>

    <div class="nav-bar" id="main-nav">
        <div class="nav-item active" onclick="nav('scr-main', this, 'menu')">Дім</div>
        <div class="nav-item" onclick="nav('scr-profile', this, 'menu')">Профіль</div>
    </div>

    <div class="nav-bar" id="game-nav" style="display:none;">
        <div class="nav-item active" onclick="nav('scr-game', this, 'game')">Чат 💬</div>
        <div class="nav-item" onclick="nav('scr-card', this, 'game')">Карта 🃏</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const cards = [
            {n: "П.Е.К.К.А", hp: 3450, dmg: 678, spd: "Повільна"},
            {n: "Мегалицар", hp: 3300, dmg: 222, spd: "Середня"},
            {n: "Спаркі", hp: 1200, dmg: 1100, spd: "Повільна"}
        ];

        let isSpy = false;
        let myCard = cards[0];
        let timeLeft = 300;

        function nav(id, el, type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const currentNav = type === 'menu' ? 'main-nav' : 'game-nav';
            document.querySelectorAll(`#${currentNav} .nav-item`).forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function openLobby(isNew) {
            const code = isNew ? Math.random().toString(36).substring(2, 7).toUpperCase() : document.getElementById('join-code').value.toUpperCase();
            if(!isNew && code.length < 2) return;
            document.getElementById('room-id').innerText = code;
            document.getElementById('main-nav').style.display = 'none'; // Ховаємо меню з профілем
            nav('scr-lobby');
        }

        function runGame() {
            isSpy = Math.random() < 0.3;
            myCard = cards[Math.floor(Math.random()*cards.length)];
            
            const ann = document.getElementById('role-announcer');
            const txt = document.getElementById('role-text');
            ann.style.display = 'flex';
            txt.innerText = isSpy ? "ТИ — ШПИГУН 🕵️" : "ТИ — ГРАВЕЦЬ 🛡️";
            txt.style.color = isSpy ? "var(--red)" : "var(--green)";

            setTimeout(() => {
                ann.style.display = 'none';
                document.getElementById('game-nav').style.display = 'flex';
                setupGameUI();
                nav('scr-game', document.querySelector('#game-nav .nav-item'), 'game');
                startTimer();
            }, 3000);
        }

        function setupGameUI() {
            if(isSpy) {
                document.getElementById('btn-spy').style.display = 'block';
                document.getElementById('card-content').innerHTML = `<div class="card-box"><p>Вгадай карту гравців!</p></div>`;
                document.getElementById('guess-grid').innerHTML = cards.map(c => `<div class="grid-item" onclick="endGame('Гра завершена')">${c.n}</div>`).join('');
            } else {
                document.getElementById('btn-player').style.display = 'block';
                document.getElementById('card-content').innerHTML = `
                    <div class="card-box">
                        <h2 style="color:var(--accent)">${myCard.n}</h2>
                        <div class="stat-line"><span>❤️ HP</span> <span>${myCard.hp}</span></div>
                        <div class="stat-line"><span>⚔️ DMG</span> <span>${myCard.dmg}</span></div>
                    </div>`;
            }
        }

        function startTimer() {
            setInterval(() => {
                if(timeLeft <= 0) return;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
                timeLeft--;
            }, 1000);
        }

        function sendMsg() {
            const inp = document.getElementById('chat-msg'), win = document.getElementById('chat-window');
            if(!inp.value) return;
            win.innerHTML += `<div><b>Ви:</b> ${inp.value}</div>`;
            win.scrollTop = win.scrollHeight;
            inp.value = "";
            document.getElementById('send-btn').disabled = true;
            setTimeout(() => document.getElementById('send-btn').disabled = false, 3000);
        }

        function endGame(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => location.reload(), 4000);
        }
    </script>
</body>
</html>
