м<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v5.4.6 Final Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #161f32; height: 60px; border-bottom: 2px solid #2d3748; flex-shrink: 0; z-index: 100; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; opacity: 0.5; cursor: pointer; }
        .tab.active { opacity: 1; color: var(--accent); border-bottom: 3px solid var(--accent); }

        .screen { display: none; flex: 1; padding: 15px; overflow-y: auto; padding-bottom: 100px; }
        .active-screen { display: flex; flex-direction: column; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #2d3748; background: #111827; color: white; text-align: center; margin-bottom: 10px; }
        input:disabled { opacity: 0.5; cursor: not-allowed; }

        .card-item { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #2d3748; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        #chat-stream { flex: 1; background: #05070a; border-radius: 12px; padding: 10px; margin: 10px 0; overflow-y: auto; border: 1px solid #2d3748; display: flex; flex-direction: column; gap: 8px; min-height: 200px; }
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; background: #1e293b; font-size: 14px; align-self: flex-start; }
        .msg-bubble.mine { align-self: flex-end; border-right: 3px solid var(--blue); background: #26334d; }
        
        #turn-indicator { text-align: center; font-size: 12px; padding: 8px; color: var(--accent); font-weight: bold; background: rgba(245, 158, 11, 0.1); border-radius: 8px; margin-bottom: 10px; }
        
        #toast { position: fixed; top: -100px; left: 15px; right: 15px; padding: 15px; border-radius: 12px; text-align: center; z-index: 10000; transition: 0.5s; font-weight: bold; }
        #toast.active { top: 20px; }

        #cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
    <div class="tab" onclick="switchTab('cards', this)">КАРТИ</div>
    <div class="tab" onclick="switchTab('prof', this)">ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu">
        <h1 style="text-align:center; color:var(--accent); margin: 30px 0; letter-spacing: 2px;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
        <div style="text-align:center; opacity:0.3; margin: 10px;">— ПРИЄДНАТИСЯ —</div>
        <input type="number" id="room-input" placeholder="Код кімнати">
        <button class="btn btn-blue" onclick="joinRoom()">УВІЙТИ</button>
    </div>

    <div id="view-lobby" style="display:none;">
        <div class="card-item" style="flex-direction:column; border: 2px solid var(--blue);">
            <small>ID КІМНАТИ:</small>
            <h2 id="room-id-txt" style="color:var(--accent); font-size:32px;">----</h2>
        </div>
        <div id="lobby-players" style="margin-top:20px;"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none; margin-top:20px;" onclick="startGame()">ПОЧАТИ ГРУ</button>
    </div>

    <div id="view-play" style="display:none; flex-direction:column; height: 100%;">
        <div id="role-info" class="card-item" style="justify-content:center; border:2px solid var(--accent);"></div>
        <div id="turn-indicator">Чекаємо завантаження...</div>
        <div id="chat-stream"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Ваш текст..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button id="send-btn" class="btn btn-blue" style="width:60px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-red" style="flex:1;" onclick="toggleV()">ГОЛОСУВАТИ</button>
            <button id="spy-btn" class="btn btn-green" style="flex:1; display:none;" onclick="toggleG()">ВГАДАТИ</button>
        </div>
        <div id="v-list" style="display:none; margin-top:10px;"></div>
        <div id="g-list" style="display:none; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px; max-height:200px; overflow-y:auto;"></div>
    </div>
</div>

<div id="scr-cards" class="screen">
    <h2 style="margin-bottom:15px; color:var(--accent);">Усі карти (110)</h2>
    <div id="cards-grid"></div>
</div>

<div id="scr-prof" class="screen">
    <div id="prof-data"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "u"+Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Плазмовий дракон", "Рицар", "Лучники", "Гобліни", "Гігант", "Скелети", "Кулька", "Мушкетер", "Кат", "Торнадо", "Всадниця на барані", "Елітний варвар", "Королівський гігант", "Арбалет", "Мортира", "Гоблінська бочка", "Громовержець", "Нічна відьма", "Крижаний маг", "Бандитка", "Привид", "Рибалка", "Мати-відьма", "Золотий лицар", "Король скелетів", "Королева лучниць", "Монах", "Маленький дракон", "Армія скелетів", "Варвари", "Орда мух", "Пекельна вежа", "Надгробок", "Піч", "Гіганський скелет", "Три мушкетери", "Голем", "Еліксирний голем", "Бойова таран", "Магічний вершник", "Темний лицар", "Дракончик", "Списники", "Банда гоблінів", "Гоблін з дротиками", "Стінобої", "Мисливець", "Електрогігант", "Фенікс", "Електродракон", "Хижа теплиця", "Гоблінська клітка", "Бомбер", "Ватрушка", "Крижаний дух", "Вогняний дух", "Електричний дух", "Дух зцілення", "Кажан", "Вогняна куля", "Стріли", "Ракета", "Блискавка", "Яд", "Дзеркало", "Ярость", "Клон", "Землетрус", "Сніжок", "Королівська пошта", "Гоблінське буріння", "Повозка з гарматою", "Гармата", "Тесла", "Бомбова вежа", "Клітка", "Варварська бочка", "Гігантська сніжка", "Електромаг", "Електродух", "Вартовий", "Вишибала", "Принц", "Темний принц", "Всадник на кабані", "Літальна машина", "Мушкетерки", "Вершник", "Ракетниця", "Скелет у бочці", "Королівські кабани", "Рама", "Бойова повозка", "Варвари-вишибали", "Маленький принц", "Електричний гігант", "Охоронці", "Дух вогню", "Дух льоду", "Дух електро", "Лісоруб", "Варвар", "Гоблін-гігант"];

    let room = null, isHost = false, myVoted = false, pOrder = [];

    function init() {
        // Рендер вкладки карт
        document.getElementById('cards-grid').innerHTML = allCards.map(c => `<div class="card-item" style="font-size:12px;">${c}</div>`).join('');
        // Рендер списку вгадування для шпигуна
        document.getElementById('g-list').innerHTML = allCards.map(c => `<button class="btn btn-blue" style="padding:8px; font-size:10px;" onclick="guess('${c}')">${c}</button>`).join('');
        // Статистика профілю
        db.ref('users/' + uID + '/wins').on('value', s => {
            document.getElementById('prof-data').innerHTML = `<div class="card-item" style="flex-direction:column; padding:30px; text-align:center;"><h1>🏆</h1><h2 style="margin:10px 0;">${uName}</h2><h1 style="color:var(--accent); font-size:48px;">${s.val()||0}</h1><p>Перемог у грі</p></div>`;
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active-screen');
        el.classList.add('active');
    }

    async function createRoom() {
        room = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + room).set({ host: uID, status: 'lobby', turnIdx: 0 });
        initRoom();
    }

    function joinRoom() {
        room = document.getElementById('room-input').value;
        if(room.length < 4) return;
        initRoom();
    }

    function initRoom() {
        document.getElementById('view-menu').style.display = 'none';
        document.getElementById('view-lobby').style.display = 'block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/' + room + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const plist = document.getElementById('lobby-players');
            plist.innerHTML = "";
            pOrder = Object.keys(d.players);
            pOrder.forEach(id => {
                const v = (d.votes && d.votes[id]) ? d.votes[id] : 0;
                plist.innerHTML += `<div class="card-item"><span>👤 ${d.players[id].name}</span> ${v>0?`<b style="color:var(--red)">${v}</b>`:''}</div>`;
            });

            if(isHost) { document.getElementById('start-btn').style.display = 'block'; document.getElementById('start-btn').disabled = pOrder.length < 2; }
            if(d.status === 'started') renderGame(d);
            if(d.winner) showEnd(d.winner, d.reason);
        });

        db.ref('rooms/' + room + '/chat').on('value', s => {
            const stream = document.getElementById('chat-stream');
            stream.innerHTML = "";
            s.forEach(m => {
                const isMe = m.val().uid === uID;
                stream.innerHTML += `<div class="msg-bubble ${isMe?'mine':''}"><b>${m.val().u}:</b><br>${m.val().m}</div>`;
            });
            stream.scrollTop = stream.scrollHeight;
        });
    }

    function startGame() {
        const card = allCards[Math.floor(Math.random()*allCards.length)];
        const spy = pOrder[Math.floor(Math.random()*pOrder.length)];
        db.ref('rooms/' + room).update({ status: 'started', spyID: spy, cardName: card, turnIdx: 0, order: pOrder });
    }

    function renderGame(d) {
        document.getElementById('view-lobby').style.display = 'none';
        document.getElementById('view-play').style.display = 'flex';
        const isSpy = d.spyID === uID;
        document.getElementById('role-info').innerHTML = isSpy ? `<h2 style="color:var(--red)">ТИ ШПИГУН 🕵️</h2>` : `<div><small>КАРТА:</small><h2>${d.cardName}</h2></div>`;
        if(isSpy) document.getElementById('spy-btn').style.display = 'block';

        const activeUID = d.order[d.turnIdx];
        const isMyTurn = activeUID === uID;
        document.getElementById('turn-indicator').innerText = isMyTurn ? "ВАШ ХІД! Запитуйте або відповідайте." : `Чекаємо на хід: ${d.players[activeUID].name}`;
        document.getElementById('chat-input').disabled = !isMyTurn;
        document.getElementById('send-btn').disabled = !isMyTurn;

        const v = document.getElementById('v-list'); v.innerHTML = "";
        d.order.forEach(id => { if(id !== uID) v.innerHTML += `<button class="btn btn-blue" onclick="vote('${id}')" ${myVoted?'disabled':''}>${d.players[id].name}</button>`; });
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input');
        if(!inp.value.trim() || inp.disabled) return;
        
        db.ref('rooms/' + room).once('value', s => {
            const d = s.val();
            db.ref('rooms/' + room + '/chat').push({ u: uName, uid: uID, m: inp.value });
            const nextIdx = (d.turnIdx + 1) % d.order.length;
            db.ref('rooms/' + room).update({ turnIdx: nextIdx });
            inp.value = "";
        });
    }

    function vote(tid) {
        if(myVoted) return; myVoted = true;
        db.ref('rooms/' + room + '/votes/' + tid).transaction(c => (c||0)+1);
        document.getElementById('v-list').style.display = 'none';
        checkResult();
    }

    function checkResult() {
        db.ref('rooms/' + room).once('value', s => {
            const d = s.val(); let total = 0; if(d.votes) Object.values(d.votes).forEach(v => total += v);
            if(total >= d.order.length) {
                let max = 0, target = "";
                Object.keys(d.votes).forEach(id => { if(d.votes[id] > max) { max = d.votes[id]; target = id; } });
                db.ref('rooms/' + room).update(target === d.spyID ? {winner:'civ', reason:'Шпигуна викрито!'} : {winner:'spy', reason:'Вигнали мирного!'});
            }
        });
    }

    function guess(c) {
        db.ref('rooms/' + room).once('value', s => {
            db.ref('rooms/' + room).update(c === s.val().cardName ? {winner:'spy', reason:'Шпигун вгадав карту!'} : {winner:'civ', reason:'Шпигун помилився!'});
        });
    }

    function showEnd(w, r) {
        const t = document.getElementById('toast');
        const won = (w === 'spy' && document.getElementById('role-info').innerText.includes("ШПИГУН")) || (w === 'civ' && !document.getElementById('role-info').innerText.includes("ШПИГУН"));
        t.innerText = (won ? "ПЕРЕМОГА: " : "ПОРАЗКА: ") + r;
        t.style.background = won ? 'var(--green)' : 'var(--red)';
        t.classList.add('active');
        setTimeout(() => location.reload(), 4000);
    }

    function toggleV() { const x = document.getElementById('v-list'); x.style.display = x.style.display==='block'?'none':'block'; }
    function toggleG() { const x = document.getElementById('g-list'); x.style.display = x.style.display==='grid'?'none':'grid'; }

    window.onload = init;
</script>
</body>
</html>
