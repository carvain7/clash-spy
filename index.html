<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Ultra v9.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0b101b; --panel: #1c2538; --accent: #fbbf24; 
            --blue-grad: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
            --green-grad: linear-gradient(180deg, #34d399 0%, #059669 100%);
            --red-grad: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        .tab-bar { display: flex; background: #161f32; height: 65px; border-top: 2px solid #2d3748; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #94a3b8; transition: 0.3s; font-weight: bold; }
        .tab.active { color: var(--accent); }
        .tab span { font-size: 20px; }

        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 14px; border: none; 
            font-weight: 900; color: white; cursor: pointer; margin-bottom: 10px;
            text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .btn-blue { background: var(--blue-grad); border-bottom: 4px solid #1e40af; }
        .btn-green { background: var(--green-grad); border-bottom: 4px solid #065f46; }
        .btn-red { background: var(--red-grad); border-bottom: 4px solid #991b1b; }

        .widget { background: var(--panel); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; margin-bottom: 10px; }

        #queue-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
        .q-item { min-width: 70px; padding: 8px; border-radius: 10px; background: rgba(255,255,255,0.05); text-align: center; font-size: 10px; opacity: 0.5; }
        .q-active { opacity: 1; border: 1px solid var(--accent); background: rgba(251, 191, 36, 0.1); transform: scale(1.05); }

        #chat-stream { flex: 1; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 12px; margin-bottom: 10px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .msg.mine { align-self: flex-end; background: #2563eb; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }

        #toast { 
            position: fixed; top: -200px; left: 15px; right: 15px; padding: 25px; 
            border-radius: 20px; text-align: center; z-index: 10000; transition: 0.5s;
            font-size: 20px; font-weight: 900; color: white; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #toast.active { top: 30px; }
        .hidden-tab { display: none !important; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="tab-bar" id="main-nav">
    <div class="tab active" onclick="switchTab('game', this)"><span>⚔️</span>ГРА</div>
    <div class="tab" id="nav-cards" onclick="switchTab('cards', this)"><span>🃏</span>КАРТИ</div>
    <div class="tab" id="nav-store" onclick="switchTab('store', this)"><span>💎</span>МАГАЗИН</div>
    <div class="tab" id="nav-prof" onclick="switchTab('prof', this)"><span>👤</span>ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu">
        <h1 style="text-align:center; color:var(--accent); font-size:40px; margin: 30px 0;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
        <input type="number" id="room-input" placeholder="Код кімнати">
        <button class="btn btn-blue" onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
    </div>

    <div id="view-lobby" style="display:none;">
        <div class="widget" style="text-align:center;">
            <small>ID КІМНАТИ</small>
            <div id="room-id-txt" style="font-size:28px; font-weight:900; color:var(--accent);">0000</div>
        </div>
        <div id="lobby-players"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none; margin-top:15px;" onclick="startGame()">ПОЧАТИ ГРУ</button>
    </div>

    <div id="view-play" style="display:none; flex-direction:column; height:100%;">
        <div id="role-box" class="widget" style="text-align:center;"></div>
        <div id="queue-bar"></div>
        <div id="chat-stream"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Напишіть щось..." style="margin:0; text-align:left;">
            <button id="send-btn" class="btn btn-blue" style="width:60px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-red" style="flex:1;" onclick="toggleV()">ГОЛОСУВАТИ</button>
            <button id="guess-btn" class="btn btn-green" style="flex:1; display:none;" onclick="toggleG()">ВГАДАТИ КАРТУ</button>
        </div>
        <div id="v-list" style="display:none; margin-top:10px;"></div>
        <div id="g-list" style="display:none; flex-direction:column; margin-top:10px;">
            <div id="g-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<div id="scr-cards" class="screen"><div id="cards-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div></div>
<div id="scr-store" class="screen"><div id="store-content"></div></div>
<div id="scr-prof" class="screen"><div id="prof-data"></div></div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "temp").toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Плазмовий дракон", "Рицар", "Гігант", "Скелети", "Кулька", "Мушкетер", "Кат", "Торнадо", "Всадниця на барані", "Елітний варвар", "Королівський гігант", "Арбалет", "Мортира", "Гоблінська бочка", "Громовержець", "Нічна відьма", "Крижаний маг", "Бандитка", "Привид", "Рибалка", "Мати-відьма", "Золотий лицар", "Король скелетів", "Королева лучниць", "Монах", "Маленький дракон", "Армія скелетів", "Голем", "Електрогігант", "Фенікс", "Маленький принц", "Еліксирний голем", "Темний лицар", "Мисливець", "Вишибала", "Бойовий таран", "Пекельна вежа", "Три мушкетери", "Гармата", "Тесла", "Ракетниця", "Скелет у бочці", "Королівські кабани", "Рама", "Фургон", "Варварська бочка", "Землетрус", "Сніжок", "Яд", "Блискавка", "Ракета", "Клон", "Дзеркало", "Ярость", "Зап", "Стріли", "Вогняна куля", "Бомбер", "Дух вогню", "Дух льоду", "Дух електро", "Дух зцілення", "Кажани", "Мухи", "Орда мух", "Варвари", "Міньйони", "Гобліни", "Лучники", "Списники", "Гоблін з дротиками", "Стінобої", "Гаргулья", "Охоронці", "Принц", "Темний принц", "Гоблін-гігант", "Електродракон", "Лавова гонча", "Льодяний голем"];

    let room = null, isHost = false, myVoted = false, myWins = 0, myCoins = 0;

    function getRank(w) { 
        const n = parseInt(w) || 0;
        if(n >= 20) return "👑 Король";
        if(n >= 10) return "⚔️ Майстер";
        if(n >= 5) return "🛡️ Лицар";
        return "🌱 Новачок";
    }

    function switchTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active-screen');
        el.classList.add('active');
    }

    function toggleNav(show) {
        const navs = ['nav-cards', 'nav-store', 'nav-prof'];
        navs.forEach(id => document.getElementById(id).classList.toggle('hidden-tab', !show));
    }

    async function createRoom() { room = Math.floor(1000+Math.random()*8999).toString(); isHost=true; await db.ref('rooms/'+room).set({host:uID, status:'lobby'}); initRoom(); }
    function joinRoom() { room = document.getElementById('room-input').value; if(room.length<4) return; initRoom(); }

    function initRoom() {
        document.getElementById('view-menu').style.display='none';
        document.getElementById('view-lobby').style.display='block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/'+room+'/players/'+uID).set({name:uName, rank:getRank(myWins)});

        db.ref('rooms/'+room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const players = d.players || {};
            const ids = Object.keys(players);
            
            document.getElementById('lobby-players').innerHTML = ids.map(id => `<div class="widget" style="display:flex; justify-content:space-between;"><span>${players[id].name}</span><span style="color:var(--accent)">${players[id].rank}</span></div>`).join('');
            
            if(d.status==='started') {
                toggleNav(false);
                document.getElementById('view-lobby').style.display='none';
                document.getElementById('view-play').style.display='flex';
                renderGame(d);
            } else {
                toggleNav(true);
            }
            if(isHost) { const b=document.getElementById('start-btn'); b.style.display='block'; b.disabled=ids.length<3; }
            if(d.winner) handleEnd(d);
        });

        db.ref('rooms/'+room+'/chat').on('value', s => {
            const st = document.getElementById('chat-stream'); st.innerHTML = "";
            s.forEach(m => { st.innerHTML += `<div class="msg ${m.val().uid===uID?'mine':'other'}"><b>${m.val().u}</b><br>${m.val().m}</div>`; });
            st.scrollTop = st.scrollHeight;
        });
    }

    function startGame() {
        db.ref('rooms/'+room+'/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/'+room).update({status:'started', spyID:ids[Math.floor(Math.random()*ids.length)], cardName:allCards[Math.floor(Math.random()*allCards.length)], turnIdx:0, order:ids, votes:null, winner:null});
        });
    }

    function renderGame(d) {
        const isSpy = d.spyID === uID;
        document.getElementById('role-box').innerHTML = isSpy ? `<h2 style="color:#ef4444; margin:0;">🕵️ ТИ ШПИГУН</h2>` : `<small>КАРТА:</small><h2 style="color:var(--accent); margin:0;">${d.cardName}</h2>`;
        document.getElementById('guess-btn').style.display = isSpy ? 'block' : 'none';
        
        document.getElementById('queue-bar').innerHTML = d.order.map((id, i) => `<div class="q-item ${i===d.turnIdx?'q-active':''}">👤 ${d.players[id].name}</div>`).join('');

        const isTurn = d.order[d.turnIdx] === uID;
        document.getElementById('chat-input').disabled = !isTurn;
        document.getElementById('send-btn').disabled = !isTurn;

        const vts = d.votes || {};
        document.getElementById('v-list').innerHTML = d.order.filter(id => id !== uID).map(id => `<button class="btn btn-blue" onclick="vote('${id}')" ${myVoted?'disabled':''}>${d.players[id].name} (${vts[id]||0})</button>`).join('');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(d.order[d.turnIdx] !== uID) return;
            db.ref('rooms/'+room+'/chat').push({u:uName, uid:uID, m:inp.value});
            db.ref('rooms/'+room).update({turnIdx: (d.turnIdx + 1) % d.order.length});
            inp.value = "";
        });
    }

    function toggleV() { document.getElementById('g-list').style.display='none'; const x=document.getElementById('v-list'); x.style.display=x.style.display==='block'?'none':'block'; }
    function toggleG() { 
        document.getElementById('v-list').style.display='none'; 
        const x=document.getElementById('g-list'); x.style.display=x.style.display==='flex'?'none':'flex'; 
        document.getElementById('g-grid').innerHTML = allCards.map(c => `<button class="btn btn-blue" style="font-size:10px; padding:10px;" onclick="guess('${c}')">${c}</button>`).join('');
    }

    function guess(c) {
        db.ref('rooms/'+room).once('value', s => {
            const win = (c === s.val().cardName);
            db.ref('rooms/'+room).update(win ? {winner:'spy', reason:'Шпигун вгадав карту!'} : {winner:'civ', reason:'Шпигун помилився!'});
        });
    }

    function vote(tid) {
        if(myVoted) return; myVoted=true;
        db.ref('rooms/'+room+'/votes/'+tid).transaction(v=>(v||0)+1);
        db.ref('rooms/'+room+'/votes/v_by_'+uID).set(true);
        checkVotes();
    }

    function checkVotes() {
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(!d || d.winner) return;
            const vDone = d.votes ? Object.keys(d.votes).filter(k=>k.startsWith('v_by_')).length : 0;
            if(vDone >= d.order.length) {
                let max=-1, target=""; d.order.forEach(id => { if((d.votes[id]||0)>max) { max=d.votes[id]||0; target=id; } });
                db.ref('rooms/'+room).update(target===d.spyID ? {winner:'civ', reason:'Шпигуна викрито!'} : {winner:'spy', reason:'Вигнали мирного!'});
            }
        });
    }

    function handleEnd(d) {
        const isSpy = d.spyID === uID;
        const toast = document.getElementById('toast');
        toast.innerText = d.reason;
        
        const win = (d.winner === 'spy' && isSpy) || (d.winner === 'civ' && !isSpy);
        
        if (d.winner === 'spy') toast.style.background = 'var(--red-grad)';
        else toast.style.background = 'var(--green-grad)';

        toast.classList.add('active');
        if(win) {
            db.ref('users_v3/'+uID).transaction(u => {
                if(u) { u.wins = (u.wins||0)+1; u.coins = (u.coins||0)+100; }
                return u;
            });
        }

        setTimeout(() => {
            toast.classList.remove('active');
            myVoted = false;
            if(isHost) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null});
            switchTab('game', document.querySelector('.tab'));
        }, 5000);
    }

    window.onload = () => {
        db.ref('users_v3/'+uID).on('value', s => {
            const d = s.val() || {wins:0, coins:0};
            myWins = d.wins || 0;
            myCoins = d.coins || 0;
            
            document.getElementById('prof-data').innerHTML = `
                <div class="widget" style="text-align:center;">
                    <div style="font-size:24px; font-weight:bold;">${uName}</div>
                    <div style="margin:10px 0;">${getRank(myWins)}</div>
                    <h1 style="color:var(--accent); font-size:60px; margin:10px 0;">${myWins}</h1>
                    <div style="opacity:0.6;">ПЕРЕМОГ</div>
                    <div style="margin-top:20px; font-size:20px; color:var(--accent);">💰 ${myCoins} монет</div>
                </div>`;

            document.getElementById('store-content').innerHTML = `
                <div class="widget" style="text-align:center;">
                    <h2>КРАМНИЦЯ</h2>
                    <div style="font-size:20px; margin-bottom:20px;">Твій баланс: 💰 ${myCoins}</div>
                    <div class="widget">Скін: Золоте ім'я - 1000 💰<br><button class="btn btn-blue" style="margin-top:10px; font-size:10px;">КУПИТИ</button></div>
                </div>`;
        });
        allCards.forEach(c => { document.getElementById('cards-grid').innerHTML += `<div class="widget" style="text-align:center; padding:10px;">${c}</div>`; });
    };
</script>
</body>
</html>
