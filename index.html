<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy - Fixed Lobby</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #1a2236; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #161d2e; display: flex; border-top: 1px solid #2d3748; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; font-weight: bold; margin-top: 4px; }

        .screen { display: none; height: calc(100vh - 70px); width: 100%; flex-direction: column; overflow-y: auto; padding: 15px; }
        .active { display: flex; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; font-size: 16px; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }

        #role-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #chat-win { flex: 1; background: #05070a; border-radius: 12px; border: 1px solid #1a2236; margin: 10px 0; overflow-y: auto; padding: 15px; font-size: 14px; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 20px; border-radius: 15px; font-weight: bold; z-index: 3000; transition: 0.5s; width: 85%; text-align: center; }
        #toast.show { top: 20px; }
        
        .visual-card { width: 200px; height: 270px; margin: 20px auto; border-radius: 15px; border: 5px solid var(--accent); background: #1e293b; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="role-overlay">
        <h2 style="color:#64748b">ВАША РОЛЬ</h2>
        <h1 id="role-title" style="font-size: 40px;">---</h1>
        <p id="role-hint" style="color:#94a3b8; padding: 0 40px;"></p>
        <button id="ready-btn" class="btn btn-green" onclick="confirmReady()" style="width:220px;">ГАРАЗД, Я ГОТОВ</button>
        <div id="ready-wait" style="display:none; color:var(--accent); margin-top:20px; font-weight:bold;">Очікування гравців (1/3)...</div>
    </div>

    <div id="toast">Повідомлення</div>

    <div id="scr-main" class="screen active">
        <h1 style="text-align:center; color:var(--accent); margin-top:40px;">CLASH SPY</h1>
        <div style="background:var(--card); padding:20px; border-radius:15px;">
            <p style="text-align:center;">Привіт, <b id="user-display-name">...</b>!</p>
            <button class="btn btn-green" onclick="enterLobby(true)">СТВОРІТЬ ЛОБІ</button>
            <input type="text" id="join-input" placeholder="Введіть код..." style="width:100%; padding:15px; border-radius:12px; border:1px solid #334155; background:var(--bg); color:white; margin:10px 0; text-align:center;">
            <button class="btn btn-blue" onclick="enterLobby(false)">ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h3 style="text-align:center">КІМНАТА: <span id="lobby-id" style="color:var(--accent)">-</span></h3>
        <div id="player-list" style="background:var(--card); padding:20px; border-radius:15px; border:1px solid #334155;">
            <div id="p1-row" style="margin-bottom:10px;">👤 <b id="p1-name">Ви</b> (Хост) ✅</div>
            <div id="p2-row" style="color:#64748b; margin-bottom:10px;">👤 <span id="p2-name">Очікування...</span></div>
            <div id="p3-row" style="color:#64748b;">👤 <span id="p3-name">Очікування...</span></div>
        </div>
        <div id="lobby-status-msg" style="text-align:center; font-size:12px; margin:15px 0; color:#64748b;">Очікуйте, поки хост запустить гру...</div>
        <button id="start-game-btn" class="btn btn-blue" onclick="prepGame()" style="display:none;">🚀 РОЗПОЧАТИ ГРУ</button>
        <button class="btn" onclick="location.reload()" style="background:none; color:var(--red);">Вийти</button>
    </div>

    <div id="scr-game" class="screen">
        <div style="display:flex; justify-content:space-between; background:var(--card); padding:10px; border-radius:10px;">
            <span id="game-timer" style="color:var(--red); font-weight:bold;">05:00</span>
            <span id="p-count" style="font-size:12px; color:var(--accent)">3 Гравці</span>
        </div>
        <div id="chat-win"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-in" placeholder="Ваше повідомлення..." style="flex:1; padding:15px; border-radius:12px; border:none; background:var(--card); color:white;">
            <button class="btn btn-blue" onclick="sendMsg()" style="width:60px; margin:0;">➜</button>
        </div>
        <button id="action-btn" class="btn btn-red" onclick="handleAction()" style="margin-top:10px;">🚫 ВИКРИТИ ШПИГУНА</button>
    </div>

    <div id="scr-card" class="screen">
        <div id="card-area"></div>
    </div>

    <div id="scr-profile" class="screen">
        <h2>Профіль</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px;">
            <p>🏆 Перемог: <b id="w-stats">0</b></p>
            <p>💀 Поразок: <b id="l-stats">0</b></p>
        </div>
    </div>

    <nav class="nav-bar" id="main-nav">
        <div class="nav-item active" onclick="nav('scr-main',this,'menu')">🏠<span>ДІМ</span></div>
        <div class="nav-item" onclick="nav('scr-profile',this,'menu')">👤<span>ПРОФІЛЬ</span></div>
    </nav>
    <nav class="nav-bar" id="game-nav" style="display:none;">
        <div class="nav-item active" onclick="nav('scr-game',this,'game')">💬<span>ЧАТ</span></div>
        <div class="nav-item" onclick="nav('scr-card',this,'game')">🃏<span>КАРТА</span></div>
    </nav>

    <script>
        const cards = [
            {n:"П.Е.К.К.А", r:"epic", i:"🦾", hp:3800, dmg:800}, {n:"Мегалицар", r:"leg", i:"🌑", hp:3500, dmg:250}, 
            {n:"Вершник", r:"rare", i:"🐷", hp:1400, dmg:318}, {n:"Відьма", r:"epic", i:"🧙‍♀️", hp:800, dmg:120}
        ];

        let stats = JSON.parse(localStorage.getItem('csStats')) || {w:0, l:0};
        let userName = localStorage.getItem('csName') || "";
        let isHost = false, isSpy = false, currentCard = null, timerInt;

        if(!userName) {
            userName = prompt("Ваше ім'я:") || "Гість";
            localStorage.setItem('csName', userName);
        }
        document.getElementById('user-display-name').innerText = userName;

        function enterLobby(host) {
            isHost = host;
            const code = host ? "CR-" + Math.floor(100+Math.random()*899) : document.getElementById('join-input').value;
            if(!host && !code) return alert("Введіть код!");

            document.getElementById('lobby-id').innerText = code;
            document.getElementById('p1-name').innerText = userName;
            document.getElementById('main-nav').style.display = 'none';
            
            if(isHost) {
                document.getElementById('start-game-btn').style.display = 'block';
                document.getElementById('lobby-status-msg').innerText = "Ви організатор. Чекайте гравців.";
            } else {
                document.getElementById('start-game-btn').style.display = 'none';
                document.getElementById('lobby-status-msg').innerText = "Ви приєдналися. Чекайте старту від хоста...";
                // Імітація: "хост" заповнює імена
                document.getElementById('p2-name').innerText = "Хост (Андрій)";
                document.getElementById('p3-name').innerText = "Марія";
            }
            nav('scr-lobby');
        }

        function prepGame() {
            // Розподіл ролей
            isSpy = Math.random() < 0.35;
            currentCard = cards[Math.floor(Math.random()*cards.length)];
            
            const ov = document.getElementById('role-overlay');
            ov.style.display = 'flex';
            document.getElementById('role-title').innerText = isSpy ? "ШПИГУН 🕵️" : "ГРАВЕЦЬ 🛡️";
            document.getElementById('role-title').style.color = isSpy ? "var(--red)" : "var(--green)";
            document.getElementById('role-hint').innerText = isSpy ? "Дізнайся назву карти з питань гравців." : "Описуй карту, не називаючи її!";
        }

        function confirmReady() {
            document.getElementById('ready-btn').style.display = 'none';
            document.getElementById('ready-wait').style.display = 'block';
            
            // Імітація синхронного старту (чекаємо 2 секунди, ніби інші теж натиснули)
            let c = 1;
            const interval = setInterval(() => {
                c++;
                document.getElementById('ready-wait').innerText = `Очікування гравців (${c}/3)...`;
                if(c >= 3) {
                    clearInterval(interval);
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            document.getElementById('role-overlay').style.display = 'none';
            document.getElementById('game-nav').style.display = 'flex';
            
            if(isSpy) {
                document.getElementById('action-btn').innerText = "🎯 ВГАДАТИ КАРТУ";
                document.getElementById('card-area').innerHTML = "<h2>Ви — шпигун. Слухайте чат!</h2>";
            } else {
                document.getElementById('card-area').innerHTML = `
                    <div class="visual-card">
                        <span style="font-size:60px">${currentCard.i}</span>
                        <h3>${currentCard.n}</h3>
                    </div>`;
            }
            
            nav('scr-game', document.querySelector('#game-nav .nav-item'), 'game');
            let time = 300;
            timerInt = setInterval(() => {
                time--;
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('game-timer').innerText = `${m}:${s<10?'0'+s:s}`;
                if(time <= 0) finish(false);
            }, 1000);
        }

        function sendMsg() {
            const inp = document.getElementById('chat-in');
            if(!inp.value) return;
            document.getElementById('chat-win').innerHTML += `<div><b>${userName}:</b> ${inp.value}</div>`;
            inp.value = "";
        }

        function nav(id, el, type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                const nid = type === 'menu' ? 'main-nav' : 'game-nav';
                document.querySelectorAll(`#${nid} .nav-item`).forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function finish(win) {
            clearInterval(timerInt);
            if(win) stats.w++; else stats.l++;
            localStorage.setItem('csStats', JSON.stringify(stats));
            alert(win ? "ПЕРЕМОГА!" : "ПОРАЗКА!");
            location.reload();
        }

        document.getElementById('w-stats').innerText = stats.w;
        document.getElementById('l-stats').innerText = stats.l;
    </script>
</body>
</html>
