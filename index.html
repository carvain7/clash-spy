<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Elite v10</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0b101b; --panel: #1c2538; --accent: #fbbf24; 
            --blue-grad: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
            --green-grad: linear-gradient(180deg, #34d399 0%, #059669 100%);
            --red-grad: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Arial', sans-serif; }
        body { background: var(--bg); color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        /* ВЕЛИКІ ТАБИ */
        .tab-bar { display: flex; background: #161f32; height: 75px; border-top: 3px solid #2d3748; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; color: #94a3b8; font-weight: bold; }
        .tab.active { color: var(--accent); }
        .tab span { font-size: 26px; margin-bottom: 2px; }

        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        /* ВЕЛИКІ КНОПКИ */
        .btn { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            font-weight: 900; color: white; cursor: pointer; margin-bottom: 12px;
            text-transform: uppercase; font-size: 16px; box-shadow: 0 5px 0 rgba(0,0,0,0.4);
        }
        .btn-blue { background: var(--blue-grad); border-bottom: 4px solid #1e40af; }
        .btn-green { background: var(--green-grad); border-bottom: 4px solid #065f46; }
        .btn-red { background: var(--red-grad); border-bottom: 4px solid #991b1b; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

        .widget { background: var(--panel); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; }
        .rank-tag { font-size: 11px; background: rgba(251, 191, 36, 0.1); color: var(--accent); padding: 3px 8px; border-radius: 6px; border: 1px solid var(--accent); font-weight: bold; }

        #chat-stream { flex: 1; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; margin-bottom: 15px; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid #1e293b; }
        .msg { margin-bottom: 10px; padding: 12px 16px; border-radius: 18px; font-size: 16px; max-width: 85%; line-height: 1.4; }
        .msg.mine { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #334155; color: #e2e8f0; border-bottom-left-radius: 4px; }

        /* АДМІНКА */
        #adm-btn { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: var(--accent); border-radius: 12px; display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #adm-panel { position: fixed; top: 80px; right: 20px; width: 280px; background: #1e293b; border: 2px solid var(--accent); border-radius: 20px; padding: 20px; display: none; z-index: 1001; }

        #toast { position: fixed; top: -250px; left: 20px; right: 20px; padding: 35px; border-radius: 25px; text-align: center; z-index: 10000; transition: 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49); font-weight: 900; font-size: 22px; color: white; border-bottom: 8px solid rgba(0,0,0,0.2); }
        #toast.active { top: 40px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b>CORE ADMIN</b><span onclick="toggleAdm()" style="cursor:pointer; font-size:20px;">✕</span></div>
    <div id="adm-status" style="font-size:12px; margin-bottom:15px; background:#0f172a; padding:10px; border-radius:12px; border:1px solid #334155;"></div>
    <button class="btn btn-blue" style="padding:10px; font-size:12px;" onclick="addBot()">+ ДОДАТИ БОТА 🤖</button>
    <button class="btn btn-red" style="padding:10px; font-size:12px;" onclick="resetToLobby()">СКИНУТИ КІМНАТУ</button>
</div>

<div class="tab-bar" id="main-nav">
    <div class="tab active" onclick="switchTab('game', this)"><span>⚔️</span>ГРА</div>
    <div class="tab" id="t-cards" onclick="switchTab('cards', this)"><span>🃏</span>КАРТИ</div>
    <div class="tab" id="t-store" onclick="switchTab('store', this)"><span>💎</span>МАГАЗИН</div>
    <div class="tab" id="t-prof" onclick="switchTab('prof', this)"><span>👤</span>ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu">
        <h1 onclick="devMode()" style="text-align:center; color:var(--accent); font-size:50px; margin: 50px 0; text-shadow: 0 5px #92400e;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ БІЙ</button>
        <input type="number" id="room-input" placeholder="Код кімнати (4 цифри)" style="font-size:18px; padding:18px; border-radius:15px; border:2px solid #334155; background:#0f172a; color:white; width:100%; text-align:center; margin-bottom:15px;">
        <button class="btn btn-blue" onclick="joinRoom()">УВІЙТИ В БІЙ</button>
    </div>

    <div id="view-lobby" style="display:none;">
        <div class="widget" style="text-align:center; border: 2px dashed var(--accent);">
            <small style="opacity:0.6; letter-spacing:1px;">ID КІМНАТИ</small>
            <div id="room-id-txt" style="font-size:36px; font-weight:900; color:var(--accent);">----</div>
        </div>
        <div id="lobby-players"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none; margin-top:20px;" onclick="startGame()">ПОЧАТИ ГРУ</button>
        <button class="btn btn-red" style="margin-top:10px;" onclick="exitRoom()">ПОКИНУТИ ЛОБІ</button>
    </div>

    <div id="view-play" style="display:none; flex-direction:column; height:100%;">
        <div id="role-info" class="widget" style="text-align:center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);"></div>
        <div id="chat-stream"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Твій хід..." style="flex:1; padding:15px; border-radius:15px; border:none; background:#1e293b; color:white; font-size:16px;">
            <button id="send-btn" class="btn btn-blue" style="width:70px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn btn-red" style="flex:1;" onclick="toggleV()">ГОЛОСУВАТИ</button>
            <button id="guess-btn" class="btn btn-green" style="flex:1; display:none;" onclick="toggleG()">ВГАДАТИ КАРТУ</button>
        </div>
        <button class="btn btn-red" style="padding:10px; font-size:12px; margin-top:15px; opacity:0.7;" onclick="exitRoom()">ЕКСТРЕНИЙ ВИХІД</button>
        <div id="v-list" style="display:none; margin-top:10px;"></div>
        <div id="g-list" style="display:none; flex-direction:column; margin-top:10px;">
            <div id="g-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; max-height:220px; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<div id="scr-cards" class="screen"><div id="cards-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div></div>
<div id="scr-store" class="screen"><div id="store-ui"></div></div>
<div id="scr-prof" class="screen"><div id="prof-ui"></div></div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "user_" + Math.floor(Math.random()*9999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Плазмовий дракон", "Рицар", "Гігант", "Кулька", "Мушкетер", "Кат", "Торнадо", "Арбалет", "Гоблінська бочка", "Нічна відьма", "Крижаний маг", "Бандитка", "Привид", "Рибалка", "Мати-відьма", "Золотий лицар", "Король скелетів", "Королева лучниць", "Монах", "Фенікс", "Маленький принц"];

    let room = null, isHost = false, myVoted = false, dClicks = 0, myWins = 0, myCoins = 0;

    function getRank(w) { 
        const v = parseInt(w) || 0;
        if(v >= 151) return "👑 Король";
        if(v >= 71) return "🔥 Еліта";
        if(v >= 31) return "⚔️ Майстер";
        if(v >= 11) return "🛡️ Лицар";
        return "🌱 Новачок";
    }

    function devMode() { dClicks++; if(dClicks>=5) { document.getElementById('adm-btn').style.display='flex'; dClicks=0; } }
    function toggleAdm() { const p = document.getElementById('adm-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function switchTab(id, el) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('scr-' + id).classList.add('active-screen'); el.classList.add('active'); }

    async function createRoom() { room = Math.floor(1000+Math.random()*8999).toString(); isHost=true; await db.ref('rooms/'+room).set({host:uID, status:'lobby'}); initRoom(); }
    function joinRoom() { room = document.getElementById('room-input').value; if(room.length<4) return; initRoom(); }
    function exitRoom() { if(room) db.ref('rooms/'+room+'/players/'+uID).remove(); location.reload(); }

    function initRoom() {
        document.getElementById('view-menu').style.display='none';
        document.getElementById('view-lobby').style.display='block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/'+room+'/players/'+uID).set({name:uName, wins:myWins, rank:getRank(myWins)});

        db.ref('rooms/'+room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const players = d.players || {};
            const ids = Object.keys(players);
            
            document.getElementById('lobby-players').innerHTML = ids.map(id => `
                <div class="widget" style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:18px;">${players[id].isBot?'🤖 ':''}${players[id].name}</span>
                    <span class="rank-tag">${players[id].rank}</span>
                </div>
            `).join('');
            
            if(isHost) { document.getElementById('adm-status').innerHTML = `Шпигун: ${players[d.spyID]?.name || '?'}<br>Карта: ${d.cardName || '?'}`; }

            if(d.status==='started') {
                ['t-cards','t-store','t-prof'].forEach(id => document.getElementById(id).style.display='none');
                document.getElementById('view-lobby').style.display='none';
                document.getElementById('view-play').style.display='flex';
                renderGame(d);
            } else {
                ['t-cards','t-store','t-prof'].forEach(id => document.getElementById(id).style.display='flex');
            }
            if(isHost) { const b=document.getElementById('start-btn'); b.style.display='block'; b.disabled=ids.length<3; }
            if(d.winner) handleEnd(d);
        });

        db.ref('rooms/'+room+'/chat').on('value', s => {
            const st = document.getElementById('chat-stream'); st.innerHTML = "";
            s.forEach(m => { st.innerHTML += `<div class="msg ${m.val().uid===uID?'mine':'other'}"><b>${m.val().u}</b><br>${m.val().m}</div>`; });
            st.scrollTop = st.scrollHeight;
        });
    }

    function startGame() {
        db.ref('rooms/'+room+'/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/'+room).update({status:'started', spyID:ids[Math.floor(Math.random()*ids.length)], cardName:allCards[Math.floor(Math.random()*allCards.length)], turnIdx:0, order:ids, votes:null, winner:null});
        });
    }

    function renderGame(d) {
        const isSpy = d.spyID === uID;
        document.getElementById('role-info').innerHTML = isSpy ? `<h2 style="color:#ef4444; margin:0; font-size:28px;">🕵️ ТИ ШПИГУН</h2>` : `<small style="opacity:0.6;">ВАША КАРТА:</small><h2 style="color:var(--accent); margin:0; font-size:32px;">${d.cardName}</h2>`;
        document.getElementById('guess-btn').style.display = isSpy ? 'block' : 'none';
        
        const isTurn = d.order[d.turnIdx] === uID;
        document.getElementById('chat-input').disabled = !isTurn;
        document.getElementById('send-btn').disabled = !isTurn;

        const vts = d.votes || {};
        document.getElementById('v-list').innerHTML = d.order.filter(id => id !== uID).map(id => `<button class="btn btn-blue" onclick="vote('${id}')" ${myVoted?'disabled':''}>${d.players[id].name} (${vts[id]||0})</button>`).join('');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(d.order[d.turnIdx] !== uID) return;
            db.ref('rooms/'+room+'/chat').push({u:uName, uid:uID, m:inp.value});
            db.ref('rooms/'+room).update({turnIdx: (d.turnIdx + 1) % d.order.length});
            inp.value = "";
        });
    }

    function toggleV() { document.getElementById('g-list').style.display='none'; const x=document.getElementById('v-list'); x.style.display=x.style.display==='block'?'none':'block'; }
    function toggleG() { 
        document.getElementById('v-list').style.display='none'; 
        const x=document.getElementById('g-list'); x.style.display=x.style.display==='flex'?'none':'flex'; 
        document.getElementById('g-grid').innerHTML = allCards.map(c => `<button class="btn btn-blue" style="font-size:12px; padding:12px;" onclick="guess('${c}')">${c}</button>`).join('');
    }

    function guess(c) {
        db.ref('rooms/'+room).once('value', s => {
            const win = (c === s.val().cardName);
            db.ref('rooms/'+room).update(win ? {winner:'spy', reason:'ШПИГУН ВГАДАВ КАРТУ!'} : {winner:'civ', reason:'ШПИГУН ПОМИЛИВСЯ!'});
        });
    }

    function vote(tid) {
        if(myVoted) return; myVoted=true;
        db.ref('rooms/'+room+'/votes/'+tid).transaction(v=>(v||0)+1);
        db.ref('rooms/'+room+'/votes/v_by_'+uID).set(true);
        checkVotes();
    }

    function checkVotes() {
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(!d || d.winner) return;
            const vDone = d.votes ? Object.keys(d.votes).filter(k=>k.startsWith('v_by_')).length : 0;
            if(vDone >= d.order.length) {
                let max=-1, target=""; d.order.forEach(id => { if((d.votes[id]||0)>max) { max=d.votes[id]||0; target=id; } });
                db.ref('rooms/'+room).update(target===d.spyID ? {winner:'civ', reason:'ШПИГУНА ВИКРИТО!'} : {winner:'spy', reason:'ВИГНАЛИ МИРНОГО!'});
            }
        });
    }

    function handleEnd(d) {
        const isSpy = d.spyID === uID;
        const toast = document.getElementById('toast');
        toast.innerText = d.reason;
        toast.style.background = d.winner === 'spy' ? 'var(--red-grad)' : 'var(--green-grad)';
        toast.classList.add('active');
        
        const iWin = (d.winner==='spy' && isSpy) || (d.winner==='civ' && !isSpy);
        if(iWin) db.ref('users_v3/'+uID).transaction(u => { if(u){u.wins=(u.wins||0)+1; u.coins=(u.coins||0)+100;} return u; });

        setTimeout(() => {
            toast.classList.remove('active');
            myVoted = false;
            if(isHost) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null});
        }, 5000);
    }

    function addBot() { 
        if(!room) return; 
        const bID = "bot_" + Math.floor(Math.random()*9999);
        const names = ["MegaBot", "Elite_Spy", "ClashKing", "Shadow", "Warrior"];
        db.ref('rooms/'+room+'/players/'+bID).set({
            name: names[Math.floor(Math.random()*names.length)],
            wins: 50,
            rank: getRank(50),
            isBot: true
        });
    }
    
    function resetToLobby() { if(room) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null}); }

    window.onload = () => {
        db.ref('users_v3/'+uID).on('value', s => {
            const d = s.val() || {wins:0, coins:0};
            myWins = d.wins || 0; myCoins = d.coins || 0;
            document.getElementById('prof-ui').innerHTML = `
                <div class="widget" style="text-align:center; padding:50px 20px;">
                    <h2 style="font-size:30px; margin-bottom:5px;">${uName}</h2>
                    <div style="margin-bottom:20px;"><span class="rank-tag" style="font-size:16px; padding:5px 15px;">${getRank(myWins)}</span></div>
                    <div style="font-size:80px; font-weight:900; color:var(--accent); line-height:1;">${myWins}</div>
                    <div style="opacity:0.5; font-size:14px; letter-spacing:2px;">ПЕРЕМОГ</div>
                    <div style="margin-top:30px; font-size:24px; color:var(--accent); font-weight:bold;">💰 ${myCoins} МОНЕТ</div>
                </div>`;
            document.getElementById('store-ui').innerHTML = `
                <div class="widget" style="text-align:center;">
                    <h2 style="font-size:28px;">КРАМНИЦЯ</h2>
                    <p style="color:var(--accent); font-size:20px;">Твій баланс: 💰 ${myCoins}</p>
                    <div class="widget" style="margin-top:20px;">
                        <b>ЗОЛОТИЙ НІК</b><br><small>Твій нік стане золотим у лобі</small><br>
                        <button class="btn btn-blue" style="margin-top:15px; font-size:12px;">КУПИТИ ЗА 1000 💰</button>
                    </div>
                </div>`;
        });
        allCards.forEach(c => { document.getElementById('cards-grid').innerHTML += `<div class="widget" style="padding:20px; text-align:center; font-weight:bold; font-size:16px;">${c}</div>`; });
    };
</script>
</body>
</html>
