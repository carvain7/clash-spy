<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v5.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Toast */
        #status-toast { position: fixed; top: -100px; left: 15px; right: 15px; padding: 15px; border-radius: 12px; color: white; text-align: center; font-weight: bold; z-index: 10000; transition: 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #status-toast.show { top: 20px; }

        /* Tabs */
        .tab-bar { display: flex; background: #161f32; border-bottom: 1px solid #2d3748; height: 60px; z-index: 100; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; color: white; opacity: 0.4; transition: 0.3s; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; flex-direction: column; }
        .active-screen { display: flex; }

        /* Buttons & Inputs */
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin: 8px 0; color: white; text-transform: uppercase; font-size: 14px; transition: 0.2s; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        .btn:active { transform: scale(0.96); }
        input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 16px; text-align: center; margin-bottom: 12px; outline: none; }

        /* Admin Panel Improved */
        #admin-toggle { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; z-index: 9000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; }
        #admin-panel { position: fixed; bottom: 140px; right: 20px; width: 250px; background: #1e293b; border: 2px solid var(--accent); border-radius: 16px; padding: 15px; display: none; z-index: 9001; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .admin-section { background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 11px; }

        /* UI Blocks */
        .card-box { background: var(--card); padding: 20px; border-radius: 18px; border: 2px solid #2d3748; text-align: center; margin-bottom: 15px; }
        #chat-window { flex: 1; background: #05070a; overflow-y: auto; padding: 12px; border-radius: 14px; border: 1px solid #1a2236; margin: 10px 0; }
        #guess-menu { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; padding: 10px; background: #161f32; border-radius: 14px; }
    </style>
</head>
<body>

    <div id="status-toast"></div>

    <div id="admin-toggle" onclick="toggleAdminPanel()">⚙️</div>
    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b style="color:var(--accent)">ADMIN CONTROL</b>
            <span onclick="toggleAdminPanel()" style="cursor:pointer">✖</span>
        </div>
        <div class="admin-section" id="admin-live">Чекаємо гри...</div>
        <div id="admin-players" style="max-height: 100px; overflow-y: auto; margin-bottom: 10px;"></div>
        <button class="btn btn-blue" style="padding:10px; font-size:11px;" onclick="addTestBot()">+ ДОДАТИ БОТА</button>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
        <div class="tab" onclick="switchTab('cards', this)">КАРТИ</div>
        <div class="tab" onclick="switchTab('profile', this)">ПРОФІЛЬ</div>
    </div>

    <div id="scr-game" class="screen active-screen">
        <div id="menu-area">
            <h1 style="text-align:center; color:var(--accent); margin-bottom: 30px; letter-spacing: 2px;">CLASH SPY</h1>
            <button class="btn btn-green" onclick="createLobby()">СТВОРИТИ КІМНАТУ</button>
            <div style="margin-top: 25px;">
                <input type="number" id="lobby-input" placeholder="Код лобі">
                <button class="btn btn-blue" onclick="joinLobby()">ПРИЄДНАТИСЯ</button>
            </div>
            <p onclick="enableAdmin()" style="text-align:center; opacity:0.1; font-size:10px; margin-top:50px;">V.5.0.0 (STABLE)</p>
        </div>

        <div id="lobby-area" style="display:none; flex-direction:column; height:100%;">
            <div class="card-box">
                <p style="opacity: 0.6; font-size: 12px;">КОД КІМНАТИ</p>
                <h2 id="room-code-label" style="color:var(--accent); font-size: 32px;">----</h2>
            </div>
            <div id="player-list" style="flex:1;"></div>
            <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">ПОЧАТИ ГРУ</button>
        </div>

        <div id="play-area" style="display:none; flex-direction:column; height:100%;">
            <div id="role-card" class="card-box" style="border-color: var(--accent);"></div>
            <div id="guess-menu"></div>
            <div id="chat-window"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="Ваше повідомлення..." style="flex:1; margin:0; text-align: left;">
                <button class="btn btn-blue" onclick="sendMsg()" style="width:60px; margin:0;">➜</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button id="vote-btn-toggle" class="btn btn-red" style="flex:1;" onclick="toggleVoting()">ГОЛОСУВАТИ</button>
                <button id="spy-guess-toggle" class="btn btn-green" style="flex:1; display:none;" onclick="toggleGuessMenu()">ВГАДАТИ КАРТУ</button>
            </div>
            <div id="vote-ui" style="display:none; margin-top:10px; background:rgba(0,0,0,0.5); padding:15px; border-radius:16px;">
                <div id="vote-players-list"></div>
            </div>
        </div>
    </div>

    <div id="scr-cards" class="screen">
        <h2 style="color:var(--accent); margin-bottom: 20px;">Локації</h2>
        <div id="cards-list"></div>
    </div>

    <div id="scr-profile" class="screen">
        <div id="profile-content"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const db = firebase.database();
    
    const uID = (tg.initDataUnsafe?.user?.id || "user_" + Math.floor(Math.random()*9999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    let roomID = null, isHost = false, selectedSpy = null, hasVoted = false;
    const cards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма"];

    document.getElementById('cards-list').innerHTML = cards.map(c => `<div style="padding:18px; background:var(--card); margin-bottom:10px; border-radius:14px; border:1px solid #2d3748;">${c}</div>`).join('');

    function enableAdmin() { document.getElementById('admin-toggle').style.display = 'flex'; }
    function toggleAdminPanel() { 
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + tabId).classList.add('active-screen');
        el.classList.add('active');
    }

    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
        setupRoom();
    }

    async function joinLobby() {
        const val = document.getElementById('lobby-input').value;
        if(!val) return;
        roomID = val; isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('menu-area').style.display = 'none';
        document.getElementById('lobby-area').style.display = 'flex';
        document.getElementById('room-code-label').innerText = roomID;
        db.ref('rooms/' + roomID + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + roomID).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            
            // Список гравців
            const list = document.getElementById('player-list');
            const admList = document.getElementById('admin-players');
            list.innerHTML = ""; admList.innerHTML = "";
            let pCount = 0;

            Object.keys(data.players).forEach(id => {
                pCount++;
                list.innerHTML += `<div style="padding:15px; background:var(--card); margin-bottom:8px; border-radius:14px; border-left: 5px solid var(--blue);">👤 ${data.players[id].name}</div>`;
                admList.innerHTML += `<button class="btn-blue" style="padding:5px; font-size:10px; margin:2px;" onclick="selectedSpy='${id}';alert('Обрано')">${data.players[id].name}</button>`;
            });

            if(isHost) {
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('start-btn').disabled = pCount < 2;
            }

            if(data.status === 'started') renderGame(data);
            if(data.winner) handleEnd(data.winner, data.reason);
        });
    }

    function startGame() {
        const card = cards[Math.floor(Math.random()*cards.length)];
        db.ref('rooms/' + roomID + '/players').once('value', s => {
            let ids = Object.keys(s.val());
            let spy = selectedSpy || ids[Math.floor(Math.random()*ids.length)];
            db.ref('rooms/' + roomID).update({ status: 'started', spyID: spy, cardName: card });
        });
    }

    function renderGame(data) {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'flex';
        const isSpy = data.spyID === uID;

        document.getElementById('role-card').innerHTML = isSpy ? 
            `<h2 style="color:var(--red); font-size:24px;">ТИ ШПИГУН 🕵️</h2>` : 
            `<p style="font-size:12px; opacity:0.6;">ВАША КАРТА:</p><h2 style="color:var(--green); font-size:28px;">${data.cardName}</h2>`;

        if(isSpy) {
            document.getElementById('spy-guess-toggle').style.display = 'block';
            document.getElementById('guess-menu').innerHTML = cards.map(c => `<button class="btn btn-blue" style="padding:10px; font-size:10px;" onclick="makeGuess('${c}')">${c}</button>`).join('');
        }

        const vList = document.getElementById('vote-players-list');
        vList.innerHTML = "";
        Object.keys(data.players).forEach(id => {
            if(id !== uID) vList.innerHTML += `<button class="btn btn-blue" onclick="castVote('${id}')">${data.players[id].name}</button>`;
        });

        // Live Admin
        document.getElementById('admin-live').innerHTML = `Карта: ${data.cardName}<br>Шпигун: ${data.players[data.spyID].name}`;

        db.ref('rooms/' + roomID + '/chat').off();
        db.ref('rooms/' + roomID + '/chat').on('child_added', s => {
            const m = s.val();
            document.getElementById('chat-window').innerHTML += `<div><b>${m.u}:</b> ${m.msg}</div>`;
            document.getElementById('chat-window').scrollTop = 9999;
        });
    }

    function castVote(tid) {
        if(hasVoted) return; hasVoted = true;
        db.ref('rooms/' + roomID + '/votes/' + tid).transaction(c => (c||0)+1);
        document.getElementById('vote-ui').style.display = 'none';
        
        db.ref('rooms/' + roomID + '/players').once('value', s => {
            s.forEach(p => {
                if(p.key.startsWith('bot_')) {
                    let targets = Object.keys(s.val()).filter(id => id !== p.key);
                    let rand = targets[Math.floor(Math.random()*targets.length)];
                    db.ref('rooms/' + roomID + '/votes/' + rand).transaction(c => (c||0)+1);
                }
            });
            checkVotes();
        });
    }

    function checkVotes() {
        db.ref('rooms/' + roomID).once('value', s => {
            const d = s.val();
            let total = 0; Object.values(d.votes || {}).forEach(v => total += v);
            if(total >= Object.keys(d.players).length) {
                let max = 0, kicked = "";
                Object.keys(d.votes).forEach(id => { if(d.votes[id] > max) { max = d.votes[id]; kicked = id; } });
                if(kicked === d.spyID) db.ref('rooms/' + roomID).update({ winner: 'citizens', reason: 'Шпигуна вигнано!' });
                else db.ref('rooms/' + roomID).update({ winner: 'spy', reason: 'Вигнали невинного!' });
            }
        });
    }

    function makeGuess(c) {
        db.ref('rooms/' + roomID).once('value', s => {
            if(c === s.val().cardName) db.ref('rooms/' + roomID).update({ winner: 'spy', reason: 'Шпигун вгадав карту!' });
            else db.ref('rooms/' + roomID).update({ winner: 'citizens', reason: 'Шпигун помилився!' });
        });
    }

    function handleEnd(w, r) {
        const amSpy = document.getElementById('role-card').innerText.includes("ШПИГУН");
        const isWin = (w === 'spy' && amSpy) || (w === 'citizens' && !amSpy);
        
        const t = document.getElementById('status-toast');
        t.innerText = (isWin ? "ПЕРЕМОГА: " : "ПОРАЗКА: ") + r;
        t.style.background = isWin ? 'var(--green)' : 'var(--red)';
        t.classList.add('show');

        if(isWin) db.ref('users/' + uID + '/wins').transaction(c => (c||0)+1);
        setTimeout(() => location.reload(), 4000);
    }

    function toggleVoting() { const u = document.getElementById('vote-ui'); u.style.display = u.style.display === 'block' ? 'none' : 'block'; }
    function toggleGuessMenu() { const g = document.getElementById('guess-menu'); g.style.display = g.style.display === 'grid' ? 'none' : 'grid'; }
    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + roomID + '/chat').push({ u: uName, msg: i.value });
        i.value = "";
    }

    function addTestBot() {
        const bid = "bot_" + Math.floor(Math.random()*999);
        db.ref('rooms/' + roomID + '/players/' + bid).set({ name: "🤖 Бот " + bid });
    }

    // Профіль логіка
    db.ref('users/' + uID).update({ name: uName });
    db.ref('users/' + uID).on('value', snap => {
        const d = snap.val() || { wins: 0 };
        document.getElementById('profile-content').innerHTML = `
            <div class="card-box" style="margin-top: 20px; border-color: var(--accent);">
                <div style="font-size: 50px; margin-bottom: 10px;">🏆</div>
                <h2 style="font-size: 24px; margin-bottom: 5px;">${uName}</h2>
                <div style="font-size: 32px; font-weight: bold; color: var(--accent);">${d.wins || 0}</div>
                <p style="opacity: 0.6; font-size: 14px;">ПЕРЕМОГ У CLASH SPY</p>
            </div>
            <button class="btn btn-blue" onclick="window.location.reload()">ОНОВИТИ ДАНІ</button>
        `;
    });

</script>
</body>
</html>
