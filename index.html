<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; padding: 25px; }
        .active { display: flex; }
        
        /* Кнопки в стилі Clash */
        .btn { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 900; cursor: pointer; margin: 10px 0; font-size: 18px; color: white; transition: 0.1s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-blue { background: var(--blue); box-shadow: 0 5px 0 #1d4ed8; }
        .btn-green { background: var(--green); box-shadow: 0 5px 0 #047857; }
        .btn-red { background: var(--red); box-shadow: 0 5px 0 #b91c1c; }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }

        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 18px; margin-bottom: 10px; text-align: center; outline: none; }
        input:focus { border-color: var(--blue); }

        .stats-box { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #2d3748; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #player-list { flex-grow: 1; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; margin: 15px 0; overflow-y: auto; border: 1px dashed #333; }
        .player-row { padding: 12px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; font-weight: bold; }
        #chat-window { flex: 1; background: #05070a; border-radius: 15px; margin: 10px 0; overflow-y: auto; padding: 15px; border: 1px solid #1a2236; }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen active">
        <h1 style="text-align:center; color:var(--accent); font-size: 32px; margin-bottom: 10px;">CLASH SPY 🕵️</h1>
        <div class="stats-box" id="user-stats">
            <span style="opacity: 0.5;">Завантаження профілю...</span>
        </div>
        
        <button class="btn btn-green" onclick="createLobby()">СТВОРТИ КІМНАТУ</button>
        
        <div style="margin-top: 30px; border-top: 1px solid #2d3748; padding-top: 20px;">
            <input type="number" id="lobby-input" placeholder="КОД КІМНАТИ">
            <button class="btn btn-blue" onclick="joinLobby()">ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 style="text-align:center; margin:0; font-size: 14px; opacity: 0.7;">КОД КІМНАТИ:</h2>
        <h1 id="room-code-label" style="text-align:center; margin:0 0 20px 0; color:var(--accent); font-size: 40px;">----</h1>
        
        <div id="player-list"></div>
        
        <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">РОЗПОЧАТИ ГРУ</button>
        <button class="btn btn-red" onclick="location.reload()" style="background: none; box-shadow: none;">ВИЙТИ</button>
    </div>

    <div id="scr-game" class="screen">
        <div id="game-status" style="text-align:center; padding:15px; border-radius:12px; font-weight:bold; font-size: 18px; margin-bottom: 10px;"></div>
        <div id="chat-window"></div>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Твоє питання..." style="margin:0; text-align:left; flex:1;">
            <button class="btn btn-blue" style="width: 70px; margin:0; padding:0;" onclick="sendMsg()">➜</button>
        </div>
        
        <button id="finish-btn" class="btn btn-red" onclick="finishGameAction()" style="display:none; margin-top: 10px; font-size: 14px; padding: 10px;">ЗАВЕРШИТИ ГРУ (ХОСТ)</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ПЕРЕВІР ТУТ СВІЙ URL БАЗИ!
    const firebaseConfig = { databaseURL: "https://clashspy-multi-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const uID = tg.initDataUnsafe?.user?.id || "guest_" + Math.floor(Math.random()*9999);
    const uName = tg.initDataUnsafe?.user?.first_name || "Боєць";
    
    let roomID = null;
    let myKey = null;
    let isHost = false;

    // СИНХРОНІЗАЦІЯ ПРОФІЛЮ
    db.ref('users/' + uID).on('value', (snap) => {
        const data = snap.val() || { wins: 0 };
        document.getElementById('user-stats').innerHTML = `
            <div style="font-size: 18px;">${uName}</div>
            <div style="color:var(--accent); font-size: 24px; font-weight: 900;">🏆 ${data.wins}</div>
        `;
    });

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
        setupRoom();
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('finish-btn').style.display = 'block';
    }

    async function joinLobby() {
        const val = document.getElementById('lobby-input').value;
        if(!val) return;
        roomID = val;
        const snap = await db.ref('rooms/' + roomID).once('value');
        if(!snap.exists()) return alert("Кімнату не знайдено!");
        isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('room-code-label').innerText = roomID;
        nav('scr-lobby');

        const roomRef = db.ref('rooms/' + roomID);
        const pRef = roomRef.child('players').push({ name: uName, id: uID });
        myKey = pRef.key;
        pRef.onDisconnect().remove();

        if(isHost) roomRef.onDisconnect().remove();

        roomRef.child('players').on('value', (snap) => {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            let c = 0;
            snap.forEach(p => {
                c++;
                list.innerHTML += `<div class="player-row"><span>👤 ${p.val().name}</span> <span style="color:var(--green)">ГОТОВИЙ</span></div>`;
            });
            if(isHost) document.getElementById('start-btn').disabled = c < 3;
        });

        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(!data) {
                location.reload();
                return;
            }
            if(data.status === 'started') runGame(data);
        });

        roomRef.child('chat').on('child_added', (snap) => {
            const m = snap.val();
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div style="margin-bottom:8px;"><b>${m.user}:</b> ${m.msg}</div>`;
            win.scrollTop = win.scrollHeight;
        });
    }

    function startGame() {
        const cards = ["П.Е.К.К.А", "Мегалицар", "Всадник", "Спаркі", "Відьма", "Принцеса", "Дракончик", "Елітний варвар"];
        db.ref('rooms/' + roomID + '/players').once('value', (snap) => {
            let ps = [];
            snap.forEach(p => ps.push(p.val()));
            const spy = ps[Math.floor(Math.random()*ps.length)];
            db.ref('rooms/' + roomID).update({
                status: 'started',
                spyID: spy.id,
                card: cards[Math.floor(Math.random()*cards.length)]
            });
        });
    }

    function runGame(data) {
        nav('scr-game');
        const isSpy = data.spyID === uID;
        const st = document.getElementById('game-status');
        st.style.background = isSpy ? 'rgba(239, 68, 68, 0.2)' : 'rgba(16, 185, 129, 0.2)';
        st.style.border = isSpy ? '2px solid var(--red)' : '2px solid var(--green)';
        st.innerHTML = isSpy ? "<span style='color:var(--red)'>ТИ ШПИГУН 🕵️</span>" : `<span style='color:var(--green)'>ТВОЯ КАРТА: ${data.card} 🛡️</span>`;
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        db.ref('rooms/' + roomID + '/chat').push({ user: uName, msg: inp.value });
        inp.value = "";
    }

    async function finishGameAction() {
        const winnerName = prompt("ІМ'Я ПЕРЕМОЖЦЯ (для нарахування кубку):");
        if(!winnerName) return;

        const pSnap = await db.ref('rooms/' + roomID + '/players').once('value');
        let winnerID = null;
        pSnap.forEach(p => {
            if(p.val().name.toLowerCase() === winnerName.toLowerCase()) winnerID = p.val().id;
        });

        if(winnerID) {
            db.ref('users/' + winnerID + '/wins').transaction((c) => (c || 0) + 1);
            alert("КУБОК НАРАХОВАНО!");
        }

        setTimeout(() => { db.ref('rooms/' + roomID).remove(); }, 2000);
    }
</script>
</body>
</html>
