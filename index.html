<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy - Total Update</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #1a2236; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; 
                --rar-common: #b1b1b1; --rar-rare: #ff7e00; --rar-epic: #d300ff; --rar-leg: #00ecff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }

        /* Navigation Fix */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #161d2e; display: flex; border-top: 1px solid #2d3748; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; font-weight: bold; margin-top: 4px; }

        .screen { display: none; height: calc(100vh - 70px); width: 100%; flex-direction: column; overflow-y: auto; padding: 15px; }
        .active { display: flex; }

        /* Card Visual Design */
        .visual-card { width: 180px; height: 240px; margin: 20px auto; border-radius: 15px; position: relative; border: 4px solid #fff; overflow: hidden; background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .card-inner { height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; }
        .rarity-banner { position: absolute; top: 0; left: 0; width: 100%; height: 30px; opacity: 0.3; }
        .card-icon { font-size: 60px; margin: 20px 0; }
        
        /* Stats Table */
        .stats-table { width: 100%; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 15px; }
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 5px 0; font-size: 14px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn:disabled { background: #334155 !important; opacity: 0.6; }

        #role-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 15px 30px; border-radius: 15px; font-weight: bold; z-index: 3000; transition: 0.5s; width: 80%; text-align: center; }
        #toast.show { top: 20px; }

        #chat-win { flex: 1; background: #05070a; border-radius: 12px; border: 1px solid #1a2236; margin: 10px 0; overflow-y: auto; padding: 15px; }
        .vote-badge { background: var(--red); color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="role-overlay">
        <h2 style="color:#64748b">ВАША РОЛЬ</h2>
        <h1 id="role-title" style="font-size: 45px;">---</h1>
        <p id="role-hint" style="color:#94a3b8; padding: 0 30px;"></p>
        <button class="btn btn-blue" onclick="closeRole()" style="width:200px">ПОЧАТИ</button>
    </div>

    <div id="toast">Повідомлення</div>

    <div id="scr-main" class="screen active">
        <h1 style="text-align:center; color:var(--accent); margin-top:50px;">CLASH SPY</h1>
        <button class="btn btn-blue" style="background:var(--green)" onclick="toLobby(true)">СТВОРИТИ КІМНАТУ</button>
        <input type="text" id="join-input" placeholder="Код..." style="width:100%; padding:15px; border-radius:12px; border:1px solid #334155; background:var(--card); color:white; margin:10px 0; text-align:center;">
        <button class="btn btn-blue" onclick="toLobby(false)">УВІЙТИ</button>
    </div>

    <div id="scr-profile" class="screen">
        <h2>Профіль</h2>
        <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--accent);">
            <p>🏆 Перемог: <b id="win-count">0</b></p>
            <p>💀 Поразок: <b id="lose-count">0</b></p>
            <p>🎖️ Ранг: <b id="rank-text" style="color:var(--accent)">Новачок</b></p>
            <div style="height:10px; background:#000; border-radius:5px; margin:10px 0;"><div id="rank-bar" style="height:100%; width:0%; background:var(--green); transition:1s;"></div></div>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h3 style="text-align:center">КІМНАТА: <span id="lobby-id" style="color:var(--accent)">-</span></h3>
        <div id="player-list" style="background:var(--card); padding:15px; border-radius:15px;">
            <div>👤 Ви (Host)</div>
            <div style="color:#64748b">👤 Гравець 2 (Очікування)</div>
            <div style="color:#64748b">👤 Гравець 3 (Очікування)</div>
        </div>
        <button class="btn btn-blue" onclick="prepGame()" style="margin-top:20px">🔥 СТАРТ</button>
    </div>

    <div id="scr-game" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; background:var(--card); padding:10px; border-radius:10px;">
            <span id="game-timer" style="color:var(--red); font-weight:bold;">05:00</span>
            <span id="vote-count" style="font-size:12px; color:var(--accent)">Голосів: 0/3</span>
        </div>
        
        <div id="chat-win"></div>
        
        <div id="game-footer">
            <div id="turn-indicator" style="font-size:12px; margin-bottom:5px; color:var(--green)">Ваш хід (20с)</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-in" placeholder="Ваше питання..." style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--card); color:white;">
                <button class="btn btn-blue" id="send-btn" onclick="sendMsg()" style="width:60px; margin:0;">➜</button>
            </div>
            <button class="btn btn-red" id="vote-btn" onclick="castVote()" style="margin-top:10px;">🚫 ГОЛОСУВАТИ ЗА ШПИГУНА</button>
        </div>
    </div>

    <div id="scr-card" class="screen">
        <div id="card-area"></div>
    </div>

    <div id="scr-guess" class="screen">
        <h3 style="text-align:center">ЯКА ЦЕ КАРТА?</h3>
        <div id="guess-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <nav class="nav-bar" id="main-nav">
        <div class="nav-item active" onclick="nav('scr-main',this,'menu')">🏠<span>ДІМ</span></div>
        <div class="nav-item" onclick="nav('scr-profile',this,'menu')">👤<span>ПРОФІЛЬ</span></div>
    </nav>
    <nav class="nav-bar" id="game-nav" style="display:none;">
        <div class="nav-item active" onclick="nav('scr-game',this,'game')">💬<span>ЧАТ</span></div>
        <div class="nav-item" onclick="nav('scr-card',this,'game')">🃏<span>КАРТА</span></div>
    </nav>

    <script>
        const cardsData = [
            {n:"П.Е.К.К.А", r:"epic", i:"⚔️", hp:3450, dmg:678},
            {n:"Мегалицар", r:"leg", i:"🛡️", hp:3300, dmg:222},
            {n:"Спаркі", r:"leg", i:"⚡", hp:1200, dmg:1100},
            {n:"Вершник", r:"rare", i:"🐷", hp:1400, dmg:318},
            {n:"Відьма", r:"epic", i:"🧙‍♀️", hp:696, dmg:111},
            {n:"Кат", r:"epic", i:"🪓", hp:1010, dmg:140},
            {n:"Гігант", r:"rare", i:"💪", hp:3200, dmg:210},
            {n:"Малий дракон", r:"epic", i:"🐲", hp:1000, dmg:133},
            {n:"Принцеса", r:"leg", i:"🏹", hp:216, dmg:140},
            {n:"Скелет", r:"common", i:"💀", hp:67, dmg:67},
            {n:"Варвари", r:"common", i:"🧔", hp:555, dmg:159},
            {n:"Мушкетер", r:"rare", i:"🔫", hp:598, dmg:181}
            // ... можна додати ще 80+ за цим шаблоном
        ];

        let stats = JSON.parse(localStorage.getItem('spyStats')) || {w:0, l:0};
        let isSpy = false, currentCard = null, votes = 0, hasVoted = false, gameTimer = 300;

        function updateProfile() {
            document.getElementById('win-count').innerText = stats.w;
            document.getElementById('lose-count').innerText = stats.l;
            let rIdx = Math.min(Math.floor(stats.w/5), 10);
            const ranks = ["Новачок", "Рекрут", "Воїн", "Лицар", "Мастер", "Еліта", "Чемпіон", "Король", "Легенда", "УЛЬТРА"];
            document.getElementById('rank-text').innerText = ranks[rIdx];
            document.getElementById('rank-bar').style.width = (stats.w % 5 * 20) + "%";
        }

        function nav(id, el, type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const navId = type === 'menu' ? 'main-nav' : 'game-nav';
            document.querySelectorAll(`#${navId} .nav-item`).forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function toLobby(isNew) {
            document.getElementById('main-nav').style.display = 'none';
            document.getElementById('lobby-id').innerText = isNew ? "AX-7" : document.getElementById('join-input').value;
            nav('scr-lobby');
        }

        function prepGame() {
            // ПЕРЕВІРКА РАНДОМНОСТІ ШПИГУНА
            isSpy = Math.random() < 0.33; 
            currentCard = cardsData[Math.floor(Math.random() * cardsData.length)];
            
            const overlay = document.getElementById('role-overlay');
            overlay.style.display = 'flex';
            document.getElementById('role-title').innerText = isSpy ? "ШПИГУН 🕵️" : "ГРАВЕЦЬ 🛡️";
            document.getElementById('role-title').style.color = isSpy ? "var(--red)" : "var(--green)";
            document.getElementById('role-hint').innerText = isSpy ? "Дізнайся назву карти, поки гравці тебе не викрили." : "Обговорюйте вашу карту та знайдіть того, хто бреше.";
        }

        function closeRole() {
            document.getElementById('role-overlay').style.display = 'none';
            document.getElementById('game-nav').style.display = 'flex';
            setupGameUI();
            nav('scr-game', document.querySelector('#game-nav .nav-item'), 'game');
            startTimers();
        }

        function setupGameUI() {
            const area = document.getElementById('card-area');
            if(isSpy) {
                area.innerHTML = `<div style="text-align:center; margin-top:50px;"><h2>ВИ НЕ ЗНАЄТЕ КАРТУ</h2><p>Слухайте інших та вгадайте!</p></div>`;
                document.getElementById('guess-list').innerHTML = cardsData.map(c => 
                    `<button class="btn btn-blue" onclick="finishGame(${c.n === currentCard.n})">${c.n}</button>`).join('');
                document.getElementById('vote-btn').innerText = "🎯 ВГАДАТИ КАРТУ (ШПИГУН)";
                document.getElementById('vote-btn').onclick = () => nav('scr-guess');
            } else {
                const colors = { common: 'var(--rar-common)', rare: 'var(--rar-rare)', epic: 'var(--rar-epic)', leg: 'var(--rar-leg)' };
                area.innerHTML = `
                    <div class="visual-card" style="border-color: ${colors[currentCard.r]}">
                        <div class="rarity-banner" style="background: ${colors[currentCard.r]}"></div>
                        <div class="card-inner">
                            <div class="card-icon">${currentCard.i}</div>
                            <h2 style="margin:0">${currentCard.n}</h2>
                            <small style="text-transform:uppercase">${currentCard.r}</small>
                        </div>
                    </div>
                    <div class="stats-table">
                        <div class="stat-line"><span>❤️ Здоров'я</span><b>${currentCard.hp}</b></div>
                        <div class="stat-line"><span>⚔️ Урон</span><b>${currentCard.dmg}</b></div>
                    </div>`;
            }
        }

        function startTimers() {
            const tDisplay = document.getElementById('game-timer');
            const int = setInterval(() => {
                gameTimer--;
                let m = Math.floor(gameTimer/60), s = gameTimer%60;
                tDisplay.innerText = `${m}:${s<10?'0'+s:s}`;
                if(gameTimer <= 0) { clearInterval(int); finishGame(false, "ЧАС ВИЙШОВ! Голосування..."); }
            }, 1000);
        }

        function castVote() {
            if(hasVoted) return;
            votes++;
            hasVoted = true;
            document.getElementById('vote-btn').disabled = true;
            document.getElementById('vote-count').innerText = `Голосів: ${votes}/3`;
            showToast("Ви проголосували. Очікування інших...");
            
            // Симуляція: через 3 сек інші теж голосують
            setTimeout(() => {
                if(votes < 3) {
                    votes = 3; 
                    document.getElementById('vote-count').innerText = `Голосів: 3/3`;
                    finishGame(!isSpy, "Голосування завершено!");
                }
            }, 5000);
        }

        function sendMsg() {
            const inpt = document.getElementById('chat-in');
            if(!inpt.value) return;
            document.getElementById('chat-win').innerHTML += `<div style="margin-bottom:10px;"><b>Ви:</b> ${inpt.value}</div>`;
            inpt.value = "";
            document.getElementById('chat-win').scrollTop = 9999;
        }

        function finishGame(win, msg) {
            if(win) stats.w++; else stats.l++;
            localStorage.setItem('spyStats', JSON.stringify(stats));
            const t = document.getElementById('toast');
            t.innerText = win ? "🎉 ПЕРЕМОГА!" : "❌ ПРОГРАШ!";
            t.classList.add('show');
            setTimeout(() => location.reload(), 4000);
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        updateProfile();
    </script>
</body>
</html>
