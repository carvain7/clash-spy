<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v14</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0b101b; --panel: #1c2538; --accent: #fbbf24; 
            --blue-grad: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
            --red-grad: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
            --green-grad: linear-gradient(180deg, #34d399 0%, #059669 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Arial Black', sans-serif; }
        body { background: var(--bg); color: #f8fafc; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #161f32; height: 70px; border-top: 2px solid #2d3748; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; }
        .tab.active { color: var(--accent); }
        .tab span { font-size: 22px; }

        body.is-playing .tab-bar, body.is-playing #scr-store, body.is-playing #scr-prof { display: none !important; }

        .screen { display: none; flex: 1; padding: 15px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 900; color: white; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-blue { background: var(--blue-grad); border-bottom: 4px solid #1e40af; }
        .btn-red { background: var(--red-grad); border-bottom: 4px solid #991b1b; }
        .btn-green { background: var(--green-grad); border-bottom: 4px solid #065f46; }
        .btn:disabled { opacity: 0.4; pointer-events: none; }

        .widget { background: var(--panel); border-radius: 18px; padding: 15px; margin-bottom: 10px; border: 1px solid #334155; position: relative; }
        .rank-badge { font-size: 9px; background: rgba(251, 191, 36, 0.2); color: var(--accent); padding: 2px 6px; border-radius: 5px; border: 1px solid var(--accent); }

        #turn-queue { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; min-height: 60px; }
        .q-user { min-width: 90px; padding: 10px; background: #2d3748; border-radius: 12px; text-align: center; font-size: 10px; border: 2px solid transparent; transition: 0.3s; }
        .q-user.active { border-color: var(--accent); background: rgba(251, 191, 36, 0.1); transform: scale(1.05); }

        #chat-stream { flex: 1; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; margin-bottom: 10px; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid #2d3748; }
        .msg { margin-bottom: 8px; padding: 10px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.3; }
        .msg.mine { align-self: flex-end; background: #2563eb; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }

        #adm-btn { position: fixed; top: 15px; right: 15px; width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 20px; color: #000; }
        #adm-panel { position: fixed; top: 65px; right: 15px; width: 250px; background: #1e293b; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; display: none; z-index: 1001; }

        #toast { position: fixed; top: -300px; left: 20px; right: 20px; padding: 30px; border-radius: 20px; text-align: center; z-index: 10000; transition: 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49); font-weight: 900; font-size: 22px; color: white; border-bottom: 6px solid rgba(0,0,0,0.3); }
        #toast.active { top: 30px; }
    </style>
</head>
<body id="main-body">

<div id="toast"></div>

<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>ADMIN CORE</b><span onclick="toggleAdm()">✕</span></div>
    <div id="adm-info" style="font-size:11px; color:#94a3b8; margin-bottom:10px;"></div>
    <button class="btn btn-blue" style="padding:8px; font-size:10px;" onclick="addBot()">+ БОТ 🤖</button>
    <button class="btn btn-red" style="padding:8px; font-size:10px;" onclick="resetToLobby()">RESET ROOM</button>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('game', this)"><span>⚔️</span>ГРА</div>
    <div class="tab" onclick="switchTab('store', this)"><span>💎</span>КРАМНИЦЯ</div>
    <div class="tab" onclick="switchTab('prof', this)"><span>👤</span>ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu">
        <h1 onclick="devMode()" style="text-align:center; color:var(--accent); margin: 40px 0; font-size: 45px; text-shadow: 0 4px #92400e;">CLASH SPY</h1>
        <button class="btn btn-blue" style="background:var(--accent); color:black;" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
        <input type="number" id="room-input" placeholder="Код кімнати" style="width:100%; padding:15px; border-radius:12px; margin-bottom:10px; text-align:center; border:none; background:#1e293b; color:white;">
        <button class="btn btn-blue" onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
    </div>

    <div id="view-lobby" style="display:none;">
        <div class="widget" style="text-align:center;">ID: <b id="room-id-txt" style="color:var(--accent);">----</b></div>
        <div id="lobby-players"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none;" onclick="startGame()">ПОЧАТИ ГРУ</button>
        <button class="btn btn-red" onclick="exitRoom()">ВИЙТИ</button>
    </div>

    <div id="view-play" style="display:none; flex-direction:column; height:100%;">
        <div id="role-ui" class="widget" style="text-align:center;"></div>
        <div id="turn-queue"></div>
        <div id="chat-stream"></div>
        <div id="play-controls">
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="Твій хід..." style="flex:1; padding:12px; border-radius:12px; border:none; background:#1e293b; color:white;">
                <button id="send-btn" class="btn btn-blue" style="width:60px; margin:0;" onclick="sendMsg()">➜</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button id="vote-btn-ui" class="btn btn-red" style="flex:1;" onclick="toggleV()">ГОЛОСУВАТИ</button>
                <button id="guess-btn" class="btn btn-green" style="flex:1; display:none;" onclick="toggleG()">ВГАДАТИ</button>
            </div>
        </div>
        <button class="btn btn-red" style="font-size:10px; padding:8px; opacity:0.5; margin-top:5px;" onclick="exitRoom()">ЕКСТРЕНИЙ ВИХІД</button>
        
        <div id="v-list" style="display:none; margin-top:10px;"></div>
        <div id="g-list" style="display:none; flex-direction:column; margin-top:10px;">
            <div id="g-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:180px; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<div id="scr-store" class="screen"><div id="store-ui"></div></div>
<div id="scr-prof" class="screen"><div id="prof-ui"></div></div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "u"+Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Рицар", "Гігант", "Кулька", "Мушкетер", "Кат", "Торнадо", "Арбалет", "Нічна відьма"];
    let room = null, isHost = false, myVoted = false, dClicks = 0, myWins = 0, myCoins = 0, hasRewardClaimed = false;

    function getRank(w) { 
        if(w >= 201) return "👑 Король";
        if(w >= 101) return "🔥 Еліта";
        if(w >= 51) return "⚔️ Майстер";
        if(w >= 21) return "🛡️ Лицар";
        return "🌱 Новачок";
    }

    function devMode() { dClicks++; if(dClicks>=5) { document.getElementById('adm-btn').style.display='flex'; dClicks=0; } }
    function toggleAdm() { const p = document.getElementById('adm-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function switchTab(id, el) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active-screen');
        el.classList.add('active');
    }

    async function createRoom() { room = Math.floor(1000+Math.random()*8999).toString(); isHost=true; await db.ref('rooms/'+room).set({host:uID, status:'lobby'}); initRoom(); }
    function joinRoom() { room = document.getElementById('room-input').value; if(room.length<4) return; initRoom(); }
    function exitRoom() { if(room) db.ref('rooms/'+room+'/players/'+uID).remove(); location.reload(); }

    function initRoom() {
        document.getElementById('view-menu').style.display='none';
        document.getElementById('view-lobby').style.display='block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/'+room+'/players/'+uID).set({name:uName, wins:myWins, rank:getRank(myWins)});

        db.ref('rooms/'+room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const players = d.players || {};
            const ids = Object.keys(players);
            
            document.getElementById('lobby-players').innerHTML = ids.map(id => `
                <div class="widget">
                    <span class="rank-badge" style="float:right;">${players[id].rank || '🌱'}</span>
                    ${players[id].name}
                </div>
            `).join('');
            
            if(isHost) { document.getElementById('adm-info').innerHTML = `Spy: ${players[d.spyID]?.name || '?'}<br>Card: ${d.cardName || '?'}`; }

            if(d.status==='started') {
                document.body.classList.add('is-playing');
                document.getElementById('view-lobby').style.display='none';
                document.getElementById('view-play').style.display='flex';
                renderGame(d);
            } else {
                document.body.classList.remove('is-playing');
                hasRewardClaimed = false; // Скидаємо для нової гри
            }
            if(isHost) { const b=document.getElementById('start-btn'); b.style.display='block'; b.disabled=ids.length<3; }
            if(d.winner) handleEnd(d);
        });

        db.ref('rooms/'+room+'/chat').on('value', s => {
            const st = document.getElementById('chat-stream'); st.innerHTML = "";
            s.forEach(m => { st.innerHTML += `<div class="msg ${m.val().uid===uID?'mine':'other'}"><b>${m.val().u}</b>: ${m.val().m}</div>`; });
            st.scrollTop = st.scrollHeight;
        });
    }

    function startGame() {
        db.ref('rooms/'+room+'/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/'+room).update({status:'started', spyID:ids[Math.floor(Math.random()*ids.length)], cardName:allCards[Math.floor(Math.random()*allCards.length)], turnIdx:0, order:ids, votes:null, winner:null});
        });
    }

    function renderGame(d) {
        const isSpy = d.spyID === uID;
        document.getElementById('role-ui').innerHTML = isSpy ? `<h2 style="color:#ef4444; margin:0;">🕵️ ТИ ШПИГУН</h2>` : `<small style="opacity:0.6;">ВАША КАРТА:</small><h2 style="color:var(--accent); margin:0;">${d.cardName}</h2>`;
        document.getElementById('guess-btn').style.display = isSpy ? 'block' : 'none';
        
        document.getElementById('turn-queue').innerHTML = d.order.map((id, i) => `
            <div class="q-user ${i === d.turnIdx ? 'active' : ''}">${d.players[id]?.name.split(' ')[0]}</div>
        `).join('');

        const isTurn = d.order[d.turnIdx] === uID && !d.winner;
        document.getElementById('chat-input').disabled = !isTurn;
        document.getElementById('send-btn').disabled = !isTurn;

        const vts = d.votes || {};
        document.getElementById('v-list').innerHTML = d.order.filter(id => id !== uID).map(id => `
            <button class="btn btn-blue" onclick="vote('${id}')" ${(myVoted || d.winner)?'disabled':''}>${d.players[id].name} (${vts[id]||0})</button>
        `).join('');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(d.order[d.turnIdx] !== uID) return;
            db.ref('rooms/'+room+'/chat').push({u:uName, uid:uID, m:inp.value});
            db.ref('rooms/'+room).update({turnIdx: (d.turnIdx + 1) % d.order.length});
            inp.value = "";
        });
    }

    function toggleV() { document.getElementById('g-list').style.display='none'; const x=document.getElementById('v-list'); x.style.display=x.style.display==='block'?'none':'block'; }
    function toggleG() { 
        document.getElementById('v-list').style.display='none'; 
        const x=document.getElementById('g-list'); x.style.display=x.style.display==='flex'?'none':'flex'; 
        document.getElementById('g-grid').innerHTML = allCards.map(c => `<button class="btn btn-blue" style="font-size:10px; padding:10px;" onclick="guess('${c}')">${c}</button>`).join('');
    }

    function vote(tid) {
        if(myVoted) return; myVoted = true;
        db.ref('rooms/'+room+'/votes/'+tid).transaction(v => (v||0)+1);
        db.ref('rooms/'+room+'/votes/vdone_'+uID).set(true);
        checkVotes();
    }

    function checkVotes() {
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(!d || d.winner) return;
            const totalVotes = Object.keys(d.votes || {}).filter(k => k.startsWith('vdone_')).length;
            if(totalVotes >= d.order.length) {
                let max = -1, target = "";
                d.order.forEach(id => { if((d.votes[id]||0) > max) { max = d.votes[id]; target = id; } });
                db.ref('rooms/'+room).update(target === d.spyID ? {winner:'civ', reason:'ШПИГУНА ВИКРИТО!'} : {winner:'spy', reason:'ВИГНАЛИ МИРНОГО!'});
            }
        });
    }

    function guess(c) {
        db.ref('rooms/'+room).once('value', s => {
            if(s.val().winner) return;
            const win = (c === s.val().cardName);
            db.ref('rooms/'+room).update(win ? {winner:'spy', reason:'ШПИГУН ВГАДАВ КАРТУ!'} : {winner:'civ', reason:'ШПИГУН ПОМИЛИВСЯ!'});
        });
    }

    function handleEnd(d) {
        if(hasRewardClaimed) return;
        
        const toast = document.getElementById('toast');
        toast.innerText = d.reason;
        toast.style.background = d.winner === 'spy' ? 'var(--red-grad)' : 'var(--green-grad)';
        toast.classList.add('active');

        // Логіка перемоги
        const isSpy = d.spyID === uID;
        const iWon = (d.winner === 'spy' && isSpy) || (d.winner === 'civ' && !isSpy);
        
        if(iWon) {
            db.ref('users_v3/'+uID).transaction(u => {
                if(u) { u.wins = (u.wins || 0) + 1; u.coins = (u.coins || 0) + 100; }
                return u;
            });
        }
        hasRewardClaimed = true;

        setTimeout(() => {
            toast.classList.remove('active');
            myVoted = false;
            document.getElementById('v-list').style.display='none';
            document.getElementById('g-list').style.display='none';
            if(isHost) {
                db.ref('rooms/'+room).update({
                    status: 'lobby', 
                    winner: null, 
                    votes: null, 
                    chat: null
                });
            }
        }, 5000);
    }

    function addBot() { 
        if(!room) return; 
        const bID = "bot_" + Math.floor(Math.random()*999);
        db.ref('rooms/'+room+'/players/'+bID).set({name: "БОТ_"+bID, wins: 45, rank: getRank(45), isBot: true});
    }
    
    function resetToLobby() { if(room) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null, chat:null}); }

    window.onload = () => {
        db.ref('users_v3/'+uID).on('value', s => {
            const d = s.val() || {wins:0, coins:0};
            myWins = d.wins; myCoins = d.coins;
            document.getElementById('prof-ui').innerHTML = `<div class="widget" style="text-align:center; padding:40px 10px;"><h2>${uName}</h2><span class="rank-badge" style="display:inline-block; margin-bottom:10px;">${getRank(myWins)}</span><h1 style="color:var(--accent); font-size:65px; margin:0;">${myWins}</h1><small>ПЕРЕМОГ</small><br><br>💰 ${myCoins} МОНЕТ</div>`;
            document.getElementById('store-ui').innerHTML = `<div class="widget" style="text-align:center;"><h2>МАГАЗИН</h2><p>Баланс: 💰 ${myCoins}</p><div class="widget">Золотий нік - 1500 💰</div></div>`;
        });
    };
</script>
</body>
</html>
