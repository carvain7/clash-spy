<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #1a2236; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; padding: 20px; }
        .active { display: flex; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn:disabled { background: #334155; opacity: 0.5; cursor: not-allowed; }
        #player-list { background: var(--card); padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #334155; }
        .player-item { padding: 10px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; }
        #chat-win { flex: 1; background: #05070a; border-radius: 12px; margin: 10px 0; overflow-y: auto; padding: 15px; }
        #role-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="role-overlay">
        <h1 id="role-title">---</h1>
        <p id="role-hint" style="text-align:center; padding: 0 30px;"></p>
        <button id="ready-btn" class="btn btn-green" style="width:200px" onclick="setReady()">ГОТОВИЙ(А)</button>
        <div id="ready-stat" style="margin-top:20px; color:var(--accent)">Чекаємо інших...</div>
    </div>

    <div id="scr-main" class="screen active">
        <h1 style="text-align:center; color:var(--accent)">CLASH SPY 🕵️</h1>
        <div style="margin-top:50px;">
            <button class="btn btn-green" onclick="setupRoom(true)">СТВОРТИ КІМНАТУ</button>
            <input type="text" id="join-code" placeholder="Код кімнати (напр. 1234)" style="width:100%; padding:15px; margin:10px 0; border-radius:12px; text-align:center;">
            <button class="btn btn-blue" onclick="setupRoom(false)">ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 style="text-align:center">ЛОБІ: <span id="display-code" style="color:var(--accent)">-</span></h2>
        <div id="player-list">
            </div>
        <p id="min-players-msg" style="color:var(--red); text-align:center; font-size:12px;">Потрібно мінімум 3 гравці!</p>
        <button id="start-btn" class="btn btn-blue" onclick="startGame()" disabled>РОЗПОЧАТИ ГРУ</button>
        <button class="btn" onclick="location.reload()">ВИЙТИ</button>
    </div>

    <div id="scr-game" class="screen">
        <div style="display:flex; justify-content:space-between;">
            <span id="timer" style="color:var(--red)">05:00</span>
            <span id="my-name-display" style="color:var(--accent)"></span>
        </div>
        <div id="chat-win"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="msg-in" style="flex:1; padding:10px; border-radius:8px;">
            <button class="btn btn-blue" style="width:60px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <div id="card-info" style="margin-top:10px; padding:10px; background:var(--card); border-radius:8px; display:none;"></div>
    </div>

<script>
    // КОНФІГУРАЦІЯ БАЗИ ДАНИХ (Тимчасова для тесту)
    const firebaseConfig = { databaseURL: "https://clashspy-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem('spyName') || prompt("Ваше ім'я:") || "Гість";
    localStorage.setItem('spyName', myName);
    
    let roomID = null;
    let isHost = false;
    let players = {};
    const cards = ["П.Е.К.К.А", "Мегалицар", "Вершник", "Спаркі", "Відьма", "Кат"];

    function setupRoom(host) {
        isHost = host;
        roomID = host ? Math.floor(1000 + Math.random() * 8999).toString() : document.getElementById('join-code').value;
        
        if(!roomID) return alert("Введіть код!");

        // Реєстрація в базі
        db.ref('rooms/' + roomID + '/players/' + myName).set({ name: myName, ready: false });
        
        // Слухаємо оновлення списку гравців
        db.ref('rooms/' + roomID + '/players').on('value', (snap) => {
            players = snap.val() || {};
            updateLobbyUI();
        });

        // Слухаємо команду на старт від хоста
        db.ref('rooms/' + roomID + '/gameStatus').on('value', (snap) => {
            if(snap.val() === 'started') showRole();
        });

        document.getElementById('display-code').innerText = roomID;
        nav('scr-lobby');
    }

    function updateLobbyUI() {
        const list = document.getElementById('player-list');
        list.innerHTML = "";
        let count = 0;
        
        for(let p in players) {
            count++;
            list.innerHTML += `<div class="player-item"><span>👤 ${players[p].name}</span> <span>${count === 1 ? '👑' : '✅'}</span></div>`;
        }

        const startBtn = document.getElementById('start-btn');
        const msg = document.getElementById('min-players-msg');

        if(isHost) {
            startBtn.style.display = "block";
            if(count >= 3) {
                startBtn.disabled = false;
                msg.style.display = "none";
            } else {
                startBtn.disabled = true;
                msg.style.display = "block";
            }
        } else {
            startBtn.style.display = "none";
            msg.innerText = "Чекаємо, поки хост запустить...";
        }
    }

    function startGame() {
        if(!isHost) return;
        const spy = Object.keys(players)[Math.floor(Math.random() * Object.keys(players).length)];
        const card = cards[Math.floor(Math.random() * cards.length)];
        
        db.ref('rooms/' + roomID).update({
            gameStatus: 'started',
            spyName: spy,
            currentCard: card
        });
    }

    function showRole() {
        db.ref('rooms/' + roomID).once('value', (snap) => {
            const data = snap.val();
            const amISpy = data.spyName === myName;
            
            document.getElementById('role-overlay').style.display = 'flex';
            document.getElementById('role-title').innerText = amISpy ? "ТИ ШПИГУН 🕵️" : "ТИ ГРАВЕЦЬ 🛡️";
            document.getElementById('role-title').style.color = amISpy ? "var(--red)" : "var(--green)";
            document.getElementById('role-hint').innerText = amISpy ? "Вгадай карту!" : "Карта: " + data.currentCard;
            
            if(!amISpy) {
                const info = document.getElementById('card-info');
                info.style.display = "block";
                info.innerHTML = `<b>Твоя карта:</b> ${data.currentCard}`;
            }
        });
    }

    function setReady() {
        document.getElementById('role-overlay').style.display = 'none';
        nav('scr-game');
        document.getElementById('my-name-display').innerText = myName;
        // Тут можна додати таймер
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function sendMsg() {
        const val = document.getElementById('msg-in').value;
        if(!val) return;
        document.getElementById('chat-win').innerHTML += `<div><b>${myName}:</b> ${val}</div>`;
        document.getElementById('msg-in').value = "";
    }
</script>
</body>
</html>
