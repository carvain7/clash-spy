<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a2236; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { color: #64748b; font-size: 12px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: flex; }

        /* UI Elements */
        .container { padding: 20px; text-align: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin: 10px 0; border-bottom: 4px solid #1d4ed8; }
        .btn:disabled { background: #475569; border-bottom: none; opacity: 0.7; }

        /* Queue UI */
        .queue-status { background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; border-left: 4px solid var(--accent); text-align: left; }
        .turn-now { color: #4ade80; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Card View */
        .big-card { background: linear-gradient(135deg, #334155 0%, #1e293b 100%); border: 3px solid var(--accent); border-radius: 20px; padding: 25px; margin: 20px 0; position: relative; overflow: hidden; }
        .card-rarity { position: absolute; top: 10px; right: 10px; font-size: 10px; background: var(--accent); color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left; }

        /* Chat */
        #chat-window { background: #020617; height: 180px; border-radius: 10px; overflow-y: auto; padding: 10px; margin-bottom: 10px; text-align: left; border: 1px solid #1e40af; }
        .msg { margin-bottom: 8px; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="scr-main" class="screen active">
        <div class="container">
            <h1 style="color: var(--accent); font-size: 32px;">CLASH SPY</h1>
            <div class="big-card" style="padding: 15px; border: 1px solid #334155;">
                <p>Створіть кімнату або введіть код друга</p>
                <button class="btn" onclick="openLobby(true)" style="background:#10b981; border-color:#059669">✨ НОВА ГРА</button>
                <input type="text" id="join-code" placeholder="Код..." style="width:80%; padding:12px; border-radius:8px; border:none; margin:10px 0; text-align:center;">
                <button class="btn" onclick="openLobby(false)" style="background:var(--accent); border-color:#b45309">🔑 УВІЙТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="container">
            <h2>КІМНАТА: <span id="room-id" style="color:var(--accent)">-----</span></h2>
            <div id="lobby-list" style="background:var(--card); padding:15px; border-radius:15px; text-align:left;">
                <div style="margin-bottom:10px">👤 Ви (Організатор) ✅</div>
                <div style="color:#64748b">👤 Очікування гравців...</div>
            </div>
            <button class="btn" onclick="startBattle()">🚀 ПОЧАТИ БИТВУ</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="container">
            <div class="queue-status">
                🕒 Таймер: <span id="timer" style="color:#ef4444">02:00</span><br>
                🎤 Зараз пише: <span id="current-turn" class="turn-now">Ви</span>
            </div>
            
            <div id="chat-window"></div>
            
            <div id="spy-controls" style="display:none">
                <input type="text" id="spy-search" placeholder="Вгадати карту..." onkeyup="filterCards()" style="width:85%; padding:10px; border-radius:5px; margin-bottom:10px;">
                <div id="card-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; max-height:100px; overflow-y:auto;"></div>
            </div>

            <div id="chat-input-area" style="display:flex; gap:5px;">
                <input type="text" id="chat-msg" placeholder="Ваше запитання..." style="flex:1; padding:12px; border-radius:8px; border:none;">
                <button class="btn" id="send-btn" onclick="sendMsg()" style="width:60px; margin:0;">➜</button>
            </div>
        </div>
    </div>

    <div id="scr-card" class="screen">
        <div class="container">
            <div id="card-content">
                <h2 id="card-title">Карта не призначена</h2>
                <div class="big-card" id="card-stats-view">
                    </div>
            </div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="container">
            <h1>ПРОФІЛЬ</h1>
            <div class="big-card">
                <p>🏆 Перемог: 12</p>
                <p>🕵️ Викрито шпигунів: 5</p>
                <p>💎 Рівень: Золото</p>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('scr-main', this)">🏠</div>
        <div class="nav-item" onclick="nav('scr-game', this)" id="nav-game" style="display:none">⚔️</div>
        <div class="nav-item" onclick="nav('scr-card', this)" id="nav-card" style="display:none">🃏</div>
        <div class="nav-item" onclick="nav('scr-profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const cardsDB = [
            {n: "П.Е.К.К.А", hp: 3450, dmg: 678, spd: "Повільна", rar: "Епічна"},
            {n: "Мегалицар", hp: 3300, dmg: 222, spd: "Середня", rar: "Легендарна"},
            {n: "Спаркі", hp: 1200, dmg: 1100, spd: "Повільна", rar: "Легендарна"},
            {n: "Всадник на кабані", hp: 1400, dmg: 318, spd: "Дуже швидка", rar: "Рідкісна"}
        ];

        let isSpy = false;
        let myTurn = true;
        let myCard = null;

        function nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
        }

        function openLobby(isNew) {
            const code = isNew ? Math.random().toString(36).substring(2, 7).toUpperCase() : document.getElementById('join-code').value;
            if(!isNew && code.length < 3) return;
            document.getElementById('room-id').innerText = code;
            nav('scr-lobby');
        }

        function startBattle() {
            isSpy = Math.random() < 0.3;
            myCard = cardsDB[Math.floor(Math.random()*cardsDB.length)];
            
            document.getElementById('nav-game').style.display = 'block';
            document.getElementById('nav-card').style.display = 'block';
            
            setupGameUI();
            nav('scr-game', document.getElementById('nav-game'));
            startTimer();
        }

        function setupGameUI() {
            const cardView = document.getElementById('card-stats-view');
            if(isSpy) {
                document.getElementById('card-title').innerText = "ВИ — ШПИГУН 🕵️";
                cardView.innerHTML = "<p>Ваша мета: дізнатися карту гравців та вгадати її у вкладці ⚔️</p>";
                document.getElementById('spy-controls').style.display = 'block';
                renderSpyCards();
            } else {
                document.getElementById('card-title').innerText = myCard.n;
                cardView.innerHTML = `
                    <div class="card-rarity">${myCard.rar}</div>
                    <div class="stat-grid">
                        <div>❤️ HP: <b>${myCard.hp}</b></div>
                        <div>⚔️ DMG: <b>${myCard.dmg}</b></div>
                        <div>⚡ Швидкість: <b>${myCard.spd}</b></div>
                        <div>💎 Рідкість: <b>${myCard.rar}</b></div>
                    </div>
                `;
            }
        }

        function sendMsg() {
            if(!myTurn) return;
            const inp = document.getElementById('chat-msg');
            if(!inp.value) return;
            
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg"><b>Ви:</b> ${inp.value}</div>`;
            win.scrollTop = win.scrollHeight;
            inp.value = "";

            // Передача черги (імітація)
            myTurn = false;
            document.getElementById('current-turn').innerText = "Player_42";
            document.getElementById('current-turn').style.color = "#64748b";
            document.getElementById('send-btn').disabled = true;

            setTimeout(() => {
                myTurn = true;
                document.getElementById('current-turn').innerText = "Ви";
                document.getElementById('current-turn').style.color = "#4ade80";
                document.getElementById('send-btn').disabled = false;
            }, 5000);
        }

        function renderSpyCards() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = cardsDB.map(c => `<div onclick="guess('${c.n}')" style="background:white; color:black; padding:8px; border-radius:5px; font-size:12px;">${c.n}</div>`).join('');
        }

        function startTimer() {
            let t = 120;
            const el = document.getElementById('timer');
            const itv = setInterval(() => {
                let m = Math.floor(t/60), s = t%60;
                el.innerText = `${m}:${s<10?'0'+s:s}`;
                if(t <= 0) clearInterval(itv);
                t--;
            }, 1000);
        }

        function guess(n) {
            tg.showConfirm(`Вгадати ${n}?`, (ok) => {
                if(ok) tg.showAlert(n === myCard.n ? "ПЕРЕМОГА! Ви вгадали." : "ПРОГРАШ! Це не та карта.");
            });
        }
    </script>
</body>
</html>
