<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy P2P Edition</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #1a2236; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; height: calc(100vh - 70px); width: 100%; flex-direction: column; padding: 20px; overflow-y: auto; }
        .active { display: flex; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; font-size: 16px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #161d2e; display: flex; border-top: 1px solid #2d3748; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        #player-list { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 10px; }
        #chat-box { flex: 1; background: #05070a; border-radius: 12px; padding: 10px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #1a2236; }
        #role-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .card-visual { width: 180px; height: 240px; background: linear-gradient(135deg, #2c3e50, #000); border: 4px solid var(--accent); border-radius: 15px; margin: 20px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="role-overlay">
        <h1 id="role-name">---</h1>
        <p id="role-desc" style="padding: 20px; color: #94a3b8;"></p>
        <button class="btn btn-green" style="width: 200px;" onclick="closeRole()">ГАРАЗД</button>
    </div>

    <div id="scr-main" class="screen active">
        <h1 style="text-align:center; color:var(--accent); margin-top:30px;">CLASH SPY 🕵️</h1>
        <div style="margin-top:40px;">
            <p style="text-align:center;">Привіт, <b id="p-name-label">...</b></p>
            <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
            <input type="text" id="join-id" placeholder="Введіть ID хоста..." style="width:100%; padding:15px; margin:10px 0; border-radius:12px; text-align:center; background:#1a2236; color:white; border:1px solid #334155;">
            <button class="btn btn-blue" onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 style="text-align:center">ЛОБІ ID: <span id="lobby-id-display" style="color:var(--accent)">...</span></h2>
        <div id="player-list"></div>
        <p id="wait-msg" style="text-align:center; font-size:12px; color:#64748b;">Потрібно мінімум 3 гравці</p>
        <button id="start-btn" class="btn btn-blue" onclick="hostStartsGame()" disabled style="display:none;">РОЗПОЧАТИ ГРУ</button>
    </div>

    <div id="scr-game" class="screen">
        <div id="timer" style="text-align:right; color:var(--red); font-weight:bold;">05:00</div>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-in" style="flex:1; padding:10px; border-radius:8px; border:none; background:#1a2236; color:white;">
            <button class="btn btn-blue" style="width:60px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <button id="action-btn" class="btn btn-red" style="margin-top:10px;" onclick="handleAction()">🚫 ВИКРИТИ ШПИГУНА</button>
    </div>

    <div id="scr-card" class="screen">
        <div id="my-card-content"></div>
    </div>

    <div id="scr-profile" class="screen">
        <h2>Мій Профіль</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--accent);">
            <p>🏆 Перемог: <b id="stats-w">0</b></p>
            <p>💀 Поразок: <b id="stats-l">0</b></p>
        </div>
        <button class="btn btn-red" style="margin-top:20px;" onclick="localStorage.clear(); location.reload();">Скинути все</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('scr-main', this)">🏠<span>ДІМ</span></div>
        <div class="nav-item" onclick="nav('scr-profile', this)">👤<span>ПРОФІЛЬ</span></div>
    </nav>

<script>
    // Всі карти гри
    const cards = [
        "П.Е.К.К.А", "Мегалицар", "Вершник на кабані", "Спаркі", "Відьма", "Кат", "Гігант", "Малий дракон", "Принцеса", "Скелети", "Варвари", "Мушкетер", "Валькірія", "Мисливець", "Шахтар", "Дроворуб", "Бандитка", "Магічний лучник", "Плазмовий дракон", "Гоблінська бочка", "Куля", "Скелетна армія", "Золотий лицар", "Королева лучниць", "Король скелетів", "Могутній шахтар", "Хранитель", "Електричний гігант", "Рибалка", "Привид", "Нічна відьма", "Лавовий гончак", "Крижаний маг", "Маг", "Громовержець", "Темний принц", "Принц", "Міні П.Е.К.К.А", "Бойовий таран", "Елітні варвари"
    ];

    let peer, conn, connections = [];
    let myName = localStorage.getItem('cs_name') || prompt("Ваше ім'я:") || "Гравець" + Math.floor(Math.random()*99);
    localStorage.setItem('cs_name', myName);
    document.getElementById('p-name-label').innerText = myName;

    let stats = JSON.parse(localStorage.getItem('cs_stats')) || {w:0, l:0};
    document.getElementById('stats-w').innerText = stats.w;
    document.getElementById('stats-l').innerText = stats.l;

    let isSpy = false, currentCard = "", gameStarted = false;

    // СТВОРЕННЯ КІМНАТИ (ХОСТ)
    function createRoom() {
        peer = new Peer();
        peer.on('open', id => {
            document.getElementById('lobby-id-display').innerText = id;
            document.getElementById('start-btn').style.display = 'block';
            nav('scr-lobby');
            updatePlayerList([{name: myName + " (Ви)"}]);
        });
        peer.on('connection', c => {
            c.on('data', data => {
                if(data.type === 'join') {
                    connections.push({conn: c, name: data.name});
                    broadcastPlayers();
                }
            });
        });
    }

    // ПРИЄДНАННЯ (КЛІЄНТ)
    function joinRoom() {
        const targetId = document.getElementById('join-id').value;
        if(!targetId) return alert("Введіть ID!");
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(targetId);
            conn.on('open', () => {
                conn.send({type: 'join', name: myName});
                nav('scr-lobby');
            });
            conn.on('data', data => {
                if(data.type === 'players') updatePlayerList(data.list);
                if(data.type === 'start') setupGame(data.spy, data.card);
            });
        });
    }

    function broadcastPlayers() {
        const list = [{name: myName}, ...connections.map(c => ({name: c.name}))];
        updatePlayerList(list);
        connections.forEach(c => c.conn.send({type: 'players', list: list}));
    }

    function updatePlayerList(list) {
        const div = document.getElementById('player-list');
        div.innerHTML = list.map(p => `<div style="padding:10px; border-bottom:1px solid #2d3748;">👤 ${p.name}</div>`).join('');
        const startBtn = document.getElementById('start-btn');
        if(list.length >= 3) {
            startBtn.disabled = false;
            document.getElementById('wait-msg').style.display = 'none';
        }
    }

    function hostStartsGame() {
        const allNames = [myName, ...connections.map(c => c.name)];
        const spyName = allNames[Math.floor(Math.random() * allNames.length)];
        const card = cards[Math.floor(Math.random() * cards.length)];
        
        const startData = {type: 'start', spy: spyName, card: card};
        connections.forEach(c => c.conn.send(startData));
        setupGame(spyName, card);
    }

    function setupGame(spy, card) {
        isSpy = (spy === myName);
        currentCard = card;
        document.getElementById('role-overlay').style.display = 'flex';
        document.getElementById('role-name').innerText = isSpy ? "ТИ ШПИГУН 🕵️" : "ТИ ГРАВЕЦЬ 🛡️";
        document.getElementById('role-name').style.color = isSpy ? "var(--red)" : "var(--green)";
        document.getElementById('role-desc').innerText = isSpy ? "Твоя мета — вгадати карту за 1 спробу." : "Ваша карта: " + card;
        
        const cardArea = document.getElementById('my-card-content');
        if(isSpy) {
            cardArea.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Слухайте чат, щоб вгадати карту!</h2>";
        } else {
            cardArea.innerHTML = `<div class="card-visual"><span>🃏</span><h3>${card}</h3></div>`;
        }
    }

    function closeRole() {
        document.getElementById('role-overlay').style.display = 'none';
        nav('scr-game');
    }

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function sendMsg() {
        const input = document.getElementById('chat-in');
        if(!input.value) return;
        const msg = `<b>${myName}:</b> ${input.value}`;
        document.getElementById('chat-box').innerHTML += `<div>${msg}</div>`;
        input.value = "";
    }

    function handleAction() {
        if(isSpy) {
            const guess = prompt("Яка це карта?");
            if(guess && guess.toLowerCase() === currentCard.toLowerCase()) finish(true);
            else finish(false);
        } else {
            alert("Голосування відкрито (симуляція)...");
            setTimeout(() => finish(!isSpy), 2000);
        }
    }

    function finish(win) {
        if(win) stats.w++; else stats.l++;
        localStorage.setItem('cs_stats', JSON.stringify(stats));
        alert(win ? "ПЕРЕМОГА!" : "ПОРАЗКА!");
        location.reload();
    }
</script>
</body>
</html>
