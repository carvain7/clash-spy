<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy - Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; padding: 25px; }
        .active { display: flex; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 8px 0; font-size: 16px; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }
        
        #player-list { background: var(--card); padding: 10px; border-radius: 15; margin: 15px 0; min-height: 100px; border: 1px solid #2d3748; }
        .player-item { padding: 10px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; }
        #chat-window { flex: 1; background: #05070a; border-radius: 15px; margin: 10px 0; overflow-y: auto; padding: 10px; border: 1px solid #1a2236; }
        #timer { font-weight: bold; color: var(--accent); text-align: center; font-size: 20px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #2d3748; background: #111827; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen active">
        <h1 style="text-align:center; color:var(--accent);">CLASH SPY 🕵️</h1>
        <p style="text-align: center;">Привіт, <span id="user-name">...</span>!</p>
        <button class="btn btn-green" onclick="createLobby()">СТВОРТИ КІМНАТУ</button>
        <div style="margin-top: 20px;">
            <input type="number" id="lobby-input" placeholder="Введіть 4-значний код">
            <button class="btn btn-blue" onclick="joinLobby()">ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 style="text-align:center;">КІМНАТА: <span id="room-code-label" style="color:var(--accent)">----</span></h2>
        <div id="player-list"></div>
        <p id="lobby-msg" style="text-align:center; color:#64748b;">Очікування...</p>
        <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">РОЗПОЧАТИ ГРУ</button>
        <button class="btn btn-red" onclick="leaveRoom()">ВИЙТИ</button>
    </div>

    <div id="scr-game" class="screen">
        <div id="timer">05:00</div>
        <div id="chat-window"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Ваше повідомлення...">
            <button class="btn btn-blue" style="width: 60px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <button class="btn btn-red" onclick="handleGameAction()">ВИКРИТИ ШПИГУНА</button>
    </div>

<script>
  const tg = window.Telegram.WebApp;
tg.expand();

const firebaseConfig = { databaseURL: "https://clashspy-multi-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = tg.initDataUnsafe?.user?.first_name || "Гравець_" + Math.floor(Math.random()*99);
document.getElementById('user-name').innerText = myName;

let roomID = null;
let isHost = false;
let myKey = null;

// Функція навігації
function nav(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// 1. СТВОРЕННЯ КІМНАТИ
async function createLobby() {
    roomID = Math.floor(1000 + Math.random() * 8999).toString();
    isHost = true;
    
    // Очищуємо стару гілку гри, якщо вона раптом була
    await db.ref('rooms/' + roomID).remove(); 
    
    setupRoom();
    document.getElementById('start-btn').style.display = 'block';
}

// 2. ПРИЄДНАННЯ
async function joinLobby() {
    const input = document.getElementById('lobby-input').value;
    if(input.length !== 4) return alert("Введіть 4 цифри!");
    
    roomID = input;
    const snapshot = await db.ref('rooms/' + roomID).once('value');
    
    if(!snapshot.exists()) {
        alert("Кімнату не знайдено! Перевірте код.");
        return;
    }
    
    isHost = false;
    document.getElementById('start-btn').style.display = 'none';
    setupRoom();
}

// 3. НАЛАШТУВАННЯ СИНХРОНІЗАЦІЇ (Викликається ПІСЛЯ того як roomID отримано)
function setupRoom() {
    document.getElementById('room-code-label').innerText = roomID;
    nav('scr-lobby');

    const roomRef = db.ref('rooms/' + roomID);
    
    // Реєструємо себе
    const playerRef = roomRef.child('players').push({ name: myName });
    myKey = playerRef.key;
    playerRef.onDisconnect().remove();

    // Слухаємо гравців
    roomRef.child('players').on('value', (snapshot) => {
        const players = snapshot.val();
        const listDiv = document.getElementById('player-list');
        listDiv.innerHTML = "";
        let count = 0;
        if (players) {
            Object.values(players).forEach(p => {
                count++;
                listDiv.innerHTML += `<div class="player-item">👤 ${p.name} <span style="color:var(--green)">●</span></div>`;
            });
        }
        
        if (isHost) {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = count < 3;
            document.getElementById('lobby-msg').innerText = count < 3 ? `Очікуємо гравців (${count}/3)` : "Можна починати!";
        } else {
            document.getElementById('lobby-msg').innerText = "Чекайте, поки Хост запустить арену...";
        }
    });

    // Слухаємо старт гри
    roomRef.child('game').on('value', (snapshot) => {
        const game = snapshot.val();
        if (game && game.status === 'started') {
            startActualGame(game);
        }
    });

    // Слухаємо чат (тільки ПІСЛЯ вибору кімнати)
    roomRef.child('chat').off(); // Скидаємо старі слухачі
    roomRef.child('chat').on('child_added', (snap) => {
        const m = snap.val();
        const win = document.getElementById('chat-window');
        const isMe = m.user === myName;
        win.innerHTML += `<div style="margin-bottom:5px; text-align:${isMe ? 'right' : 'left'}">
            <small style="color:#64748b">${m.user}</small><br>
            <span style="display:inline-block; background:${isMe ? 'var(--blue)' : 'var(--card)'}; padding:8px 12px; border-radius:10px;">${m.msg}</span>
        </div>`;
        win.scrollTop = win.scrollHeight;
    });
}

// 4. ЗАПУСК ГРИ (Тільки для Хоста)
function startGame() {
    const cards = ["П.Е.К.К.А", "Мегалицар", "Вершник на кабані", "Спаркі", "Принцеса", "Магічний лучник", "Елітний варвар"];
    const selectedCard = cards[Math.floor(Math.random() * cards.length)];
    
    db.ref('rooms/' + roomID + '/players').once('value', (snap) => {
        const players = [];
        snap.forEach(child => { players.push(child.val().name); });
        const spy = players[Math.floor(Math.random() * players.length)];

        db.ref('rooms/' + roomID + '/game').set({
            status: 'started',
            spy: spy,
            card: selectedCard
        });
    });
}

function startActualGame(game) {
    nav('scr-game');
    const isSpy = game.spy === myName;
    const infoBox = document.createElement('div');
    infoBox.style = "background:var(--card); padding:15px; border-radius:12px; text-align:center; margin-bottom:10px; border: 2px solid var(--accent)";
    
    if(isSpy) {
        infoBox.innerHTML = `<h3 style="margin:0; color:var(--red)">🕵️ ТИ ШПИГУН</h3><p>Твоя мета: вгадати карту за розмовами!</p>`;
    } else {
        infoBox.innerHTML = `<h3 style="margin:0; color:var(--green)">🛡️ ТИ ГРАВЕЦЬ</h3><p>Карта: <b>${game.card}</b></p>`;
    }
    document.getElementById('chat-window').prepend(infoBox);
}

function sendMsg() {
    const inp = document.getElementById('chat-input');
    if(!inp.value.trim()) return;
    db.ref('rooms/' + roomID + '/chat').push({ user: myName, msg: inp.value });
    inp.value = "";
}

function leaveRoom() {
    if(myKey && roomID) db.ref('rooms/' + roomID + '/players/' + myKey).remove();
    location.reload();
}
</script>
</body>
</html>
