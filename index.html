<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* Navigation - Fixed Grid */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #1a2236; display: flex; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #64748b; }
        .nav-item.active { color: var(--accent); background: rgba(245, 158, 11, 0.05); }
        .nav-item span { font-size: 10px; margin-top: 4px; text-transform: uppercase; }

        .screen { display: none; height: calc(100vh - 70px); width: 100%; flex-direction: column; overflow-y: auto; }
        .active { display: flex; }

        .container { padding: 20px; text-align: center; width: 100%; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin: 8px 0; font-size: 16px; }
        
        /* Game UI */
        .card-box { background: #1e293b; border-radius: 15px; padding: 15px; text-align: left; border: 1px solid #334155; margin-bottom: 15px; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px solid #2d3748; padding-bottom: 3px; font-size: 14px; }
        
        #chat-window { background: #020617; flex: 1; border-radius: 10px; overflow-y: auto; padding: 15px; margin: 10px 0; border: 1px solid #1e293b; }
        .msg { margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
        .msg b { color: var(--blue); }
        
        #role-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 15px; border-radius: 10px; font-weight: bold; z-index: 3000; transition: 0.4s; width: 85%; text-align: center; }
        #toast.show { top: 20px; }

        .progress-bar { background: #020617; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; border: 1px solid #334155; }
        #prog-fill { background: var(--green); height: 100%; width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="role-overlay">
        <h2 style="color:#64748b">ВАША РОЛЬ:</h2>
        <h1 id="role-name" style="font-size: 40px; margin: 20px 0;">---</h1>
        <p id="role-desc" style="padding: 0 40px; color: #94a3b8;"></p>
        <button class="btn" onclick="closeRoleOverlay()" style="width: 200px; margin-top: 30px; background: var(--accent); color: black;">ЗРОЗУМІЛО</button>
    </div>

    <div id="toast">Повідомлення</div>

    <div id="scr-main" class="screen active">
        <div class="container">
            <h1 style="color:var(--accent); margin-top:40px; font-size: 36px;">CLASH SPY</h1>
            <div class="card-box" style="text-align: center;">
                <button class="btn" onclick="openLobby(true)" style="background:var(--green)">Створити кімнату</button>
                <input type="text" id="join-code" placeholder="Код лобі..." style="width:100%; padding:15px; border-radius:12px; border:none; text-align:center; background:var(--bg); color:white; margin:10px 0; border: 1px solid #334155;">
                <button class="btn" onclick="openLobby(false)" style="background:var(--accent); color:black;">Приєднатися</button>
            </div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="container">
            <h2>Профіль Гравця</h2>
            <div class="card-box">
                <div style="font-size: 18px; margin-bottom: 10px;">🏆 Перемоги: <b id="p-wins">0</b></div>
                <div style="font-size: 18px; margin-bottom: 10px;">💀 Поразки: <b id="p-loses">0</b></div>
                <div style="font-size: 18px;">📊 KD: <b id="p-kd">0.00</b></div>
                <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
                <div style="color: var(--accent); font-weight: bold; font-size: 20px;" id="p-rank">Новачок</div>
                <div class="progress-bar"><div id="prog-fill"></div></div>
                <small id="p-next" style="color: #64748b;"></small>
            </div>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="container">
            <h1 style="font-size: 20px; color: #64748b;">ID КІМНАТИ: <span id="room-id" style="color:var(--accent)">-</span></h1>
            <div class="card-box">
                <div style="margin-bottom: 10px;">👤 Ви (Організатор)</div>
                <div style="color: #64748b;">👤 Гравець 2 (Входить...)</div>
                <div style="color: #64748b;">👤 Гравець 3 (Входить...)</div>
            </div>
            <button class="btn" onclick="startSequence()">🔥 РОЗПОЧАТИ ГРУ</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div class="container" style="display:flex; flex-direction:column; height:100%; padding: 10px;">
            <div class="card-box" style="padding: 10px; margin-bottom: 5px; font-size: 13px;">
                ⏱️ Час: <b id="timer" style="color:var(--red)">05:00</b> | 
                🎤 <b id="turn-display" style="color:var(--green)">Ваш хід</b>
                <div id="turn-timer-bar" style="height: 3px; background: var(--green); margin-top: 5px; width: 100%; transition: linear 1s;"></div>
            </div>
            
            <div id="chat-window"></div>
            
            <div id="action-zone" style="margin-bottom: 5px;">
                <button id="btn-spy-act" class="btn" onclick="nav('scr-guess',null,'game')" style="display:none; background:var(--accent); color:black;">🎯 ВГАДАТИ КАРТУ</button>
                <button id="btn-vote-act" class="btn" onclick="nav('scr-vote',null,'game')" style="display:none; background:var(--red);">🚫 ГОЛОСУВАТИ</button>
            </div>

            <div style="display:flex; gap:8px;">
                <input type="text" id="chat-input" placeholder="Задайте питання..." style="flex:1; padding:12px; border-radius:10px; border:none; background:#1e293b; color:white;">
                <button class="btn" id="send-btn" onclick="sendMessage()" style="width:50px; margin:0;">➜</button>
            </div>
        </div>
    </div>

    <div id="scr-card" class="screen">
        <div class="container">
            <h1 id="c-header">КАРТА</h1>
            <div id="c-detail"></div>
        </div>
    </div>

    <div id="scr-guess" class="screen">
        <div class="container">
            <h3>ОБЕРІТЬ ПРАВИЛЬНУ КАРТУ</h3>
            <div id="cards-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
        </div>
    </div>

    <div id="scr-vote" class="screen">
        <div class="container">
            <h3>ХТО ШПИГУН?</h3>
            <button class="btn" onclick="endMatch(true)">👤 Player_2 (Підозра)</button>
            <button class="btn" onclick="endMatch(false)">👤 Player_3 (Підозра)</button>
            <button class="btn" onclick="nav('scr-game',null,'game')" style="background:none;">Назад</button>
        </div>
    </div>

    <nav class="nav-bar" id="nav-main">
        <div class="nav-item active" onclick="nav('scr-main', this, 'menu')">🏠<span>Дім</span></div>
        <div class="nav-item" onclick="nav('scr-profile', this, 'menu')">👤<span>Профіль</span></div>
    </nav>

    <nav class="nav-bar" id="nav-game" style="display:none;">
        <div class="nav-item active" onclick="nav('scr-game', this, 'game')">💬<span>Чат</span></div>
        <div class="nav-item" onclick="nav('scr-card', this, 'game')">🃏<span>Карта</span></div>
    </nav>

    <script>
        const allCards = [
            {n:"П.Е.К.К.А", hp:3450, dmg:678, spd:"Повільна", rar:"Епічна"},
            {n:"Мегалицар", hp:3300, dmg:222, spd:"Середня", rar:"Легендарна"},
            {n:"Спаркі", hp:1200, dmg:1100, spd:"Повільна", rar:"Легендарна"},
            {n:"Вершник на кабані", hp:1400, dmg:318, spd:"Дуже швидка", rar:"Рідкісна"},
            {n:"Елітний варвар", hp:1110, dmg:318, spd:"Дуже швидка", rar:"Звичайна"},
            {n:"Магічний лучник", hp:440, dmg:111, spd:"Середня", rar:"Легендарна"},
            {n:"Принцеса", hp:216, dmg:140, spd:"Середня", rar:"Легендарна"},
            {n:"Шахтар", hp:1000, dmg:160, spd:"Швидка", rar:"Легендарна"},
            {n:"Відьма", hp:696, dmg:111, spd:"Середня", rar:"Епічна"},
            {n:"Кат", hp:1010, dmg:140, spd:"Середня", rar:"Епічна"}
        ];

        const ranks = ["Новачок", "Рекрут", "Воїн", "Бієць", "Гвардієць", "Лицар", "Мастер", "Еліта", "Чемпіон", "Легенда"];

        let stats = JSON.parse(localStorage.getItem('spyStats')) || { w:0, l:0 };
        let isSpy = false, myCard = null, gameTime = 300, turnTime = 20, gameInt, turnInt;

        function updateUI() {
            const kd = stats.w / (stats.l || 1);
            document.getElementById('p-wins').innerText = stats.w;
            document.getElementById('p-loses').innerText = stats.l;
            document.getElementById('p-kd').innerText = kd.toFixed(2);
            
            let rIdx = Math.min(Math.floor(stats.w / 5), 9);
            document.getElementById('p-rank').innerText = ranks[rIdx];
            let nextReq = (rIdx + 1) * 5;
            document.getElementById('prog-fill').style.width = (stats.w / nextReq * 100) + "%";
            document.getElementById('p-next').innerText = `До рангу ${ranks[rIdx+1] || 'МАКС'}: ${nextReq - stats.w} перемог`;
        }

        function nav(id, el, type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const navId = type === 'menu' ? 'nav-main' : 'nav-game';
            document.querySelectorAll(`#${navId} .nav-item`).forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function openLobby(isNew) {
            document.getElementById('nav-main').style.display = 'none';
            document.getElementById('room-id').innerText = isNew ? "XJ99" : "OK";
            nav('scr-lobby');
        }

        function startSequence() {
            isSpy = Math.random() < 0.3;
            myCard = allCards[Math.floor(Math.random()*allCards.length)];
            const ov = document.getElementById('role-overlay');
            ov.style.display = 'flex';
            document.getElementById('role-name').innerText = isSpy ? "ШПИГУН 🕵️" : "ГРАВЕЦЬ 🛡️";
            document.getElementById('role-name').style.color = isSpy ? "var(--red)" : "var(--green)";
            document.getElementById('role-desc').innerText = isSpy ? 
                "Ваше завдання — дізнатися, яка карта у гравців, не видавши себе." : 
                "Ваше завдання — обговорювати карту та вирахувати шпигуна.";
        }

        function closeRoleOverlay() {
            document.getElementById('role-overlay').style.display = 'none';
            document.getElementById('nav-game').style.display = 'flex';
            setupMatch();
            nav('scr-game', document.querySelector('#nav-game .nav-item'), 'game');
        }

        function setupMatch() {
            document.getElementById(isSpy ? 'btn-spy-act' : 'btn-vote-act').style.display = 'block';
            const detail = document.getElementById('c-detail');
            if(isSpy) {
                document.getElementById('c-header').innerText = "МЕТА";
                detail.innerHTML = `<div class="card-box">Вгадайте карту гравців у вкладці Чат.</div>`;
                document.getElementById('cards-grid').innerHTML = allCards.map(c => 
                    `<button class="btn" style="background:#fff; color:#000; font-size:12px;" onclick="endMatch(${c.n === myCard.n})">${c.n}</button>`).join('');
            } else {
                detail.innerHTML = `
                    <div class="card-box">
                        <h2 style="color:var(--accent)">${myCard.n}</h2>
                        <div class="stat-row"><span>❤️ HP</span><b>${myCard.hp}</b></div>
                        <div class="stat-row"><span>⚔️ Damage</span><b>${myCard.dmg}</b></div>
                        <div class="stat-row"><span>💎 Рідкість</span><b>${myCard.rar}</b></div>
                    </div>`;
            }
            startTimers();
        }

        function startTimers() {
            gameTime = 300;
            gameInt = setInterval(() => {
                gameTime--;
                let m = Math.floor(gameTime/60), s = gameTime%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
                if(gameTime <= 0) { endMatch(false); }
            }, 1000);
            resetTurn();
        }

        function resetTurn() {
            clearInterval(turnInt);
            turnTime = 20;
            document.getElementById('turn-display').innerText = "Ваш хід";
            document.getElementById('chat-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            
            turnInt = setInterval(() => {
                turnTime--;
                document.getElementById('turn-timer-bar').style.width = (turnTime/20*100) + "%";
                if(turnTime <= 0) { skipTurn(); }
            }, 1000);
        }

        function skipTurn() {
            clearInterval(turnInt);
            document.getElementById('turn-display').innerText = "Хід Player_2...";
            document.getElementById('chat-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('turn-timer-bar').style.width = "0%";
            setTimeout(resetTurn, 5000); // Через 5 сек хід повертається (для симуляції)
        }

        function sendMessage() {
            const inp = document.getElementById('chat-input'), win = document.getElementById('chat-window');
            if(!inp.value) return;
            win.innerHTML += `<div class="msg"><b>Ви:</b> ${inp.value}</div>`;
            win.scrollTop = win.scrollHeight;
            inp.value = "";
            skipTurn();
        }

        function endMatch(win) {
            clearInterval(gameInt); clearInterval(turnInt);
            if(win) stats.w++; else stats.l++;
            localStorage.setItem('spyStats', JSON.stringify(stats));
            const t = document.getElementById('toast');
            t.innerText = win ? "🎉 ПЕРЕМОГА!" : "❌ ПРОГРАШ!";
            t.classList.add('show');
            setTimeout(() => location.reload(), 4000);
        }

        updateUI();
    </script>
</body>
</html>
