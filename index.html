<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --cr-blue: #1e56a0;
            --cr-gold: #f6c90e;
            --cr-dark: #222831;
            --cr-white: #eeeeee;
        }
        body {
            background-color: var(--cr-dark);
            color: var(--cr-white);
            font-family: 'Arial', sans-serif;
            margin: 0; padding: 10px;
            text-align: center;
        }
        /* Характеристики для звичайних гравців */
        .stats-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--cr-gold);
            border-radius: 15px;
            padding: 15px; margin-bottom: 20px;
        }
        /* Поле пошуку */
        #card-search {
            width: 90%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
        }
        /* Сітка карт */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .card-item {
            background: #393e46;
            border-radius: 8px;
            padding: 5px;
            border-bottom: 4px solid #000;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .card-item:active { transform: scale(0.95); }
        .card-item img { width: 100%; border-radius: 5px; }
        .card-item span { font-size: 10px; display: block; margin-top: 5px; height: 24px; }

        /* Модальне вікно (Поп-ап) */
        #modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--cr-white);
            color: #000;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 100;
            width: 80%;
        }
        .overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }
        .btn-confirm { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 5px; }
        .btn-cancel { background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="player-view" style="display: none;">
        <h2>Твоя Карта</h2>
        <div class="stats-box">
            <h1 id="player-card-name">---</h1>
            <p>⚔️ Урон: <span id="stat-dmg">---</span></p>
            <p>❤️ HP: <span id="stat-hp">---</span></p>
        </div>
    </div>

    <div id="spy-view" style="display: none;">
        <h2>Ти — Шпигун 🕵️</h2>
        <input type="text" id="card-search" placeholder="Пошук карти..." onkeyup="filterCards()">
        <div class="card-grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h3>Ти впевнений?</h3>
        <p id="modal-text"></p>
        <button class="btn-confirm" onclick="sendGuess()">ТАК</button>
        <button class="btn-cancel" onclick="closeModal()">НІ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран

        const allCards = [
            {name: "П.Е.К.К.А", hp: 3400, dmg: 678},
            {name: "Мегалицар", hp: 3300, dmg: 222},
            {name: "Всадник на кабані", hp: 1400, dmg: 264},
            // ... додай сюди всі 110 карт
        ];

        let selectedGuess = "";

        // Приклад отримання ролі (імітація, реально дані прийдуть з бота)
        const isSpy = true; // Це значення має прийти від бота

        if (isSpy) {
            document.getElementById('spy-view').style.display = 'block';
            renderGrid(allCards);
        } else {
            document.getElementById('player-view').style.display = 'block';
            document.getElementById('player-card-name').innerText = "П.Е.К.К.А";
            document.getElementById('stat-hp').innerText = "3400";
            document.getElementById('stat-dmg').innerText = "678";
        }

        function renderGrid(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(card => `
                <div class="card-item" onclick="openModal('${card.name}')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${card.name}" alt="Card">
                    <span>${card.name}</span>
                </div>
            `).join('');
        }

        function filterCards() {
            const q = document.getElementById('card-search').value.toLowerCase();
            const filtered = allCards.filter(c => c.name.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        function openModal(name) {
            selectedGuess = name;
            document.getElementById('modal-text').innerText = `Ти вибираєш: ${name}`;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
function sendGuess() {
    // Дані мають бути рядком (string)
    const data = JSON.stringify({
        action: "guess",
        card: selectedGuess,
        status: selectedGuess === "П.Е.К.К.А" ? "win" : "lose"
    });
    
    tg.sendData(data); // Це відправить повідомлення в чат від імені користувача
    tg.close();
}
        function sendGuess() {
            tg.sendData(JSON.stringify({action: "guess", card: selectedGuess}));
            tg.close();
        }
    </script>
</body>
</html>
