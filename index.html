<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; padding: 20px; }
        .active { display: flex; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 8px 0; font-size: 16px; color: white; transition: 0.1s; }
        .btn-blue { background: var(--blue); box-shadow: 0 4px 0 #1d4ed8; }
        .btn-green { background: var(--green); box-shadow: 0 4px 0 #047857; }
        .btn-red { background: var(--red); box-shadow: 0 4px 0 #b91c1c; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #2d3748; background: #111827; color: white; margin-bottom: 10px; text-align: center; }
        #chat-window { flex: 1; background: #05070a; border-radius: 15px; margin: 10px 0; overflow-y: auto; padding: 15px; border: 1px solid #1a2236; }
        .msg { margin-bottom: 5px; font-size: 14px; }
        .stats-box { background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen active">
        <h1 style="text-align:center; color:var(--accent);">CLASH SPY 🕵️</h1>
        <div class="stats-box" id="user-stats">
            Завантаження профілю...
        </div>
        <button class="btn btn-green" onclick="createLobby()">СТВОРТИ КІМНАТУ</button>
        <div style="margin-top: 20px;">
            <input type="number" id="lobby-input" placeholder="Код (4 цифри)">
            <button class="btn btn-blue" onclick="joinLobby()">ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 style="text-align:center;">КІМНАТА: <span id="room-code-label" style="color:var(--accent)">----</span></h2>
        <div id="player-list" style="flex-grow:1; background:var(--card); border-radius:15px; padding:10px; margin:10px 0;"></div>
        <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">ПОЧАТИ БИТВУ</button>
        <button class="btn btn-red" onclick="location.reload()">ВИЙТИ</button>
    </div>

    <div id="scr-game" class="screen">
        <div id="game-status" style="text-align:center; padding:10px; border-radius:10px; font-weight:bold;"></div>
        <div id="chat-window"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Питання..." style="margin:0; text-align:left;">
            <button class="btn btn-blue" style="width: 60px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <button id="finish-btn" class="btn btn-red" onclick="finishGameAction()" style="display:none;">ЗАВЕРШИТИ ГРУ</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // КОНФІГУРАЦІЯ
    const firebaseConfig = { databaseURL: "https://clashspy-multi-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const uID = tg.initDataUnsafe?.user?.id || "guest_" + Math.floor(Math.random()*9999);
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";
    
    let roomID = null;
    let myKey = null;
    let isHost = false;

    // ЗАВАНТАЖЕННЯ СТАТИСТИКИ
    db.ref('users/' + uID).on('value', (snap) => {
        const data = snap.val() || { wins: 0 };
        document.getElementById('user-stats').innerHTML = `
            <b>${uName}</b><br>
            🏆 Перемог: <span style="color:var(--accent)">${data.wins}</span>
        `;
    });

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ЛОГІКА КІМНАТИ
    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
        setupRoom();
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('finish-btn').style.display = 'block';
    }

    async function joinLobby() {
        roomID = document.getElementById('lobby-input').value;
        const snap = await db.ref('rooms/' + roomID).once('value');
        if(!snap.exists()) return alert("Кімнату не знайдено!");
        isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('room-code-label').innerText = roomID;
        nav('scr-lobby');

        const roomRef = db.ref('rooms/' + roomID);
        const pRef = roomRef.child('players').push({ name: uName, id: uID });
        myKey = pRef.key;
        pRef.onDisconnect().remove();

        // Якщо хост вийшов - видалити кімнату
        if(isHost) roomRef.onDisconnect().remove();

        roomRef.child('players').on('value', (snap) => {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            let c = 0;
            snap.forEach(p => {
                c++;
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">👤 ${p.val().name}</div>`;
            });
            if(isHost) document.getElementById('start-btn').disabled = c < 3;
        });

        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(!data) { // Кімнату видалено
                alert("Гру завершено Хостом або Кімнату видалено.");
                location.reload();
                return;
            }
            if(data.status === 'started') runGame(data);
        });

        roomRef.child('chat').on('child_added', (snap) => {
            const m = snap.val();
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg"><b>${m.user}:</b> ${m.msg}</div>`;
            win.scrollTop = win.scrollHeight;
        });
    }

    function startGame() {
        const cards = ["П.Е.К.К.А", "Мегалицар", "Всадник на кабані", "Спаркі", "Відьма", "Принцеса"];
        db.ref('rooms/' + roomID + '/players').once('value', (snap) => {
            let ps = [];
            snap.forEach(p => ps.push(p.val()));
            const spy = ps[Math.floor(Math.random()*ps.length)];
            db.ref('rooms/' + roomID).update({
                status: 'started',
                spyID: spy.id,
                card: cards[Math.floor(Math.random()*cards.length)]
            });
        });
    }

    function runGame(data) {
        nav('scr-game');
        const isSpy = data.spyID === uID;
        const st = document.getElementById('game-status');
        st.style.background = isSpy ? 'var(--red)' : 'var(--green)';
        st.innerHTML = isSpy ? "ТИ ШПИГУН 🕵️" : `ТВОЯ КАРТА: ${data.card}`;
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        db.ref('rooms/' + roomID + '/chat').push({ user: uName, msg: inp.value });
        inp.value = "";
    }

    // ФУНКЦІЯ ЗАВЕРШЕННЯ ТА НАРАХУВАННЯ ПЕРЕМОГИ
    async function finishGameAction() {
        const winnerName = prompt("Введіть ім'я переможця (точно як у списку):");
        if(!winnerName) return;

        // Шукаємо ID переможця серед гравців кімнати
        const pSnap = await db.ref('rooms/' + roomID + '/players').once('value');
        let winnerID = null;
        pSnap.forEach(p => {
            if(p.val().name === winnerName) winnerID = p.val().id;
        });

        if(winnerID) {
            // Нараховуємо перемогу в базу
            const winRef = db.ref('users/' + winnerID + '/wins');
            winRef.transaction((current) => (current || 0) + 1);
            alert("Перемогу зараховано!");
        }

        // Видаляємо кімнату через 3 секунди
        setTimeout(() => {
            db.ref('rooms/' + roomID).remove();
        }, 3000);
    }
</script>
</body>
</html>
