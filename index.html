<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy - GitHub Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; padding: 25px; }
        .active { display: flex; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 8px 0; font-size: 16px; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        
        #player-list { background: var(--card); padding: 10px; border-radius: 15px; border: 1px solid #2d3748; margin: 15px 0; }
        .player-item { padding: 12px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; align-items: center; }
        .player-item:last-child { border: none; }
        
        #chat-window { flex: 1; background: #05070a; border-radius: 15px; margin: 15px 0; overflow-y: auto; padding: 15px; border: 1px solid #1a2236; }
        .msg { margin-bottom: 8px; font-size: 14px; }
        .msg b { color: var(--accent); }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #2d3748; background: #111827; color: white; text-align: center; font-size: 16px; }
        #role-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="role-overlay">
        <h1 id="role-title" style="font-size: 40px;">---</h1>
        <p id="role-desc" style="color: #94a3b8; font-size: 18px; margin-bottom: 30px;"></p>
        <button class="btn btn-green" style="width: 200px" onclick="document.getElementById('role-overlay').style.display='none'">ГОТОВИЙ(А)</button>
    </div>

    <div id="scr-menu" class="screen active">
        <h1 style="text-align:center; color:var(--accent); margin-bottom: 40px;">CLASH SPY 🕵️</h1>
        <div style="background: var(--card); padding: 20px; border-radius: 15px;">
            <p>Ваше ім'я: <b id="display-name">...</b></p>
            <button class="btn btn-green" onclick="createLobby()">СТВОРТИ КІМНАТУ</button>
            <div style="margin-top: 20px;">
                <input type="number" id="lobby-input" placeholder="Код (4 цифри)">
                <button class="btn btn-blue" onclick="joinLobby()">ПРИЄДНАТИСЯ</button>
            </div>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 style="text-align:center; margin:0;">КІМНАТА: <span id="room-code-label" style="color:var(--accent)">----</span></h2>
        <div id="player-list"></div>
        <p id="lobby-msg" style="text-align:center; color:#64748b;">Очікування гравців (мінімум 3)...</p>
        <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;" disabled>РОЗПОЧАТИ ГРУ</button>
        <button class="btn" onclick="location.reload()" style="background:none; color:var(--red);">ВИЙТИ</button>
    </div>

    <div id="scr-game" class="screen">
        <div id="chat-window"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Напишіть щось..." style="text-align: left;">
            <button class="btn btn-blue" style="width: 70px; margin:0;" onclick="sendMsg()">➜</button>
        </div>
        <button class="btn btn-red" onclick="handleGameAction()">ВГАДАТИ / ВИКРИТИ</button>
    </div>

<script>
    // 1. КОНФІГУРАЦІЯ FIREBASE (Це загальний тестовий проєкт)
    const firebaseConfig = {
        databaseURL: "https://clashspy-multi-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. ДАНІ ГРАВЦЯ
    let myName = localStorage.getItem('spy_name') || prompt("Введіть ваше ім'я:") || "Гравець" + Math.floor(Math.random()*99);
    localStorage.setItem('spy_name', myName);
    document.getElementById('display-name').innerText = myName;

    let roomID = null;
    let isHost = false;
    const cards = ["П.Е.К.К.А", "Мегалицар", "Вершник", "Спаркі", "Відьма", "Кат", "Принцеса", "Гігант", "Дракончик", "Валькірія"];

    // 3. СТВОРЕННЯ ЛОБІ
    function createLobby() {
        isHost = true;
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        document.getElementById('start-btn').style.display = 'block';
        setupFirebase();
    }

    // 4. ПРИЄДНАННЯ ДО ЛОБІ
    function joinLobby() {
        roomID = document.getElementById('lobby-input').value;
        if(roomID.length !== 4) return alert("Код має бути з 4 цифр!");
        isHost = false;
        setupFirebase();
    }

    // 5. ОСНОВНА ЛОГІКА СИНХРОНІЗАЦІЇ
    function setupFirebase() {
        document.getElementById('room-code-label').innerText = roomID;
        nav('scr-lobby');

        const roomRef = db.ref('rooms/' + roomID);

        // Додаємо себе в список гравців
        roomRef.child('players').push({ name: myName });

        // Коли виходите — видаляємо себе (опціонально)
        roomRef.child('players').onDisconnect().remove();

        // СЛУХАЄМО ГРАВЦІВ (МИТТЄВО)
        roomRef.child('players').on('value', (snapshot) => {
            const players = snapshot.val();
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = "";
            let count = 0;

            if (players) {
                Object.values(players).forEach(p => {
                    count++;
                    listDiv.innerHTML += `<div class="player-item">👤 ${p.name} <span>✅</span></div>`;
                });
            }

            if (isHost) {
                const btn = document.getElementById('start-btn');
                btn.disabled = count < 3;
                document.getElementById('lobby-msg').innerText = count < 3 ? `Ще ${3-count} гравців...` : "Можна починати!";
            } else {
                document.getElementById('lobby-msg').innerText = "Чекайте, поки Хост почне гру...";
            }
        });

        // СЛУХАЄМО СТАРТ ГРИ
        roomRef.child('game').on('value', (snapshot) => {
            const gameData = snapshot.val();
            if (gameData && gameData.status === 'started') {
                const amISpy = gameData.spy === myName;
                showRole(amISpy, gameData.card);
            }
        });

        // СЛУХАЄМО ЧАТ
        roomRef.child('chat').on('child_added', (snapshot) => {
            const m = snapshot.val();
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg"><b>${m.user}:</b> ${m.msg}</div>`;
            win.scrollTop = win.scrollHeight;
        });
    }

    // 6. ХОСТ ЗАПУСКАЄ ГРУ
    function startGame() {
        const roomRef = db.ref('rooms/' + roomID);
        const selectedCard = cards[Math.floor(Math.random() * cards.length)];
        
        roomRef.child('players').once('value', (snap) => {
            const players = Object.values(snap.val());
            const spy = players[Math.floor(Math.random() * players.length)].name;
            
            roomRef.child('game').set({
                status: 'started',
                spy: spy,
                card: selectedCard
            });
        });
    }

    function showRole(spy, card) {
        document.getElementById('role-overlay').style.display = 'flex';
        const title = document.getElementById('role-title');
        title.innerText = spy ? "ТИ ШПИГУН 🕵️" : "ТИ ГРАВЕЦЬ 🛡️";
        title.style.color = spy ? "var(--red)" : "var(--green)";
        document.getElementById('role-desc').innerText = spy ? "Дізнайся назву карти, слухаючи інших!" : "Твоя карта: " + card;
        nav('scr-game');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        db.ref('rooms/' + roomID + '/chat').push({ user: myName, msg: inp.value });
        inp.value = "";
    }

    function handleGameAction() {
        const action = prompt("Ваш вердикт (ім'я шпигуна або назва карти):");
        if(action) {
            alert("Гру закінчено! Перевірте результат у чаті.");
            location.reload();
        }
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
