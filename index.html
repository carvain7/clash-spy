<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Вкладки */
        .tab-bar { display: flex; background: #161f32; border-bottom: 1px solid #2d3748; min-height: 50px; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; cursor: pointer; opacity: 0.5; color: white; text-transform: uppercase; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }

        /* Екрани */
        .screen { display: none; flex: 1; width: 100%; flex-direction: column; padding: 15px; overflow-y: auto; position: relative; }
        .active-screen { display: flex; }

        /* Кнопки та інпути */
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin: 5px 0; font-size: 15px; color: white; text-transform: uppercase; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        
        input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 16px; text-align: center; outline: none; margin-bottom: 10px; }

        /* Гра */
        .card-display { background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 2px solid var(--accent); margin-bottom: 10px; }
        .unit-img { width: 100px; height: 120px; object-fit: contain; margin-top: 5px; }
        
        #chat-window { flex: 1; min-height: 150px; background: #05070a; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #1a2236; font-size: 13px; }
        .msg { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }

        /* Рейтинг */
        .rank-item { display: flex; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 4px; align-items: center; }
        .rank-item.me { background: rgba(245, 158, 11, 0.15); border: 1px solid var(--accent); }
        .my-rank-fixed { position: sticky; bottom: -15px; left: -15px; right: -15px; width: calc(100% + 30px); background: #1c2538; padding: 12px 15px; border-top: 2px solid var(--accent); display: flex; justify-content: space-between; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('game', this)">Гра</div>
        <div class="tab" onclick="switchTab('profile', this)">Профіль</div>
        <div class="tab" onclick="switchTab('leaderboard', this)">ТОП-100</div>
    </div>

    <div id="scr-game" class="screen active-screen">
        <div id="menu-area">
            <h2 style="text-align:center; color:var(--accent);">CLASH SPY 🕵️</h2>
            <button class="btn btn-green" onclick="createLobby()">Створити кімнату</button>
            <div style="margin-top: 15px; border-top: 1px solid #2d3748; padding-top: 10px;">
                <input type="number" id="lobby-input" placeholder="Код кімнати">
                <button class="btn btn-blue" onclick="joinLobby()">Приєднатися</button>
            </div>
        </div>

        <div id="lobby-area" style="display:none; flex-direction:column; height:100%;">
            <div style="text-align:center;">
                <span style="opacity:0.6; font-size:12px;">КОД КІМНАТИ</span>
                <h1 id="room-code-label" style="color:var(--accent); font-size: 36px; margin:0;">----</h1>
            </div>
            <div id="player-list" style="flex:1; margin:10px 0;"></div>
            <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">Почати битву</button>
            <button class="btn btn-red" onclick="location.reload()" style="background:none; box-shadow:none; font-size:12px;">Вийти</button>
        </div>

        <div id="play-area" style="display:none; flex-direction:column; height:100%;">
            <div class="card-display" id="role-card"></div>
            <div id="chat-window"></div>
            <div style="display: flex; gap: 5px; height: 45px;">
                <input type="text" id="chat-input" placeholder="Питання..." style="flex: 1; margin: 0; font-size:14px;">
                <button class="btn btn-blue" onclick="sendMsg()" style="width: 50px; margin: 0; padding: 0;">➜</button>
            </div>
            <button id="finish-btn" class="btn btn-red" onclick="finishGameAction()" style="display:none; margin-top:10px; padding:8px; font-size:11px;">Завершити (Host)</button>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <h2 style="color:var(--accent)">Мій Профіль</h2>
        <div class="card-display">
            <h2 id="prof-name">---</h2>
            <div style="font-size: 40px;">🏆 <span id="prof-wins">0</span></div>
            <p>Перемог у битвах</p>
        </div>
    </div>

    <div id="scr-leaderboard" class="screen">
        <h2 style="color:var(--accent)">Топ-100</h2>
        <div id="rank-list"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ВИПРАВЛЕНО: Правильна URL-адреса для регіону Бельгія
    const firebaseConfig = { 
        databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" 
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const user = tg.initDataUnsafe?.user;
    const uID = (user?.id || "dev_" + Math.floor(Math.random()*999)).toString();
    const uName = user?.first_name || user?.username || "Гравець";
    
    let roomID = null;
    let isHost = false;

    // Список карт з робочими посиланнями
    const clashCards = [
        { n: "П.Е.К.К.А", i: "https://vignette.wikia.nocookie.net/clashroyale/images/7/7b/P.E.K.K.A.png" },
        { n: "Мегалицар", i: "https://vignette.wikia.nocookie.net/clashroyale/images/6/6d/MegaKnightCard.png" },
        { n: "Вершник на кабані", i: "https://vignette.wikia.nocookie.net/clashroyale/images/a/a5/HogRidderCard.png" },
        { n: "Магічний лучник", i: "https://vignette.wikia.nocookie.net/clashroyale/images/0/0a/MagicArcherCard.png" },
        { n: "Спаркі", i: "https://vignette.wikia.nocookie.net/clashroyale/images/3/30/SparkyCard.png" }
    ];

    db.ref('users/' + uID).update({ name: uName });
    db.ref('users/' + uID).on('value', snap => {
        const d = snap.val() || { wins: 0 };
        document.getElementById('prof-name').innerText = uName;
        document.getElementById('prof-wins').innerText = d.wins || 0;
    });

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + tabId).classList.add('active-screen');
        el.classList.add('active');
        if(tabId === 'leaderboard') loadLeaderboard();
    }

    function loadLeaderboard() {
        db.ref('users').once('value', snap => {
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            let arr = [];
            snap.forEach(c => {
                let p = c.val();
                if(p.name !== "Боєць" && p.name !== "Гравець" || c.key === uID) {
                    arr.push({ id: c.key, name: p.name, wins: p.wins || 0 });
                }
            });
            arr.sort((a,b) => b.wins - a.wins);
            
            arr.slice(0, 100).forEach((p, i) => {
                let isMe = p.id === uID ? "me" : "";
                list.innerHTML += `<div class="rank-item ${isMe}"><span>${i+1}. ${p.name}</span><span>🏆 ${p.wins}</span></div>`;
            });

            let myIdx = arr.findIndex(p => p.id === uID);
            if(myIdx !== -1) {
                list.innerHTML += `<div class="my-rank-fixed"><span>Місце: #${myIdx+1}</span><span>🏆 ${arr[myIdx].wins}</span></div>`;
            }
        });
    }

    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
        setupRoom();
    }

    async function joinLobby() {
        const val = document.getElementById('lobby-input').value;
        const snap = await db.ref('rooms/' + val).once('value');
        if(!snap.exists()) return alert("Кімнату не знайдено");
        roomID = val; isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('menu-area').style.display = 'none';
        document.getElementById('lobby-area').style.display = 'flex';
        document.getElementById('room-code-label').innerText = roomID;
        db.ref('rooms/' + roomID + '/players/' + uID).set({ name: uName });

        db.ref('rooms/' + roomID + '/players').on('value', snap => {
            const l = document.getElementById('player-list');
            l.innerHTML = ""; let c = 0;
            snap.forEach(p => { c++; l.innerHTML += `<div class="rank-item">👤 ${p.val().name}</div>`; });
            if(isHost) {
                let b = document.getElementById('start-btn');
                b.style.display = 'block'; b.disabled = c < 2;
            }
        });

        db.ref('rooms/' + roomID).on('value', snap => {
            const d = snap.val();
            if(d && d.status === 'started') renderGame(d);
        });
    }

    function startGame() {
        const card = clashCards[Math.floor(Math.random()*clashCards.length)];
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let ids = []; snap.forEach(p => ids.push(p.key));
            const spy = ids[Math.floor(Math.random()*ids.length)];
            db.ref('rooms/' + roomID).update({ status: 'started', spyID: spy, cardName: card.n, cardImg: card.i });
        });
    }

    function renderGame(data) {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('play-area').style.display = 'flex';
        const isSpy = data.spyID === uID;
        const box = document.getElementById('role-card');
        if(isSpy) {
            box.innerHTML = `<h2 style="color:var(--red);">ТИ ШПИГУН 🕵️</h2><p>Дізнайся карту!</p>`;
        } else {
            box.innerHTML = `<p style="font-size:12px;opacity:0.6;">ВАША КАРТА:</p><h2 style="color:var(--green);margin:5px;">${data.cardName}</h2><img src="${data.cardImg}" class="unit-img">`;
        }
        if(isHost) document.getElementById('finish-btn').style.display = 'block';

        db.ref('rooms/' + roomID + '/chat').off();
        db.ref('rooms/' + roomID + '/chat').on('child_added', snap => {
            const m = snap.val();
            const w = document.getElementById('chat-window');
            w.innerHTML += `<div class="msg"><b>${m.u}:</b> ${m.msg}</div>`;
            w.scrollTop = w.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        db.ref('rooms/' + roomID + '/chat').push({ u: uName, msg: i.value });
        i.value = "";
    }

    function finishGameAction() {
        const win = prompt("Ім'я переможця:");
        if(!win) return;
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            snap.forEach(p => {
                if(p.val().name.toLowerCase() === win.toLowerCase()) {
                    db.ref('users/' + p.key + '/wins').transaction(c => (c||0)+1);
                }
            });
            db.ref('rooms/' + roomID).remove().then(() => location.reload());
        });
    }
</script>
</body>
</html>
