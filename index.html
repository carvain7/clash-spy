<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; padding: 20px; }
        .active { display: flex; }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin: 8px 0; font-size: 16px; color: white; text-transform: uppercase; transition: 0.1s; }
        .btn-blue { background: var(--blue); box-shadow: 0 4px 0 #1d4ed8; }
        .btn-green { background: var(--green); box-shadow: 0 4px 0 #047857; }
        .btn-red { background: var(--red); box-shadow: 0 4px 0 #b91c1c; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }

        input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #2d3748; background: #111827; color: white; font-size: 18px; margin-bottom: 10px; text-align: center; outline: none; }
        .stats-box { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #2d3748; }
        #player-list { flex-grow: 1; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; margin: 10px 0; overflow-y: auto; border: 1px solid #1a2236; }
        .player-row { padding: 10px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; }
        #chat-window { flex: 1; background: #05070a; border-radius: 12px; margin: 10px 0; overflow-y: auto; padding: 12px; border: 1px solid #1a2236; font-size: 14px; }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen active">
        <h1 style="text-align:center; color:var(--accent); margin-bottom: 5px;">CLASH SPY 🕵️</h1>
        <div class="stats-box" id="user-stats">
            <div style="font-size: 14px; opacity: 0.6;">З'єднання з сервером...</div>
        </div>
        
        <button class="btn btn-green" onclick="createLobby()">СТВОРТИ КІМНАТУ</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #2d3748; padding-top: 15px;">
            <input type="number" id="lobby-input" placeholder="КОД КІМНАТИ">
            <button class="btn btn-blue" onclick="joinLobby()">ПРИЄДНАТИСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 style="text-align:center; margin:0; font-size: 12px; opacity: 0.6;">КОД:</h2>
        <h1 id="room-code-label" style="text-align:center; margin:0 0 15px 0; color:var(--accent); font-size: 36px;">----</h1>
        <div id="player-list"></div>
        <button id="start-btn" class="btn btn-blue" onclick="startGame()" style="display:none;">ПОЧАТИ ГРУ</button>
        <button class="btn" onclick="location.reload()" style="background:none; color:var(--red);">ВИЙТИ</button>
    </div>

    <div id="scr-game" class="screen">
        <div id="game-status" style="text-align:center; padding:12px; border-radius:10px; font-weight:bold; margin-bottom: 10px;"></div>
        <div id="chat-window"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Пиши сюди..." style="margin:0; text-align:left; flex:1;">
            <button class="btn btn-blue" style="width: 60px; margin:0; padding:0;" onclick="sendMsg()">➜</button>
        </div>
        <button id="finish-btn" class="btn btn-red" onclick="finishGameAction()" style="display:none; margin-top: 10px; font-size: 12px; padding: 8px;">ЗАВЕРШИТИ (ХОСТ)</button>
    </div>

<script>
    // 1. ІНІЦІАЛІЗАЦІЯ TELEGRAM
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 2. КОНФІГУРАЦІЯ FIREBASE (Твоє посилання зі скріншоту)
    const firebaseConfig = { 
        databaseURL: "https://carvain7-48b13-default-rtdb.firebaseio.com/" 
    };
    
    // Перевірка ініціалізації
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 3. ДАНІ КОРИСТУВАЧА (Резервний варіант для тестів на ПК)
    const user = tg.initDataUnsafe?.user;
    const uID = (user?.id || "dev_" + Math.floor(Math.random()*999)).toString();
    const uName = user?.first_name || "Гравець " + uID.slice(-3);
    
    let roomID = null;
    let isHost = false;

    // Підключення профілю
    db.ref('users/' + uID).on('value', (snap) => {
        const data = snap.val() || { wins: 0 };
        document.getElementById('user-stats').innerHTML = `
            <div style="font-size: 16px;">${uName}</div>
            <div style="color:var(--accent); font-size: 22px; font-weight: 900;">🏆 ${data.wins || 0}</div>
        `;
    });

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 4. ЛОГІКА КІМНАТ
    async function createLobby() {
        roomID = Math.floor(1000 + Math.random() * 8999).toString();
        isHost = true;
        try {
            await db.ref('rooms/' + roomID).set({ host: uID, status: 'lobby' });
            setupRoom();
        } catch(e) { alert("Помилка бази: " + e.message); }
    }

    async function joinLobby() {
        const val = document.getElementById('lobby-input').value;
        if(!val) return;
        const snap = await db.ref('rooms/' + val).once('value');
        if(!snap.exists()) return alert("Кімнату не знайдено!");
        roomID = val;
        isHost = false;
        setupRoom();
    }

    function setupRoom() {
        document.getElementById('room-code-label').innerText = roomID;
        nav('scr-lobby');

        const roomRef = db.ref('rooms/' + roomID);
        const myPRef = roomRef.child('players').child(uID);
        
        myPRef.set({ name: uName, id: uID });
        myPRef.onDisconnect().remove();

        if(isHost) {
            roomRef.onDisconnect().remove();
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('finish-btn').style.display = 'block';
        }

        roomRef.child('players').on('value', (snap) => {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            let count = 0;
            snap.forEach(p => {
                count++;
                list.innerHTML += `<div class="player-row"><span>👤 ${p.val().name}</span> <span style="color:var(--green)">✓</span></div>`;
            });
            if(isHost) document.getElementById('start-btn').disabled = count < 2;
        });

        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(data && data.status === 'started') runGame(data);
        });

        roomRef.child('chat').off();
        roomRef.child('chat').on('child_added', (snap) => {
            const m = snap.val();
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div><b>${m.user}:</b> ${m.msg}</div>`;
            win.scrollTop = win.scrollHeight;
        });
    }

    // 5. ГРА
    function startGame() {
        const cards = ["П.Е.К.К.А", "Мегалицар", "Хог", "Спаркі", "Відьма", "Принцеса", "Дракон"];
        db.ref('rooms/' + roomID + '/players').once('value', (snap) => {
            let ps = [];
            snap.forEach(p => ps.push(p.val()));
            const spy = ps[Math.floor(Math.random()*ps.length)];
            db.ref('rooms/' + roomID).update({
                status: 'started',
                spyID: spy.id,
                card: cards[Math.floor(Math.random()*cards.length)]
            });
        });
    }

    function runGame(data) {
        nav('scr-game');
        const isSpy = data.spyID === uID;
        const st = document.getElementById('game-status');
        st.style.background = isSpy ? 'rgba(239, 68, 68, 0.2)' : 'rgba(16, 185, 129, 0.2)';
        st.style.color = isSpy ? 'var(--red)' : 'var(--green)';
        st.innerHTML = isSpy ? "ТИ ШПИГУН 🕵️" : `КАРТА: ${data.card} 🛡️`;
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        db.ref('rooms/' + roomID + '/chat').push({ user: uName, msg: inp.value });
        inp.value = "";
    }

    async function finishGameAction() {
        const winner = prompt("Введіть ім'я переможця:");
        if(!winner) return;
        db.ref('rooms/' + roomID + '/players').once('value', (snap) => {
            snap.forEach(p => {
                if(p.val().name.toLowerCase() === winner.toLowerCase()) {
                    db.ref('users/' + p.val().id + '/wins').transaction(c => (c || 0) + 1);
                }
            });
            db.ref('rooms/' + roomID).remove().then(() => location.reload());
        });
    }
</script>
</body>
</html>
