<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy - Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .content { padding: 20px; width: 90%; max-width: 400px; padding-bottom: 100px; }
        
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; text-align: center; }
        .menu-btn { background: #2563eb; color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; margin-bottom: 12px; border-bottom: 4px solid #1e40af; }
        .menu-btn:active { transform: translateY(2px); border-bottom: none; }
        
        /* Stats Card */
        .card-stats { background: linear-gradient(145deg, #1e293b, #334155); border: 2px solid #f1c40f; border-radius: 16px; padding: 20px; margin: 15px 0; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 18px; }

        /* Lobby & Voting */
        .list-box { background: #1e293b; border-radius: 12px; padding: 10px; margin: 10px 0; border: 1px solid #334155; }
        .item-row { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .vote-badge { background: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* Chat */
        #chat-section { display: none; margin-top: 20px; }
        #chat-box { background: #020617; height: 120px; border-radius: 8px; overflow-y: auto; padding: 10px; text-align: left; border: 1px solid #1e40af; margin-bottom: 8px; font-size: 13px; }

        .win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active">
        <div class="content">
            <h1>ARENA CLASH</h1>
            <button class="menu-btn" style="background:#10b981; border-color:#059669" onclick="initLobby(true)">✨ Створити кімнату</button>
            <div style="margin: 20px 0; color:#64748b">--- або ---</div>
            <input type="text" id="join-code" placeholder="Код кімнати..." style="width:90%; padding:14px; border-radius:10px; border:none; margin-bottom:10px; text-align:center; font-size:18px;">
            <button class="menu-btn" style="background:#f59e0b; border-color:#d97706" onclick="initLobby(false)">🔑 Приєднатися</button>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="content">
            <h1>ЛОБІ ГРИ</h1>
            <p>Код: <span id="room-id" style="color:#f1c40f; font-size:24px; font-weight:bold">-----</span></p>
            <div class="list-box" id="lobby-players">
                <div class="item-row"><span>👤 Ви (Host)</span> <span style="color:#10b981">●</span></div>
                <div class="item-row"><span>👤 Player_42</span> <span style="color:#64748b">●</span></div>
            </div>
            <button class="menu-btn" onclick="startGame()">⚔️ ПОЧАТИ ГРУ</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="content">
            <h2 id="game-role">Завантаження...</h2>
            <div id="timer" style="font-size:28px; color:#ef4444; font-weight:bold">02:00</div>

            <div id="player-view" style="display:none">
                <div class="card-stats">
                    <h1 id="c-name" style="margin:0; color:#f1c40f">---</h1>
                    <hr style="opacity:0.2">
                    <div class="stat-row"><span>❤️ HP:</span> <span id="c-hp">0</span></div>
                    <div class="stat-row"><span>⚔️ DMG:</span> <span id="c-dmg">0</span></div>
                    <div class="stat-row"><span>⚡ Speed:</span> <span id="c-speed">---</span></div>
                </div>
                <button class="menu-btn" style="background:#ef4444" onclick="showVoting()">🚫 ВИКРИТИ ШПИГУНА</button>
            </div>

            <div id="spy-view" style="display:none">
                <input type="text" id="search" placeholder="Шукати карту..." onkeyup="searchCard()" style="width:90%; padding:10px; border-radius:5px; border:none; margin-bottom:10px;">
                <div id="card-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:200px; overflow-y:auto;"></div>
            </div>

            <div id="chat-section">
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px">
                    <input id="chat-in" style="flex:1; padding:10px; border-radius:5px; border:none;">
                    <button onclick="sendMsg()" id="s-btn" style="padding:10px; background:#2563eb; border:none; border-radius:5px; color:white">➜</button>
                </div>
            </div>
        </div>
    </div>

    <div id="vote-modal" class="win-overlay" style="background:rgba(15,23,42,0.98)">
        <h1>Обери Шпигуна!</h1>
        <div class="content" id="vote-list"></div>
        <button class="menu-btn" style="width:80%; background:#64748b" onclick="document.getElementById('vote-modal').style.display='none'">Скасувати</button>
    </div>

    <div id="end-screen" class="win-overlay">
        <h1 id="end-title">КІНЕЦЬ</h1>
        <p id="end-text"></p>
        <button class="menu-btn" style="width:200px" onclick="location.reload()">В МЕНЮ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const cardData = [
            {n: "П.Е.К.К.А", hp: 3450, dmg: 678, s: "Повільна"},
            {n: "Мегалицар", hp: 3300, dmg: 222, s: "Середня"},
            {n: "Спаркі", hp: 1200, dmg: 1100, s: "Повільна"},
            {n: "Всадник на кабані", hp: 1400, dmg: 318, s: "Дуже швидка"},
            {n: "Принцеса", hp: 216, dmg: 140, s: "Середня"},
            {n: "Електромаг", hp: 590, dmg: 200, s: "Швидка"}
        ];

        let myRole = "player";
        let targetCard = cardData[0];

        function initLobby(isNew) {
            const code = isNew ? Math.random().toString(36).substring(2, 7).toUpperCase() : document.getElementById('join-code').value;
            if(!isNew && code.length < 3) return tg.showAlert("Введіть код!");
            document.getElementById('room-id').innerText = code;
            document.getElementById('screen-start').classList.remove('active');
            document.getElementById('screen-lobby').classList.add('active');
        }

        function startGame() {
            myRole = Math.random() < 0.3 ? "spy" : "player";
            targetCard = cardData[Math.floor(Math.random()*cardData.length)];
            
            document.getElementById('screen-lobby').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            document.getElementById('chat-section').style.display = 'block';
            
            setupUI();
            startTimer();
        }

        function setupUI() {
            const rTitle = document.getElementById('game-role');
            if(myRole === "spy") {
                rTitle.innerHTML = "Ти — <span style='color:#ef4444'>Шпигун 🕵️</span>";
                document.getElementById('spy-view').style.display = 'block';
                renderGrid();
            } else {
                rTitle.innerHTML = "Ти — <span style='color:#10b981'>Гравець 🛡️</span>";
                document.getElementById('player-view').style.display = 'block';
                document.getElementById('c-name').innerText = targetCard.n;
                document.getElementById('c-hp').innerText = targetCard.hp;
                document.getElementById('c-dmg').innerText = targetCard.dmg;
                document.getElementById('c-speed').innerText = targetCard.s;
            }
        }

        function showVoting() {
            const modal = document.getElementById('vote-modal');
            const list = document.getElementById('vote-list');
            list.innerHTML = `
                <div class="item-row" onclick="finish('викрили Player_42')">👤 Player_42</div>
                <div class="item-row" onclick="finish('викрили Bot_Clash')">👤 Bot_Clash</div>
            `;
            modal.style.display = 'flex';
        }

        function startTimer() {
            let time = 120;
            const tDiv = document.getElementById('timer');
            const itv = setInterval(() => {
                let m = Math.floor(time/60), s = time%60;
                tDiv.innerText = `${m}:${s<10?'0'+s:s}`;
                if(time <= 0) { clearInterval(itv); finish("час вийшов"); }
                time--;
            }, 1000);
        }

        function sendMsg() {
            const inp = document.getElementById('chat-in'), box = document.getElementById('chat-box');
            if(!inp.value) return;
            box.innerHTML += `<div><b>Ви:</b> ${inp.value}</div>`;
            box.scrollTop = box.scrollHeight;
            inp.value = "";
            const btn = document.getElementById('s-btn');
            btn.disabled = true; setTimeout(()=>btn.disabled=false, 3000);
        }

        function renderGrid() {
            const g = document.getElementById('card-grid');
            g.innerHTML = cardData.map(c => `<div onclick="guess('${c.n}')" style="background:white; color:black; padding:8px; border-radius:5px; font-size:12px;">${c.n}</div>`).join('');
        }

        function guess(n) {
            tg.showConfirm(`Вгадати ${n}?`, (ok) => {
                if(ok) finish(n === targetCard.n ? "шпигун вгадав!" : "шпигун помилився!");
            });
        }

        function finish(txt) {
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('end-text').innerText = "Результат: " + txt;
        }
    </script>
</body>
</html>
