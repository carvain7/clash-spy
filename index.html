<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy v6.5.0 - Ultimate Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b101b; --card: #1c2538; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --gold: #ffd700; --text: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #161f32; height: 60px; border-bottom: 2px solid #2d3748; flex-shrink: 0; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; opacity: 0.5; cursor: pointer; }
        .tab.active { opacity: 1; color: var(--accent); border-bottom: 3px solid var(--accent); }
        
        .screen { display: none; flex: 1; padding: 15px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; margin-bottom: 8px; position: relative; transition: 0.2s; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        .btn-gold { background: var(--gold); color: #000; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }

        .vote-count { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: white; color: var(--red); width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--red); font-weight: 900; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #2d3748; background: #111827; color: white; text-align: center; margin-bottom: 10px; }
        .card-item { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #2d3748; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .rank-badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; background: rgba(245, 158, 11, 0.2); color: var(--accent); border: 1px solid var(--accent); }
        
        /* ADMIN PANEL */
        #adm-btn { position: fixed; bottom: 80px; right: 20px; width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #adm-panel { position: fixed; bottom: 135px; right: 20px; width: 260px; background: #1e293b; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; display: none; z-index: 1001; }
        
        #chat-stream { flex: 1; background: #05070a; border-radius: 12px; padding: 10px; margin: 10px 0; overflow-y: auto; border: 1px solid #2d3748; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; background: #1e293b; font-size: 14px; }
        .msg-bubble.mine { align-self: flex-end; border-right: 3px solid var(--blue); background: #26334d; }
        
        #toast { position: fixed; top: -100px; left: 15px; right: 15px; padding: 15px; border-radius: 12px; text-align: center; z-index: 10000; transition: 0.5s; font-weight: bold; }
        #toast.active { top: 20px; }

        .coin-balance { color: var(--gold); font-weight: bold; display: flex; align-items: center; gap: 5px; justify-content: center; font-size: 18px; margin: 10px 0; }
        .exit-link { text-align: center; color: var(--red); font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; text-decoration: underline; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="adm-btn" onclick="toggleAdm()">⚙️</div>
<div id="adm-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px; font-weight:bold;">
        <span>ADMIN TOOLS</span><span onclick="toggleAdm()" style="cursor:pointer;">✕</span>
    </div>
    <div id="adm-info-box" style="font-size:11px; margin-bottom:10px; color: #cbd5e1; background: #0f172a; padding: 8px; border-radius: 8px;">Гра не розпочата</div>
    <button class="btn btn-green" style="padding:8px; font-size:10px;" onclick="forceEndVotes()">ПЕРЕДАТИ ГОЛОСИ</button>
    <button class="btn btn-red" style="padding:8px; font-size:10px;" onclick="stopGame()">СКИНУТИ В ЛОБІ</button>
</div>

<div class="tab-bar" id="main-tabs">
    <div class="tab active" onclick="switchTab('game', this)">ГРА</div>
    <div class="tab" id="tab-cards" onclick="switchTab('cards', this)">КАРТИ</div>
    <div class="tab" id="tab-store" onclick="switchTab('store', this)">МАГАЗИН</div>
    <div class="tab" onclick="switchTab('prof', this)">ПРОФІЛЬ</div>
</div>

<div id="scr-game" class="screen active-screen">
    <div id="view-menu">
        <h1 onclick="devMode()" style="text-align:center; color:var(--accent); margin: 30px 0; cursor: pointer; user-select: none;">CLASH SPY</h1>
        <button class="btn btn-green" onclick="createRoom()">СТВОРИТИ КІМНАТУ</button>
        <input type="number" id="room-input" placeholder="Код">
        <button class="btn btn-blue" onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
    </div>

    <div id="view-lobby" style="display:none;">
        <div class="card-item" style="flex-direction:column; background:rgba(59, 130, 246, 0.1);">
            <small>КОД КІМНАТИ:</small><h2 id="room-id-txt" style="color:var(--accent); font-size:32px;">----</h2>
        </div>
        <div id="lobby-players"></div>
        <button id="start-btn" class="btn btn-blue" style="display:none; margin-top:10px;" onclick="startGame()">ПОЧАТИ ГРУ</button>
        <div class="exit-link" onclick="location.reload()">ВИЙТИ З КІМНАТИ</div>
    </div>

    <div id="view-play" style="display:none; flex-direction:column; height: 100%;">
        <div id="role-info" class="card-item" style="justify-content:center; border:2px solid var(--accent);"></div>
        <div id="chat-stream"></div>
        <div style="display:flex; gap:5px;"><input type="text" id="chat-input" placeholder="Твій хід..."><button class="btn btn-blue" style="width:60px; margin:0;" onclick="sendMsg()">➜</button></div>
        <button class="btn btn-red" style="margin-top:10px;" onclick="toggleV()">ГОЛОСУВАТИ</button>
        <div id="v-list" style="display:none; margin-top:10px; max-height: 200px; overflow-y: auto;"></div>
    </div>
</div>

<div id="scr-cards" class="screen"><div id="cards-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div></div>

<div id="scr-store" class="screen">
    <h2 style="text-align:center; color:var(--gold);">МАГАЗИН</h2>
    <div id="store-coins" class="coin-balance">🪙 0</div>
    <div class="card-item" style="opacity:0.6; justify-content:center; padding:40px;">Товарів поки немає...</div>
</div>

<div id="scr-prof" class="screen">
    <div id="prof-data"></div>
    <button class="btn btn-blue" onclick="showTop100()">🏆 ТОП 100 ГРАВЦІВ</button>
    <div id="top-list" style="margin-top:15px; display:none;"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({ databaseURL: "https://carvain7-48b13-default-rtdb.europe-west1.firebasedatabase.app/" }).database();
    const uID = (tg.initDataUnsafe?.user?.id || "u"+Math.floor(Math.random()*999)).toString();
    const uName = tg.initDataUnsafe?.user?.first_name || "Гравець";

    const allCards = ["П.Е.К.К.А", "Мегалицар", "Магічний лучник", "Спаркі", "Хог", "Бревно", "Шахтар", "Відьма", "Принцеса", "Електричний маг", "Рицар", "Гігант", "Скелети", "Кулька", "Мушкетер", "Кат", "Торнадо", "Арбалет", "Гоблінська бочка"];

    let room = null, isHost = false, myVoted = false, dClicks = 0, myWins = 0, myCoins = 0;

    function getRank(w) { return w>=15?"👑 Король":w>=10?"⚔️ Майстер":w>=5?"🛡️ Лицар":"🌱 Новачок"; }

    function devMode() { dClicks++; if(dClicks>=5) { document.getElementById('adm-btn').style.display='flex'; dClicks=0; tg.HapticFeedback.impactOccurred('heavy'); } }
    function toggleAdm() { const p = document.getElementById('adm-panel'); p.style.display = p.style.display==='block'?'none':'block'; }

    function switchTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active-screen');
        el.classList.add('active');
    }

    async function createRoom() {
        room = Math.floor(1000 + Math.random()*8999).toString(); isHost = true;
        await db.ref('rooms/' + room).set({ host: uID, status: 'lobby' }); initRoom();
    }
    function joinRoom() { room = document.getElementById('room-input').value; if(room.length < 4) return; initRoom(); }

    function initRoom() {
        document.getElementById('view-menu').style.display = 'none';
        document.getElementById('view-lobby').style.display = 'block';
        document.getElementById('room-id-txt').innerText = room;
        db.ref('rooms/' + room + '/players/' + uID).set({ name: uName, rank: getRank(myWins) });

        db.ref('rooms/' + room).on('value', snap => {
            const d = snap.val(); if(!d) return;
            const ids = Object.keys(d.players || {});
            
            // Лобі
            document.getElementById('lobby-players').innerHTML = ids.map(id => `<div class="card-item"><span>${d.players[id].name}</span> <span class="rank-badge">${d.players[id].rank}</span></div>`).join('');
            
            // Адмін-інфо
            if(d.status === 'started') {
                const spyName = d.players[d.spyID]?.name || "???";
                document.getElementById('adm-info-box').innerHTML = `<b>Шпигун:</b> ${spyName}<br><b>Карта:</b> ${d.cardName}`;
                // Ховаємо зайві таби під час гри
                document.getElementById('tab-cards').style.display = 'none';
                document.getElementById('tab-store').style.display = 'none';
            } else {
                document.getElementById('tab-cards').style.display = 'flex';
                document.getElementById('tab-store').style.display = 'flex';
            }

            if(isHost) { const sb = document.getElementById('start-btn'); sb.style.display='block'; sb.disabled = ids.length < 3; }
            
            if(d.status === 'started') {
                document.getElementById('view-lobby').style.display = 'none';
                document.getElementById('view-play').style.display = 'flex';
                renderGame(d);
            } else {
                document.getElementById('view-lobby').style.display = 'block';
                document.getElementById('view-play').style.display = 'none';
            }
            if(d.winner) showEnd(d.winner, d.reason);
        });

        db.ref('rooms/' + room + '/chat').on('value', s => {
            const str = document.getElementById('chat-stream'); str.innerHTML = "";
            s.forEach(m => { str.innerHTML += `<div class="msg-bubble ${m.val().uid===uID?'mine':''}"><b>${m.val().u}:</b><br>${m.val().m}</div>`; });
            str.scrollTop = str.scrollHeight;
        });
    }

    function startGame() {
        db.ref('rooms/'+room+'/players').once('value', s => {
            const ids = Object.keys(s.val());
            db.ref('rooms/'+room).update({ status:'started', spyID:ids[Math.floor(Math.random()*ids.length)], cardName:allCards[Math.floor(Math.random()*allCards.length)], turnIdx:0, order:ids, votes:null, winner:null });
            db.ref('rooms/'+room+'/chat').remove();
        });
    }

    function renderGame(d) {
        const isSpy = d.spyID === uID;
        document.getElementById('role-info').innerHTML = isSpy ? `<h2 style="color:var(--red)">🕵️ ТИ ШПИГУН</h2>` : `<div><small>КАРТА:</small><h2>${d.cardName}</h2></div>`;
        const vts = d.votes || {};
        document.getElementById('v-list').innerHTML = d.order.filter(id => id !== uID).map(id => {
            const count = vts[id] || 0;
            return `<button class="btn btn-blue" onclick="vote('${id}')" ${myVoted?'disabled':''}>${d.players[id].name} ${count>0?`<div class="vote-count">${count}</div>`:''}</button>`;
        }).join('');
    }

    function sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        db.ref('rooms/'+room+'/chat').push({ u:uName, uid:uID, m:inp.value });
        inp.value = "";
    }

    function toggleV() { const x = document.getElementById('v-list'); x.style.display = x.style.display==='block'?'none':'block'; }

    function vote(tid) {
        if(myVoted) return; myVoted = true;
        db.ref('rooms/'+room+'/votes/'+tid).transaction(v => (v||0)+1);
        db.ref('rooms/'+room+'/votes/v_by_'+uID).set(true);
        checkVotesResult();
    }

    function checkVotesResult() {
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(!d || d.winner) return;
            const vDone = d.votes ? Object.keys(d.votes).filter(k => k.startsWith('v_by_')).length : 0;
            if(vDone >= d.order.length) {
                let max = -1, target = "";
                d.order.forEach(id => { if((d.votes[id]||0) > max) { max = d.votes[id]||0; target = id; } });
                if(target === d.spyID) db.ref('rooms/'+room).update({winner:'civ', reason:'Шпигуна викрито!'});
                else db.ref('rooms/'+room).update({winner:'spy', reason:'Вигнали мирного!'});
            }
        });
    }

    // КНОПКА АДМІНА: ПРИМУСОВЕ ГОЛОСУВАННЯ
    function forceEndVotes() {
        db.ref('rooms/'+room).once('value', s => {
            const d = s.val(); if(!d || d.status !== 'started') return;
            const players = d.order;
            players.forEach(p => {
                if(!d.votes || !d.votes['v_by_'+p]) {
                    const randomTarget = players.filter(id => id !== p)[0]; // Просто для закриття лічильника
                    db.ref('rooms/'+room+'/votes/'+randomTarget).transaction(v => (v||0)+1);
                    db.ref('rooms/'+room+'/votes/v_by_'+p).set(true);
                }
            });
            setTimeout(() => checkVotesResult(), 500);
        });
    }

    function showEnd(w, r) {
        const t = document.getElementById('toast');
        t.innerText = r; t.style.background = w==='spy'?'var(--red)':'var(--green)'; t.classList.add('active');
        
        // Нагорода
        const isSpy = document.getElementById('role-info').innerText.includes("ШПИГУН");
        if((w==='civ' && !isSpy) || (w==='spy' && isSpy)) {
            db.ref('users_v2/'+uID).transaction(u => {
                if(u) { u.wins = (u.wins||0)+1; u.coins = (u.coins||0)+50; u.name = uName; }
                return u;
            });
        }

        setTimeout(() => { 
            t.classList.remove('active'); myVoted = false;
            if(isHost) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null});
        }, 4000);
    }

    function stopGame() { if(room) db.ref('rooms/'+room).update({status:'lobby', winner:null, votes:null}); }

    function showTop100() {
        const list = document.getElementById('top-list');
        list.style.display = list.style.display==='block'?'none':'block';
        if(list.style.display==='block') {
            list.innerHTML = "Завантаження...";
            db.ref('users_v2').orderByChild('wins').limitToLast(100).once('value', s => {
                let users = [];
                s.forEach(x => { users.push(x.val()); });
                users.reverse();
                list.innerHTML = users.map((u, i) => `
                    <div class="card-item" style="font-size:12px;">
                        <span>#${i+1} ${u.name || 'Анонім'}</span>
                        <span style="color:var(--accent)">${u.wins || 0} 🏆</span>
                    </div>
                `).join('');
            });
        }
    }

    window.onload = () => {
        db.ref('users_v2/' + uID).on('value', s => {
            const data = s.val() || { wins:0, coins:0 };
            myWins = data.wins; myCoins = data.coins;
            document.getElementById('store-coins').innerText = `🪙 ${myCoins}`;
            document.getElementById('prof-data').innerHTML = `
                <div class="card-item" style="flex-direction:column; padding:30px; text-align:center;">
                    <div class="coin-balance">🪙 ${myCoins}</div>
                    <h2>${uName}</h2>
                    <div class="rank-badge" style="margin:10px 0;">${getRank(myWins)}</div>
                    <h1 style="color:var(--accent); font-size:48px;">${myWins}</h1><p>Перемог</p>
                </div>`;
        });
        const grid = document.getElementById('cards-grid');
        allCards.forEach(c => { grid.innerHTML += `<div class="card-item" style="font-size:11px;">${c}</div>`; });
    };
</script>
</body>
</html>
