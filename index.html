<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Spy Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121c26; color: white; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .active { display: flex; }
        
        /* Навігація знизу */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a2a3a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #2980b9; }
        .nav-item { color: #bdc3c7; font-size: 12px; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: #f1c40f; }

        /* Контент */
        .content { padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 80px; text-align: center; }
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; }
        .menu-btn { background: #2980b9; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; margin-bottom: 10px; border-bottom: 4px solid #1a5276; }
        
        /* Чат */
        #chat-box { background: #0d161f; height: 200px; border-radius: 10px; overflow-y: auto; padding: 10px; text-align: left; margin-bottom: 10px; font-size: 14px; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #1a2a3a; padding-bottom: 2px; }
        .timer { font-size: 24px; color: #e74c3c; font-weight: bold; margin: 10px 0; }
        
        input { width: 85%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; background: #ecf0f1; color: #2c3e50; }
        .card-stats { background: #34495e; border: 2px solid #f1c40f; border-radius: 12px; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .card-item { background: #ecf0f1; color: #2c3e50; padding: 10px; border-radius: 5px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <div class="content">
            <h1>CLASH SPY</h1>
            <button class="menu-btn" style="background:#27ae60" onclick="generateCode()">Створити гру</button>
            <p>Код: <span id="room-code" style="color:#f1c40f; font-weight:bold">-----</span></p>
            <hr style="width:100%; opacity:0.2">
            <input type="text" id="join-input" placeholder="Код кімнати (5 знаків)">
            <button class="menu-btn" style="background:#e67e22" onclick="joinGame()">Увійти в Арену</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="content">
            <div id="role-header"></div>
            <div class="timer" id="timer">02:00</div>
            
            <div id="player-view" style="display:none">
                <div class="card-stats">
                    <h2 id="target-card">П.Е.К.К.А</h2>
                    <p>⚔️ 678 | ❤️ 3400</p>
                </div>
            </div>

            <div id="spy-view" style="display:none">
                <input type="text" id="search" placeholder="Пошук..." onkeyup="searchCard()">
                <div class="grid" id="card-grid"></div>
            </div>

            <h3>Чат Арени</h3>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Ваше повідомлення...">
            <button class="menu-btn" id="send-btn" onclick="sendMessage()">Надіслати</button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <div class="content">
            <h1>Мій Профіль</h1>
            <div style="background:#34495e; padding:20px; border-radius:15px">
                <p>Статистика скоро з'явиться...</p>
                <p>Перемог: 0</p>
                <p>Зіграно ігор: 0</p>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="nav('screen-menu')">🏠 Головна</div>
        <div class="nav-item" onclick="nav('screen-game')">⚔️ Гра</div>
        <div class="nav-item" onclick="nav('screen-profile')">👤 Профіль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let isSpy = false;
        let timerSeconds = 120;
        let canType = true;

        const cards = ["П.Е.К.К.А", "Мегалицар", "Всадник на кабані", "Спаркі", "Електромаг", "Принцеса", "Шахтар", "Бревно", "Торнадо", "Маленький принц", "Монах", "Фенікс", "Бандитка", "Нічна відьма", "Магічний лучник", "Рибак", "Електровелетень", "Королівський привид", "Плазмовий дракон", "Крижаний маг", "Гонча", "Цвинтар", "Елітний варвар", "Варвари", "Орда міньйонів", "Гігант", "Скелетна армія", "Відьма", "Кат", "Повітряна куля", "Велетенський скелет", "Гоблінська бочка", "Принц", "Темний принц", "Мисливець", "Отрута", "Грім", "Дзеркало", "Арбалет", "Мортира", "Гармата", "Вежа-бомбардувальник", "Тесла", "Пекельна вежа"];

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function generateCode() {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('room-code').innerText = code;
        }

        function joinGame() {
            const code = document.getElementById('join-input').value;
            if(code.length < 3) {
                tg.showAlert("Мінімум 3 символи!");
                return;
            }
            
            // Рандом ролі
            isSpy = Math.random() < 0.3; // 30% шанс бути шпигуном
            setupGame();
            nav('screen-game');
            startTimer();
        }

        function setupGame() {
            const header = document.getElementById('role-header');
            if(isSpy) {
                header.innerHTML = "<h1 style='color:#e74c3c'>Ти — Шпигун 🕵️</h1>";
                document.getElementById('spy-view').style.display = 'block';
                document.getElementById('player-view').style.display = 'none';
                renderGrid(cards);
            } else {
                header.innerHTML = "<h1 style='color:#27ae60'>Ти — Гравець 🛡️</h1>";
                document.getElementById('spy-view').style.display = 'none';
                document.getElementById('player-view').style.display = 'block';
                document.getElementById('target-card').innerText = cards[Math.floor(Math.random()*cards.length)];
            }
        }

        function startTimer() {
            const tDiv = document.getElementById('timer');
            const interval = setInterval(() => {
                let m = Math.floor(timerSeconds / 60);
                let s = timerSeconds % 60;
                tDiv.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timerSeconds <= 0) {
                    clearInterval(interval);
                    tg.showAlert("Час вичерпано!");
                }
                timerSeconds--;
            }, 1000);
        }

        function sendMessage() {
            if(!canType) return;
            const input = document.getElementById('chat-input');
            if(!input.value) return;

            const chat = document.getElementById('chat-box');
            chat.innerHTML += `<div class="msg"><b>Ти:</b> ${input.value}</div>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = "";

            // Блокування черги
            canType = false;
            document.getElementById('send-btn').innerText = "Чекайте...";
            setTimeout(() => {
                canType = true;
                document.getElementById('send-btn').innerText = "Надіслати";
            }, 3000); // Блокуємо на 3 сек
        }

        function renderGrid(list) {
            const container = document.getElementById('card-grid');
            container.innerHTML = list.map(name => `<div class="card-item" onclick="confirmGuess('${name}')">${name}</div>`).join('');
        }

        function searchCard() {
            const q = document.getElementById('search').value.toLowerCase();
            renderGrid(cards.filter(c => c.toLowerCase().includes(q)));
        }

        function confirmGuess(name) {
            tg.showConfirm(`Вгадати карту ${name}?`, (ok) => {
                if(ok) tg.sendData(JSON.stringify({role: "spy", guess: name}));
                // Додаток НЕ закриваємо автоматично
            });
        }
    </script>
</body>
</html>
